name: Build & Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.pkg.outputs.version }}
      skip: ${{ steps.guard.outputs.skip }}

    steps:
      - uses: actions/checkout@v4

      - name: Read version from package.json
        id: pkg
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Skip if this version is already released
        id: guard
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "v${{ steps.pkg.outputs.version }}" --repo ${{ github.repository }} > /dev/null 2>&1; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Version v${{ steps.pkg.outputs.version }} already released — skipping."
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "Building v${{ steps.pkg.outputs.version }}..."
          fi

      - name: Create and push git tag
        if: steps.guard.outputs.skip == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v${{ steps.pkg.outputs.version }}"
          git push origin "v${{ steps.pkg.outputs.version }}"

  release-mac:
    needs: tag
    if: needs.tag.outputs.skip == 'false'
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ needs.tag.outputs.version }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build and publish to GitHub Releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npm run publish:mac

  release-win:
    needs: tag
    if: needs.tag.outputs.skip == 'false'
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ needs.tag.outputs.version }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build and publish to GitHub Releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WIN_CSC_LINK: ''
        run: npm run publish:win
