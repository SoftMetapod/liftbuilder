name: Build & Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.pkg.outputs.version }}
      skip: ${{ steps.guard.outputs.skip }}

    steps:
      - uses: actions/checkout@v4

      - name: Read version from package.json
        id: pkg
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Skip if this version is already released
        id: guard
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "v${{ steps.pkg.outputs.version }}" --repo ${{ github.repository }} > /dev/null 2>&1; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Version v${{ steps.pkg.outputs.version }} already released — skipping."
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "Building v${{ steps.pkg.outputs.version }}..."
          fi

      - name: Create git tag (if not exists)
        if: steps.guard.outputs.skip == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v${{ steps.pkg.outputs.version }}" || true
          git push origin "v${{ steps.pkg.outputs.version }}" || true

      - name: Create draft GitHub release
        if: steps.guard.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ steps.pkg.outputs.version }}" \
            --repo ${{ github.repository }} \
            --title "v${{ steps.pkg.outputs.version }}" \
            --draft \
            --generate-notes

  release-mac:
    needs: tag
    if: needs.tag.outputs.skip == 'false'
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ needs.tag.outputs.version }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Mac
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npm run build:mac

      - name: Upload Mac assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "v${{ needs.tag.outputs.version }}" \
            dist/*.dmg dist/*.dmg.blockmap dist/*.zip dist/*.zip.blockmap \
            dist/latest-mac.yml \
            --repo ${{ github.repository }} \
            --clobber

  release-win:
    needs: tag
    if: needs.tag.outputs.skip == 'false'
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ needs.tag.outputs.version }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Windows
        env:
          WIN_CSC_LINK: ''
        run: npm run build:win

      - name: Upload Windows assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          gh release upload "v${{ needs.tag.outputs.version }}" \
            dist/*.exe dist/*.exe.blockmap \
            dist/latest.yml \
            --repo ${{ github.repository }} \
            --clobber

  publish:
    needs: [tag, release-mac, release-win]
    if: needs.tag.outputs.skip == 'false'
    runs-on: ubuntu-latest

    steps:
      - name: Publish release (remove draft)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit "v${{ needs.tag.outputs.version }}" \
            --repo ${{ github.repository }} \
            --draft=false
