<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LiftBuilder — Weightlifting Program Manager</title>
<link href="vendor/fonts.css" rel="stylesheet">
<script src="vendor/chart.umd.js"></script>
<script src="vendor/jspdf.umd.min.js"></script>
<style>
:root {
  --gold:#4A90D9; --gold-light:#6AABF0; --gold-dark:#2E6FAF;
  --black:#0E0E0E; --dark:#1A1A1A; --dark2:#232323; --dark3:#2E2E2E;
  --muted:#888; --light:#C8C8C8; --white:#F5F5F0; --blue:#3A86D4;
  --gold-a05:color-mix(in srgb,var(--gold) 5%,transparent);
  --gold-a08:color-mix(in srgb,var(--gold) 8%,transparent);
  --gold-a10:color-mix(in srgb,var(--gold) 10%,transparent);
  --gold-a12:color-mix(in srgb,var(--gold) 12%,transparent);
  --gold-a15:color-mix(in srgb,var(--gold) 15%,transparent);
  --gold-a20:color-mix(in srgb,var(--gold) 20%,transparent);
  --gold-a25:color-mix(in srgb,var(--gold) 25%,transparent);
  --gold-a30:color-mix(in srgb,var(--gold) 30%,transparent);
  --gold-a40:color-mix(in srgb,var(--gold) 40%,transparent);
  --gold-a50:color-mix(in srgb,var(--gold) 50%,transparent);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Barlow',sans-serif;background:var(--black);color:var(--white);min-height:100vh;font-size:15px;}
h1,h2,h3,h4{font-family:'Barlow Condensed',sans-serif;}

/* ── Header ── */
.header{background:var(--dark);border-bottom:2px solid var(--gold);padding:0 1.5rem;display:flex;align-items:center;gap:16px;height:56px;flex-shrink:0;}
.logo{display:flex;align-items:center;gap:10px;flex-shrink:0;}
.logo-mark{width:34px;height:34px;background:var(--gold);border-radius:4px;display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:15px;color:var(--black);letter-spacing:1px;flex-shrink:0;}
.logo-text{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:700;letter-spacing:1px;}
.logo-sep{width:1px;height:28px;background:var(--dark3);flex-shrink:0;}
.prog-name-display{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:600;color:var(--gold);letter-spacing:.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:200px;}
.header-nav{display:flex;align-items:center;gap:4px;}
.header-nav-btn{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:600;padding:5px 14px;border-radius:4px;cursor:pointer;border:none;background:transparent;color:var(--muted);transition:all .15s;white-space:nowrap;}
.header-nav-btn:hover{color:var(--white);background:var(--dark2);}
.header-nav-btn.active{color:var(--gold);background:var(--gold-a10);border:1px solid var(--gold-a25);}

/* ── Program context toolbar ── */
.prog-toolbar{background:var(--dark2);border-bottom:1px solid var(--dark3);padding:0 1.5rem;display:flex;align-items:center;gap:8px;height:40px;flex-shrink:0;}
.prog-toolbar-sep{width:1px;height:20px;background:var(--dark3);flex-shrink:0;margin:0 2px;}

/* ── Layout ── */
#app-shell{display:flex;flex-direction:column;height:100vh;overflow:hidden;}
.layout{display:flex;flex:1;min-height:0;}
.sidebar{width:200px;min-width:200px;background:var(--dark);border-right:1px solid var(--dark3);display:flex;flex-direction:column;overflow-y:auto;}
.sidebar-label{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:600;letter-spacing:1.5px;color:var(--muted);padding:0 1.25rem 0.4rem;text-transform:uppercase;}
.sidebar-section-label{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:600;letter-spacing:1.5px;color:var(--muted);padding:1rem 1.25rem .4rem;text-transform:uppercase;}
.prog-list-item{display:flex;align-items:center;padding:6px 1.25rem 6px 1.5rem;cursor:pointer;transition:background .12s;font-size:13px;}
.prog-list-item:hover{background:var(--dark2);}
.prog-list-item.active{background:var(--dark2);color:var(--gold);}
.prog-list-item .pl-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.prog-list-item .pl-actions{opacity:0;display:flex;gap:2px;flex-shrink:0;}
.prog-list-item:hover .pl-actions{opacity:1;}
.pl-btn{background:none;border:none;cursor:pointer;color:var(--muted);padding:1px 3px;font-size:11px;}
.pl-btn:hover{color:var(--white);}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 1.25rem;cursor:pointer;color:var(--light);font-size:14px;border-left:3px solid transparent;transition:all 0.15s;}
.nav-item:hover{background:var(--dark2);color:var(--white);}
.nav-item.active{background:var(--dark2);color:var(--gold);border-left-color:var(--gold);font-weight:500;}
.main{flex:1;overflow-y:auto;padding:1.75rem 2rem;}

/* ── Buttons ── */
.btn{font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:14px;letter-spacing:0.5px;padding:7px 15px;border-radius:4px;cursor:pointer;border:none;transition:all 0.15s;display:inline-flex;align-items:center;gap:6px;}
.btn-gold{background:var(--gold);color:var(--black);}
.btn-gold:hover{background:var(--gold-light);}
.btn-outline{background:transparent;color:var(--light);border:1px solid var(--dark3);}
.btn-outline:hover{border-color:var(--gold);color:var(--gold);}
.btn-ghost{background:transparent;color:var(--muted);border:none;padding:6px 10px;cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:14px;}
.btn-ghost:hover{color:var(--white);}
.btn-danger{background:rgba(192,57,43,0.15);color:#E07070;border:1px solid rgba(192,57,43,0.3);}
.btn-danger:hover{background:rgba(192,57,43,0.3);}

/* ── Phase badges ── */
.phase-badge{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:600;letter-spacing:1px;padding:3px 9px;border-radius:3px;text-transform:uppercase;}
.phase-accumulation{background:rgba(31,95,166,0.2);color:var(--blue);border:1px solid rgba(31,95,166,0.4);}
.phase-intensification{background:rgba(46,125,82,0.2);color:#5EC08A;border:1px solid rgba(46,125,82,0.4);}
.phase-realization{background:var(--gold-a15);color:var(--gold);border:1px solid var(--gold-a40);}
.phase-deload{background:rgba(136,136,136,0.15);color:var(--muted);border:1px solid rgba(136,136,136,0.3);}

/* ── Note bar ── */
.note-bar{background:var(--gold-a08);border:1px solid var(--gold-a25);border-left:3px solid var(--gold);border-radius:4px;padding:9px 13px;font-size:13px;color:var(--gold-light);margin-bottom:1.25rem;display:flex;align-items:flex-start;gap:8px;}

/* ── Week bar ── */
.week-bar{display:flex;align-items:center;gap:10px;margin-bottom:1.5rem;flex-wrap:wrap;}
.week-title{font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:700;}

/* ── Day cards ── */
.days-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem;}
@media(max-width:900px){.days-grid{grid-template-columns:1fr;}}
.day-card{background:var(--dark);border:1px solid var(--dark3);border-radius:8px;overflow:hidden;}
.day-card-header{background:var(--dark2);padding:9px 13px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--dark3);}
.day-name{font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:700;letter-spacing:0.5px;}
.day-focus-text{font-size:11px;color:var(--muted);margin-top:1px;}
.day-vol-badge{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:600;color:var(--gold);background:var(--gold-a10);padding:2px 9px;border-radius:3px;border:1px solid var(--gold-a25);}

/* ── Exercise table ── */
.ex-table{width:100%;border-collapse:collapse;}
.ex-table th{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--muted);padding:5px 13px;text-align:left;border-bottom:1px solid var(--dark3);}
.ex-table th:not(:first-child){text-align:center;}
.ex-table td{padding:7px 13px;font-size:13px;vertical-align:middle;border-bottom:1px solid rgba(255,255,255,0.04);}
.ex-table tr:last-child td{border-bottom:none;}
.ex-table td:not(:first-child){text-align:center;color:var(--muted);}
.cat-dot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:6px;vertical-align:middle;}
.cat-snatch{background:#C9A84C;}.cat-clean{background:#3A86D4;}.cat-jerk{background:#6AAEF5;}.cat-cj{background:#2060B8;}.cat-squat{background:#5EC08A;}
.cat-bench{background:#C06060;}.cat-accessory{background:#888;}.cat-plyo{background:#A07FD4;}
.cat-core{background:#D48A50;}.cat-other{background:#444;}
.vol-pill{display:inline-block;padding:1px 7px;border-radius:3px;font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:600;background:var(--gold-a10);color:var(--gold);}

/* ── Metrics ── */
.metrics-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:1.5rem;}
.metric-card{background:var(--dark);border:1px solid var(--dark3);border-radius:8px;padding:.9rem 1.1rem;}
.metric-label{font-size:10px;color:var(--muted);letter-spacing:0.5px;margin-bottom:3px;text-transform:uppercase;font-family:'Barlow Condensed',sans-serif;}
.metric-value{font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:700;}
.metric-sub{font-size:11px;color:var(--muted);margin-top:2px;}
.metric-up{color:#5EC08A;}.metric-down{color:#E07070;}

/* ── Charts ── */
.chart-section{margin-bottom:1.5rem;}
.chart-label{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:.6rem;}
.chart-card{background:var(--dark);border:1px solid var(--dark3);border-radius:8px;padding:1.1rem;}
.chart-wrap{position:relative;width:100%;height:190px;}
.charts-2col{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1.5rem;}

/* ── Peaking ── */
.timeline-strip{display:flex;gap:3px;margin-bottom:1rem;overflow-x:auto;padding-bottom:4px;}
.tl-week{flex:0 0 42px;text-align:center;padding:7px 3px;border-radius:4px;font-size:11px;cursor:default;border:1px solid transparent;}
.peaking-inputs{display:flex;gap:1.5rem;align-items:center;flex-wrap:wrap;margin-bottom:1.25rem;}
.peaking-inputs label{font-size:13px;color:var(--muted);display:flex;align-items:center;gap:8px;}
.peaking-inputs input{background:var(--dark2);color:var(--white);border:1px solid var(--dark3);border-radius:4px;padding:5px 9px;font-size:14px;width:66px;font-family:'Barlow Condensed',sans-serif;}

/* ── Modal ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.72);display:flex;align-items:center;justify-content:center;z-index:300;}
.modal{background:var(--dark);border:1px solid var(--dark3);border-radius:10px;padding:1.6rem;width:min(560px,92vw);max-height:88vh;overflow-y:auto;}
.modal h3{font-family:'Barlow Condensed',sans-serif;font-size:21px;font-weight:700;margin-bottom:1.1rem;}
.form-field{margin-bottom:.9rem;}
.form-field label{display:block;font-size:11px;color:var(--muted);letter-spacing:0.5px;text-transform:uppercase;margin-bottom:4px;font-family:'Barlow Condensed',sans-serif;font-weight:600;}
.form-field input,.form-field select,.form-field textarea{width:100%;background:var(--dark2);color:var(--white);border:1px solid var(--dark3);border-radius:4px;padding:7px 11px;font-size:14px;font-family:'Barlow',sans-serif;}
.form-field input:focus,.form-field select:focus,.form-field textarea:focus{outline:none;border-color:var(--gold);}
.fg3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
.fg2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:1.1rem;border-top:1px solid var(--dark3);padding-top:1.1rem;}

/* ── Day pills ── */
.day-pill-row{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:.9rem;}
.day-pill{font-family:'Barlow Condensed',sans-serif;font-size:13px;padding:5px 14px;border-radius:3px;border:1px solid var(--dark3);cursor:pointer;background:var(--dark2);color:var(--light);transition:all 0.1s;}
.day-pill.selected{background:var(--gold-a15);border-color:var(--gold);color:var(--gold);font-weight:600;}

/* ── Programs home ── */
.prog-home{max-width:700px;margin:0 auto;padding:2rem 0;}
.prog-home h2{font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:700;margin-bottom:.4rem;}
.prog-cards{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-top:1.5rem;}
.prog-card{background:var(--dark);border:1px solid var(--dark3);border-radius:8px;padding:1.25rem;cursor:pointer;transition:border-color .15s;}
.prog-card:hover{border-color:var(--gold);}
.prog-card-name{font-family:'Barlow Condensed',sans-serif;font-size:19px;font-weight:700;margin-bottom:4px;}
.prog-card-meta{font-size:12px;color:var(--muted);}
.prog-card-actions{display:flex;gap:6px;margin-top:12px;}

/* ── Legend ── */
.legend-row{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:.7rem;}
.legend-item{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--muted);}
.legend-dot{width:9px;height:9px;border-radius:2px;flex-shrink:0;}

/* ── Complex builder ── */
.ex-type-tabs{display:flex;gap:4px;margin-bottom:1rem;}
.ex-type-tab{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:600;padding:5px 14px;border-radius:3px;border:1px solid var(--dark3);cursor:pointer;background:var(--dark2);color:var(--light);transition:all 0.1s;flex:1;text-align:center;}
.ex-type-tab.active{background:var(--gold-a15);border-color:var(--gold);color:var(--gold);}
.complex-movement{display:grid;grid-template-columns:1fr 120px 80px 28px;gap:6px;align-items:center;margin-bottom:6px;padding:8px 10px;background:var(--dark2);border:1px solid var(--dark3);border-radius:4px;}
.complex-movement input{background:var(--black);border:1px solid var(--dark3);border-radius:3px;padding:4px 8px;font-size:13px;color:var(--white);font-family:'Barlow',sans-serif;width:100%;}
.complex-movement input:focus{outline:none;border-color:var(--gold);}
.complex-movement select{background:var(--black);border:1px solid var(--dark3);border-radius:3px;padding:4px 6px;font-size:12px;color:var(--white);font-family:'Barlow',sans-serif;width:100%;}
.complex-movement select:focus{outline:none;border-color:var(--gold);}
.complex-movement .rep-input{width:52px;text-align:center;}
.complex-add-btn{background:none;border:1px dashed var(--dark3);border-radius:4px;padding:6px;cursor:pointer;color:var(--muted);font-size:13px;width:100%;text-align:center;font-family:'Barlow Condensed',sans-serif;font-weight:600;transition:all 0.1s;margin-top:2px;}
.complex-add-btn:hover{border-color:var(--gold);color:var(--gold);}
.complex-remove-btn{background:none;border:none;cursor:pointer;color:#555;font-size:14px;padding:0;line-height:1;transition:color 0.1s;}
.complex-remove-btn:hover{color:#E07070;}
.vol-preview{background:var(--gold-a08);border:1px solid var(--gold-a20);border-radius:4px;padding:8px 12px;font-size:12px;color:var(--gold-light);margin-top:.5rem;display:flex;justify-content:space-between;align-items:center;}
.vol-preview strong{font-family:'Barlow Condensed',sans-serif;font-size:16px;color:var(--gold);}

/* ── Scheme badges & selector ── */
.scheme-badge{display:inline-block;font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:700;padding:1px 5px;border-radius:2px;letter-spacing:.5px;vertical-align:middle;margin-left:5px;}
.scheme-badge.amrap{background:rgba(232,82,82,0.15);color:#E85252;border:1px solid rgba(232,82,82,0.3);}
.scheme-badge.heavy-single{background:var(--gold-a15);color:var(--gold);border:1px solid var(--gold-a30);}
.scheme-badge.ladder{background:rgba(100,200,100,0.12);color:#7DC87D;border:1px solid rgba(100,200,100,0.25);}
.top-set-badge{display:inline-block;font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:700;padding:0px 4px;border-radius:2px;letter-spacing:.4px;background:var(--gold-a15);color:var(--gold);border:1px solid var(--gold-a30);}
.ex-note{display:block;font-size:10px;color:var(--muted);font-style:italic;padding-left:12px;margin-top:1px;line-height:1.4;}
/* ── Exercise Library ── */
.lib-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:4px;border:1px solid var(--dark3);margin-bottom:5px;cursor:pointer;transition:border-color .1s;}
.lib-item:hover{border-color:var(--gold);background:var(--gold-a08);}
.lib-item-meta{flex:1;min-width:0;}
.lib-item-name{font-size:13px;color:var(--white);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.lib-item-sub{font-size:11px;color:var(--muted);}
/* ── Multi-week Calendar ── */
.cal-week-card{background:var(--dark1);border:1px solid var(--dark3);border-radius:6px;margin-bottom:10px;overflow:hidden;}
.cal-week-card.active{border-color:var(--gold-a30);}
.cal-week-header{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--dark2);border-bottom:1px solid var(--dark3);}
.scheme-selector{display:flex;gap:4px;margin-top:.75rem;}
.scheme-btn{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:600;padding:4px 8px;border-radius:3px;border:1px solid var(--dark3);cursor:pointer;background:var(--dark2);color:var(--muted);transition:all 0.1s;flex:1;text-align:center;}
.scheme-btn.active{background:var(--gold-a15);border-color:var(--gold);color:var(--gold);}
.scheme-btn.active.s-amrap{background:rgba(232,82,82,0.12);border-color:rgba(232,82,82,0.4);color:#E85252;}
.scheme-btn.active.s-heavy{background:var(--gold-a15);border-color:var(--gold);color:var(--gold);}
.scheme-btn.active.s-ladder{background:rgba(100,200,100,0.12);border-color:rgba(100,200,100,0.35);color:#7DC87D;}
/* ── Superset modal rows ── */
.superset-ex{display:grid;grid-template-columns:22px 1fr 100px 60px 60px 28px;gap:5px;align-items:center;margin-bottom:6px;padding:7px 8px;background:var(--dark2);border:1px solid var(--dark3);border-radius:4px;}
.superset-ex input,.superset-ex select{background:var(--black);border:1px solid var(--dark3);border-radius:3px;padding:4px 6px;font-size:13px;color:var(--white);font-family:'Barlow',sans-serif;width:100%;}
.superset-ex input:focus,.superset-ex select:focus{outline:none;border-color:var(--gold);}

/* ── Warm-up section ── */
.warmup-section{border-bottom:2px solid var(--dark3);}
.warmup-header{display:flex;align-items:center;justify-content:space-between;padding:5px 13px 4px;background:rgba(58,134,212,0.07);border-bottom:1px solid rgba(58,134,212,0.12);}
.warmup-label{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:#3A86D4;display:flex;align-items:center;gap:6px;flex:1;}
.warmup-badge{font-size:10px;color:var(--muted);font-weight:400;font-family:'Barlow',sans-serif;text-transform:none;letter-spacing:0;}
.warmup-body{background:rgba(58,134,212,0.03);}
.warmup-add-inline-btn{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:600;color:#3A86D4;background:rgba(58,134,212,0.1);border:1px solid rgba(58,134,212,0.25);border-radius:3px;cursor:pointer;padding:2px 8px;flex-shrink:0;}
.warmup-add-inline-btn:hover{background:rgba(58,134,212,0.2);color:#6aabf7;}
.warmup-ex-row td{color:var(--muted)!important;font-size:12px;}

/* ── Empty state ── */
.empty-msg{color:var(--muted);font-size:14px;padding:2rem;text-align:center;}

::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:var(--dark);}
::-webkit-scrollbar-thumb{background:var(--dark3);border-radius:3px;}
select option{background:#232323;}
</style>
</head>
<body>

<div id="app-shell">

<!-- Header -->
<div class="header">
  <div class="logo">
    <div class="logo-mark">LB</div>
    <div class="logo-text">LiftBuilder</div>
  </div>
  <div class="logo-sep"></div>
  <div id="prog-name-display" class="prog-name-display"></div>
  <div class="header-nav" id="header-nav"></div>
  <div style="flex:1;"></div>
  <span id="save-badge" style="font-size:11px;color:#5EC08A;opacity:0;transition:opacity 0.4s;margin-right:4px;">✓ Saved</span>
  <span id="app-version" style="font-size:10px;color:var(--muted);"></span>
  <button id="update-btn" onclick="checkForUpdates()" style="display:none;font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:12px;padding:4px 11px;border-radius:3px;cursor:pointer;background:var(--gold-a10);color:var(--gold);border:1px solid var(--gold-a40);margin-left:6px;" title="Check for updates"></button>
  <button class="btn btn-gold" style="font-size:13px;margin-left:8px;" onclick="openExportModal()">⬇ Export PDF</button>
</div>

<!-- Update toast -->
<div id="update-toast" style="display:none;position:fixed;bottom:20px;right:20px;background:var(--dark);border:1px solid var(--gold-a40);border-left:3px solid var(--gold);border-radius:6px;padding:12px 16px;z-index:9999;box-shadow:0 4px 20px rgba(0,0,0,0.5);max-width:320px;">
  <div id="update-toast-msg" style="font-size:13px;color:var(--white);margin-bottom:8px;"></div>
  <div style="display:flex;gap:8px;">
    <button id="update-toast-action" onclick="updateAction()" style="font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:12px;padding:4px 12px;border-radius:3px;cursor:pointer;background:var(--gold);color:var(--black);border:none;"></button>
    <button onclick="document.getElementById('update-toast').style.display='none'" style="font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:12px;padding:4px 10px;border-radius:3px;cursor:pointer;background:none;color:var(--muted);border:1px solid var(--dark3);">Dismiss</button>
  </div>
</div>

<!-- Program context toolbar — only shown on program tab -->
<div class="prog-toolbar" id="prog-toolbar" style="display:none;"></div>

<!-- App shell -->
<div class="layout">
  <nav class="sidebar" id="sidebar">
    <!-- populated by JS -->
  </nav>
  <main class="main" id="main-area">
    <!-- populated by JS -->
  </main>
</div>

<!-- Modal -->
<div id="overlay" class="overlay" style="display:none;" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modal-body"></div>
</div>
</div><!-- /app-shell -->

<script>
// ═══════════════════════════════════════════════════
//  CONSTANTS
// ═══════════════════════════════════════════════════
const ALL_DAYS=['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
const PHASES={accumulation:'Accumulation',intensification:'Intensification',realization:'Realization',deload:'Deload'};
const CAT_META={
  snatch:   {label:'Snatch',    color:'#C9A84C'},
  clean:    {label:'Clean',        color:'#3A86D4'},
  jerk:     {label:'Jerk',          color:'#6AAEF5'},
  cj:       {label:'Clean & Jerk', color:'#2060B8'},
  squat:    {label:'Squat',     color:'#5EC08A'},
  bench:    {label:'Bench',     color:'#C06060'},
  accessory:{label:'Accessory', color:'#888888'},
  plyo:     {label:'Plyo',      color:'#A07FD4'},
  core:     {label:'Core',      color:'#D48A50'},
  other:    {label:'Other',     color:'#555555'},
};

// ═══════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════
let state = {
  activeProgId: null,
  activeTab: 'program',
  currentWeek: 1,
  volWeek: null,
  programs: {},
  roster: { athletes: [], customFields: [] },
  templates: [],
  exerciseLibrary: [],
  meets: [],
  weightUnit: 'lbs'
};

// ═══════════════════════════════════════════════════
//  THEMES
// ═══════════════════════════════════════════════════
const THEMES = {
  seminole:  { accent:'#F5821F', light:'#FFA552', dark:'#B85D0A', white:'#F5F5F0' },
  fortmyers: { accent:'#00843D', light:'#4DAF7C', dark:'#00582A', white:'#FFFFFF' },
  default:   { accent:'#4A90D9', light:'#6AABF0', dark:'#2E6FAF', white:'#F0F4F8' },
};
let _theme = THEMES.default;

function hexToRgba(hex, a) {
  const r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

function applyTheme() {
  const p = prog();
  const org = (p?.org || '').toLowerCase();
  _theme = org.includes('fort myers') ? THEMES.fortmyers
         : org.includes('seminole')   ? THEMES.seminole
         : THEMES.default;
  const root = document.documentElement;
  root.style.setProperty('--gold',       _theme.accent);
  root.style.setProperty('--gold-light', _theme.light);
  root.style.setProperty('--gold-dark',  _theme.dark);
  root.style.setProperty('--white',      _theme.white);
}

// Charts map per program
let charts = {};

// ═══════════════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════════════
function prog() { return state.programs[state.activeProgId] || null; }
function getWeek(w) { return prog() ? (prog().weeks[w]||null) : null; }
function weekNums() { return prog() ? Object.keys(prog().weeks).map(Number).sort((a,b)=>a-b) : []; }
function trainingDays() { return prog() ? prog().trainingDays : []; }
function activeVolWeek() {
  const ws=weekNums();
  if(!ws.length) return null;
  if(state.volWeek!=null && ws.includes(state.volWeek)) return state.volWeek;
  return ws[ws.length-1]; // default to latest
}
function changeVolWeek(dir) {
  const ws=weekNums(), cur=activeVolWeek(), i=ws.indexOf(cur), ni=i+dir;
  if(ni>=0&&ni<ws.length){ state.volWeek=ws[ni]; renderMain(); }
}

function totalVol(w) {
  const wd=getWeek(w); if(!wd) return 0;
  return Object.values(wd.days).reduce((s,d)=>s+d.exercises.reduce((a,e)=>a+(e.volume||0),0),0);
}
function avgInt(w) {
  const wd=getWeek(w); if(!wd) return 0;
  let t=0,n=0;
  Object.values(wd.days).forEach(d=>d.exercises.forEach(e=>{if(e.intensity>0){t+=e.intensity;n++;}}));
  return n?Math.round(t/n):0;
}
function catVolumes(w) {
  const wd=getWeek(w); if(!wd) return {};
  const out={};
  Object.values(wd.days).forEach(d=>d.exercises.forEach(e=>{
    if(e.isComplex && e.movements && e.movements.length) {
      // Distribute volume to each movement's own category
      e.movements.forEach(m=>{
        const cat=m.category||e.category||'other';
        const movVol=(m.reps||0)*e.sets;
        out[cat]=(out[cat]||0)+movVol;
      });
    } else {
      out[e.category]=(out[e.category]||0)+(e.volume||0);
    }
  }));
  return out;
}
function newProgId() { return 'prog_'+Date.now(); }
function destroyCharts(pid) {
  if(!charts[pid]) return;
  Object.values(charts[pid]).forEach(c=>{if(c)c.destroy();});
  charts[pid]={};
}


// ═══════════════════════════════════════════════════
//  TOP-LEVEL RENDER
// ═══════════════════════════════════════════════════
function render() {
  applyTheme();
  renderHeader();
  renderProgToolbar();
  renderSidebar();
  renderMain();
}

function renderHeader() {
  const pn = document.getElementById('prog-name-display');
  if (pn) pn.textContent = prog()?.name || '';
  const nav = document.getElementById('header-nav');
  if (nav) {
    nav.innerHTML = `
      <button class="header-nav-btn ${state.activeTab==='volume'?'active':''}" onclick="switchTab('volume')">📊 Volume</button>
      <button class="header-nav-btn ${state.activeTab==='peaking'?'active':''}" onclick="switchTab('peaking')">🏆 Peaking</button>`;
  }
}

function renderProgToolbar() {
  const bar = document.getElementById('prog-toolbar');
  if (!bar) return;
  if (state.activeTab !== 'program') { bar.style.display = 'none'; return; }
  bar.style.display = 'flex';
  const wd = getWeek(state.currentWeek);
  const phase = wd?.phase || 'accumulation';
  const ws = weekNums();
  bar.innerHTML = `
    <button class="btn-ghost" onclick="changeWeek(-1)" style="font-size:18px;padding:2px 6px;border:none;cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-weight:700;color:var(--muted);">‹</button>
    <span style="font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;color:var(--white);white-space:nowrap;">Week ${state.currentWeek||'—'}</span>
    ${wd?`<select onchange="setWeekPhase(${state.currentWeek},this.value)" class="phase-badge phase-${phase}" style="font-size:10px;padding:2px 7px;border:none;cursor:pointer;appearance:none;-webkit-appearance:none;background:inherit;font-family:'Barlow Condensed',sans-serif;font-weight:600;letter-spacing:1px;text-transform:uppercase;">
      ${Object.entries(PHASES).map(([k,v])=>`<option value="${k}" ${k===phase?'selected':''}>${v}</option>`).join('')}
    </select>`:''}${wd?`<style>#prog-bar select.phase-badge option{background:var(--dark2);color:var(--white);text-transform:none;letter-spacing:0;font-size:13px;}</style>`:''}${''}
    <button class="btn-ghost" onclick="changeWeek(1)" style="font-size:18px;padding:2px 6px;border:none;cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-weight:700;color:var(--muted);">›</button>
    <div class="prog-toolbar-sep"></div>
    <button onclick="openManageDays()" style="background:none;border:none;cursor:pointer;color:var(--muted);font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:600;padding:3px 8px;">⚙ Days</button>
    <button onclick="openAddWeek()" style="background:none;border:none;cursor:pointer;color:var(--muted);font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:600;padding:3px 8px;">+ Week</button>
    <div class="prog-toolbar-sep"></div>
    <button onclick="openAddExercise()" style="background:none;border:none;cursor:pointer;color:var(--gold);font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:600;padding:3px 8px;">+ Add exercise</button>
    <button onclick="openDuplicateWeek()" style="background:none;border:none;cursor:pointer;color:var(--muted);font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:600;padding:3px 8px;">⧉ Duplicate</button>
    ${ws.length>0?`<button onclick="confirmDeleteWeek()" style="background:none;border:none;cursor:pointer;color:#E07070;font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:600;padding:3px 8px;">🗑 Delete week</button>`:''}`;
}

let _progSectionOpen = true;

function renderSidebar() {
  const progs = Object.values(state.programs);
  const progItems = progs.map(p => `
    <div class="prog-list-item ${p.id===state.activeProgId&&['program','volume','peaking','calendar'].includes(state.activeTab)?'active':''}" onclick="switchProgram('${p.id}')">
      <span class="pl-name">${p.name}</span>
      <span class="pl-actions">
        <button class="pl-btn" onclick="event.stopPropagation();openEditProgram('${p.id}')" title="Rename">✏</button>
        ${progs.length>1?`<button class="pl-btn" onclick="event.stopPropagation();deleteProgram('${p.id}')" title="Delete" style="color:#E07070;">✕</button>`:''}
      </span>
    </div>`).join('');

  document.getElementById('sidebar').innerHTML = `
    <div onclick="toggleProgSection()" style="display:flex;align-items:center;justify-content:space-between;padding:.9rem 1.25rem .4rem;cursor:pointer;user-select:none;" onmouseenter="this.style.background='var(--dark2)'" onmouseleave="this.style.background=''">
      <span style="font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:600;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase;">Programs</span>
      <span style="font-size:11px;color:var(--muted);transition:transform .2s;display:inline-block;transform:${_progSectionOpen?'rotate(0deg)':'rotate(-90deg)'};">▾</span>
    </div>
    <div id="prog-section-body" style="display:${_progSectionOpen?'block':'none'};">
      ${progItems}
      <button onclick="openNewProgram()" style="display:flex;align-items:center;gap:6px;padding:7px 1.25rem 7px 1.5rem;background:none;border:none;cursor:pointer;color:var(--muted);font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:600;width:100%;text-align:left;" onmouseenter="this.style.color='var(--gold)'" onmouseleave="this.style.color='var(--muted)'">+ New program</button>
    </div>
    <div style="height:1px;background:var(--dark3);margin:4px 0;"></div>
    <div class="sidebar-section-label" style="padding-top:.5rem;">Tools</div>
    <div class="nav-item ${state.activeTab==='roster'?'active':''}" onclick="switchTab('roster')"><span>👥</span> Roster</div>
    <div class="nav-item ${state.activeTab==='meets'?'active':''}" onclick="switchTab('meets')"><span>🏟</span> Meets</div>
    <div class="nav-item ${state.activeTab==='calculator'?'active':''}" onclick="switchTab('calculator')"><span>⚖️</span> Calculator</div>
    <div class="nav-item ${state.activeTab==='attempts'?'active':''}" onclick="switchTab('attempts')"><span>🎯</span> Attempts</div>
    <div class="nav-item ${state.activeTab==='templates'?'active':''}" onclick="switchTab('templates')"><span>📐</span> Templates</div>
    <div class="nav-item ${state.activeTab==='library'?'active':''}" onclick="switchTab('library')"><span>📚</span> Exercise Library</div>
    <div class="nav-item ${state.activeTab==='calendar'?'active':''}" onclick="switchTab('calendar')"><span>📅</span> Calendar</div>
    <div style="flex:1;"></div>
    <div style="padding:.75rem 1.25rem;border-top:1px solid var(--dark3);display:flex;flex-direction:column;gap:5px;">
      <div style="display:flex;gap:5px;">
        <button id="undo-btn" onclick="undo()" style="flex:1;background:var(--dark2);border:1px solid var(--dark3);cursor:pointer;color:var(--muted);font-size:10px;border-radius:3px;padding:4px;opacity:0.3;pointer-events:none;" title="Undo last action (Ctrl+Z)">⟲ Undo</button>
        <button onclick="exportDataJSON()" style="flex:1;background:var(--dark2);border:1px solid var(--dark3);cursor:pointer;color:var(--muted);font-size:10px;border-radius:3px;padding:4px;" title="Export all data as JSON backup">⬇ Export</button>
        <button onclick="importDataJSON()" style="flex:1;background:var(--dark2);border:1px solid var(--dark3);cursor:pointer;color:var(--muted);font-size:10px;border-radius:3px;padding:4px;" title="Import from JSON backup">⬆ Import</button>
      </div>
      <button onclick="clearAllData()" style="background:none;border:none;cursor:pointer;color:#555;font-size:10px;width:100%;text-align:center;padding:3px;">Clear all data</button>
    </div>`;
}

function toggleProgSection() {
  _progSectionOpen = !_progSectionOpen;
  const body = document.getElementById('prog-section-body');
  if (body) body.style.display = _progSectionOpen ? 'block' : 'none';
  const chevron = document.querySelector('#sidebar [onclick="toggleProgSection()"] span:last-child');
  if (chevron) chevron.style.transform = _progSectionOpen ? 'rotate(0deg)' : 'rotate(-90deg)';
}

function renderHeaderActions() { /* no-op — handled by renderHeader */ }

function renderMain() {
  const area = document.getElementById('main-area');
  if (state.activeTab==='program')   { area.innerHTML=buildProgramHTML(); }
  else if (state.activeTab==='volume')  { area.innerHTML=buildVolumeHTML(); initVolumeCharts(); }
  else if (state.activeTab==='peaking') { area.innerHTML=buildPeakingHTML(); initPeakingChart(); }
  else if (state.activeTab==='roster')  { area.innerHTML=buildRosterHTML(); }
  else if (state.activeTab==='templates') { area.innerHTML=buildTemplatesHTML(); }
  else if (state.activeTab==='library') { area.innerHTML=buildLibraryHTML(); }
  else if (state.activeTab==='calendar') { area.innerHTML=buildCalendarHTML(); }
  else if (state.activeTab==='calculator') { area.innerHTML=buildCalculatorHTML(); }
  else if (state.activeTab==='attempts') { area.innerHTML=buildAttemptsHTML(); if(_attAthleteId) loadAthleteIntoAttempts(); }
  else if (state.activeTab==='meets') { area.innerHTML=buildMeetsHTML(); }
  renderProgToolbar();
  renderHeader();
}

// ── Switch program ──
function switchProgram(id) {
  state.activeProgId=id;
  state.currentWeek=weekNums()[0]||1;
  state.volWeek=null;
  state.activeTab='program';
  render();
}

// ── Switch tab ──
function switchTab(tab) {
  state.activeTab=tab;
  renderSidebar();
  renderMain();
}

// ── Change week ──
function changeWeek(dir) {
  const ws=weekNums(),i=ws.indexOf(state.currentWeek),ni=i+dir;
  if(ni>=0&&ni<ws.length){state.currentWeek=ws[ni];renderMain();}
}

// ═══════════════════════════════════════════════════
//  PROGRAM TAB
// ═══════════════════════════════════════════════════
function buildProgramHTML() {
  if(!prog()) {
    return `<div style="padding:3rem;text-align:center;">
      <div style="font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:700;margin-bottom:8px;">No programs yet</div>
      <div style="color:var(--muted);font-size:14px;">Use the <span style="color:var(--gold);font-weight:600;">+ New program</span> button above to get started.</div>
    </div>`;
  }
  const wd=getWeek(state.currentWeek);
  const phase=wd?wd.phase:'accumulation';
  const noteHTML=wd&&wd.note?`<div class="note-bar">📌 <span>${wd.note}</span></div>`:'';
  const ws=weekNums();

  function fmtPct(lo, hi) { if(lo<=0&&(!hi||hi<=0)) return '—'; if(hi>lo) return `${lo}–${hi}%`; return lo>0?`${lo}%`:'—'; }
  function exRow(ex, i, section, totalInSection) {
    const LETTERS=['A','B','C','D'];
    let nameCell;
    if(ex.isSuperset && ex.supersetExercises) {
      const parts=ex.supersetExercises.map((se,si)=>{
        const pct=fmtPct(se.intensity||0,se.intensityHigh||0);
        const measure=se.useTime?`${se.seconds||0}s`:`${se.reps||0} reps`;
        return `<span style="display:block;font-size:11px;color:var(--light);padding-left:12px;"><span style="color:var(--gold);font-weight:700;font-family:'Barlow Condensed',sans-serif;">${LETTERS[si]}.</span> ${se.name} — ${measure} @ ${pct}</span>`;
      }).join('');
      nameCell=`<span class="cat-dot cat-${ex.category}"></span><span style="font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:.5px;color:var(--muted);">SUPERSET</span>${parts}`;
    } else if(ex.isComplex && ex.movements && ex.movements.length){
      const movParts=ex.movements.map(m=>`<span style="display:block;font-size:11px;color:var(--light);padding-left:12px;"><span class="cat-dot cat-${m.category||'other'}" style="width:5px;height:5px;"></span>${m.reps}× ${m.name}</span>`).join('');
      let groupParts='';
      if(ex.complexGroups&&ex.complexGroups.length>1){
        groupParts=ex.complexGroups.map(cg=>`<span style="display:block;font-size:11px;color:var(--muted);padding-left:12px;">${cg.sets} set${cg.sets!==1?'s':''} @ ${cg.intensity>0?cg.intensity+'%':'BW'}</span>`).join('');
      }
      nameCell=`<span class="cat-dot cat-${ex.category}"></span><span style="font-weight:500;">${ex.name||'Complex'}</span>${movParts}${groupParts}`;
    } else if(ex.setGroups && ex.setGroups.length>1) {
      const isLadder=ex.scheme==='ladder';
      const parts=ex.setGroups.map((sg,si)=>{
        const measure=ex.useTime?`${sg.seconds}s`:ex.useRPE?`${sg.reps}`:`${sg.reps}`;
        const intensity=ex.useRPE?`<span style="color:#E85252;">RPE ${sg.rpe||8}</span>`:fmtPct(sg.intensity||0,sg.intensityHigh||0);
        const isTop=isLadder&&si===ex.setGroups.length-1;
        return `<span style="display:block;font-size:11px;color:var(--light);padding-left:12px;">${sg.sets}×${measure} @ ${intensity}${isTop?` <span class="top-set-badge">TOP</span>`:''}</span>`;
      }).join('');
      const schemeBadge=ex.scheme&&ex.scheme!=='normal'?`<span class="scheme-badge ${ex.scheme==='amrap'?'amrap':ex.scheme==='heavy_single'?'heavy-single':'ladder'}">${ex.scheme==='amrap'?'AMRAP':ex.scheme==='heavy_single'?'HEAVY SINGLE':'LADDER'}</span>`:'';
      const rpeBadge=ex.useRPE?`<span class="scheme-badge amrap">RPE</span>`:'';
      const noteEl=ex.note?`<span class="ex-note">${ex.note}</span>`:'';
      nameCell=`<span class="cat-dot cat-${ex.category}"></span><span style="font-weight:500;">${ex.name}</span>${schemeBadge}${rpeBadge}${noteEl}${parts}`;
    } else {
      const schemeBadge=ex.scheme&&ex.scheme!=='normal'?`<span class="scheme-badge ${ex.scheme==='amrap'?'amrap':ex.scheme==='heavy_single'?'heavy-single':'ladder'}">${ex.scheme==='amrap'?'AMRAP':ex.scheme==='heavy_single'?'HEAVY SINGLE':'LADDER'}</span>`:'';
      const rpeBadge=ex.useRPE?`<span class="scheme-badge amrap">RPE</span>`:'';
      const noteEl=ex.note?`<span class="ex-note">${ex.note}</span>`:'';
      nameCell=`<span class="cat-dot cat-${ex.category}"></span>${ex.name}${schemeBadge}${rpeBadge}${noteEl}`;
    }
    const isAMRAP=ex.scheme==='amrap';
    const isHeavySingle=ex.scheme==='heavy_single';
    const sg0=ex.setGroups?.[0];
    const repsDisplay=ex.isSuperset
      ?`<span style="font-size:10px;color:var(--muted);">each</span>`
      :ex.isComplex
        ?`<span title="Reps per set">${ex.repsPerSet}<span style="font-size:10px;color:var(--muted);"> /set</span></span>`
        :isHeavySingle?`<span style="font-size:10px;color:var(--gold);">max</span>`
        :ex.useTime
          ?(ex.setGroups&&ex.setGroups.length>1?`<span style="font-size:10px;color:var(--muted);">mixed</span>`:`<span style="color:var(--gold);">${sg0?.seconds||ex.seconds||0}s</span>`)
          :(ex.setGroups&&ex.setGroups.length>1?`<span style="font-size:10px;color:var(--muted);">mixed</span>`
            :(isAMRAP?`${ex.reps}<span style="color:#E85252;font-weight:700;">+</span>`:`${ex.reps}`));
    const pctDisplay=ex.isSuperset?`<span style="font-size:10px;color:var(--muted);">—</span>`
      :ex.isComplex&&ex.complexGroups&&ex.complexGroups.length>1?`<span style="font-size:10px;color:var(--muted);">mixed</span>`
      :isHeavySingle?`<span style="font-size:10px;color:var(--gold);">build</span>`
      :ex.useRPE?(ex.setGroups&&ex.setGroups.length>1?`<span style="font-size:10px;color:var(--muted);">mixed</span>`:`<span style="color:#E85252;">RPE ${sg0?.rpe||8}</span>`)
      :ex.setGroups&&ex.setGroups.length>1?`<span style="font-size:10px;color:var(--muted);">mixed</span>`
      :fmtPct(sg0?.intensity||ex.intensity||0,sg0?.intensityHigh||0);
    const isWarmup=section==='warmup';
    const canUp=i>0, canDown=i<totalInSection-1;
    return `<tr class="${isWarmup?'warmup-ex-row':''}${ex.isSuperset?' superset-row':''}">
      <td style="width:24px;padding:2px 3px;">
        <div style="display:flex;flex-direction:column;gap:1px;align-items:center;">
          <button onclick="moveExercise('${ex._day}','${section}',${i},'up')" style="background:none;border:none;cursor:${canUp?'pointer':'default'};color:${canUp?'#666':'#2a2a2a'};font-size:10px;padding:0;line-height:1;" ${canUp?'':'disabled'}>▲</button>
          <button onclick="moveExercise('${ex._day}','${section}',${i},'down')" style="background:none;border:none;cursor:${canDown?'pointer':'default'};color:${canDown?'#666':'#2a2a2a'};font-size:10px;padding:0;line-height:1;" ${canDown?'':'disabled'}>▼</button>
        </div>
      </td>
      <td style="color:${isWarmup?'var(--muted)':'var(--white)'};">${nameCell}</td>
      <td>${ex.sets}</td><td>${repsDisplay}</td>
      <td>${pctDisplay}</td>
      ${!isWarmup?`<td><span class="vol-pill">${ex.volume}</span></td>`:`<td style="color:var(--muted);font-size:11px;">warm-up</td>`}
      <td style="white-space:nowrap;">
        <button onclick="openEditExercise('${ex._day}',${i},'${section}')" style="background:none;border:none;cursor:pointer;color:var(--muted);font-size:12px;padding:1px 5px;" title="Edit">✏</button>
        ${!isWarmup?`<button onclick="openMoveToDay('${ex._day}',${i},'${section}')" style="background:none;border:none;cursor:pointer;color:var(--muted);font-size:11px;padding:1px 5px;" title="Move to another day">↷</button>`:''}
        <button onclick="deleteExercise('${ex._day}',${i},'${section}')" style="background:none;border:none;cursor:pointer;color:#555;font-size:11px;padding:1px 4px;" title="Remove">✕</button>
      </td>
    </tr>`;
  }

  const days=trainingDays().map(day=>{
    const dd=wd?wd.days[day]:null;
    if(dd && !dd.warmup) dd.warmup=[];
    const mainVol=dd?dd.exercises.reduce((s,e)=>s+(e.volume||0),0):0;
    const warmupArr=dd&&dd.warmup?dd.warmup:[];
    const warmupCount=warmupArr.length;
    const dayNote=dd&&dd.dayNote?dd.dayNote:'';

    // Tag each exercise with its day so exRow can reference it
    const taggedMain=(dd?dd.exercises:[]).map(e=>({...e,_day:day}));
    const taggedWarmup=warmupArr.map(e=>({...e,_day:day}));

    const mainRows=taggedMain.map((ex,i)=>exRow(ex,i,'main',taggedMain.length)).join('');
    const warmupRows=taggedWarmup.map((ex,i)=>exRow(ex,i,'warmup',taggedWarmup.length)).join('');

    return `<div class="day-card">
      <div class="day-card-header">
        <div>
          <div class="day-name">${day}</div>
          <div class="day-focus-text">${dd&&dd.focus?dd.focus:'—'}</div>
        </div>
        <div style="display:flex;align-items:center;gap:7px;">
          <span class="day-vol-badge">${mainVol} reps</span>
          <button onclick="openAddExercise('${day}','main')" style="background:var(--gold-a12);border:1px solid var(--gold-a30);cursor:pointer;color:var(--gold);font-size:13px;padding:2px 8px;border-radius:3px;font-family:'Barlow Condensed',sans-serif;font-weight:600;" title="Add working exercise">+ Add</button>
          <button onclick="openEditDay('${day}')" style="background:none;border:none;cursor:pointer;color:var(--muted);font-size:13px;padding:2px 4px;" title="Edit day">✏</button>
        </div>
      </div>
      ${dayNote?`<div style="background:var(--gold-a08);border-bottom:1px solid var(--gold-a15);padding:5px 13px;font-size:12px;color:var(--gold-light);display:flex;align-items:center;gap:6px;">📌 <span>${dayNote}</span></div>`:''}
      <div class="warmup-section">
        <div class="warmup-header">
          <div class="warmup-label">🔥 Warm-up <span class="warmup-badge">${warmupCount?warmupCount+' exercise'+(warmupCount>1?'s':''):''} <span style="opacity:0.6;">— not counted in volume</span></span></div>
          <button onclick="openAddExercise('${day}','warmup')" class="warmup-add-inline-btn">+ Add</button>
        </div>
        <div class="warmup-body">
          ${warmupRows?`<table class="ex-table">
            <thead><tr><th style="width:20px;"></th><th>Exercise</th><th>Sets</th><th>Reps</th><th>%1RM</th><th></th><th></th></tr></thead>
            <tbody>${warmupRows}</tbody>
          </table>`:`<button onclick="openAddExercise('${day}','warmup')" style="display:block;width:100%;padding:8px 13px;background:none;border:none;border-top:1px dashed rgba(58,134,212,0.2);cursor:pointer;text-align:left;font-size:12px;color:#3A86D4;font-family:'Barlow Condensed',sans-serif;font-weight:600;">+ Add warm-up exercise</button>`}
        </div>
      </div>
      <div>
        <div style="padding:5px 13px 4px;font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:var(--muted);">Working Sets</div>
        ${taggedMain.length?`<table class="ex-table">
          <thead><tr><th style="width:20px;"></th><th>Exercise</th><th>Sets</th><th>Reps</th><th>%1RM</th><th>Vol</th><th></th></tr></thead>
          <tbody>${mainRows}</tbody>
        </table>`:`<div class="empty-msg" style="padding:.75rem 1rem;font-size:13px;cursor:pointer;" onclick="openAddExercise('${day}','main')">No working exercises — <span style="color:var(--gold);">+ Add one</span></div>`}
      </div>
    </div>`;
  }).join('');

  return `
    ${noteHTML}
    <div class="days-grid">${days||'<div class="empty-msg">No program data. Add a week from the toolbar above to get started.</div>'}</div>`;
}

function confirmDeleteWeek() {
  if(!confirm(`Delete Week ${state.currentWeek}? All exercises for this week will be permanently removed.`)) return;
  delete prog().weeks[state.currentWeek];
  saveState();
  const remaining=weekNums();
  state.currentWeek=remaining.length?remaining[remaining.length-1]:null;
  render();
}

function moveExercise(day, section, idx, dir) {
  const wd=getWeek(state.currentWeek); if(!wd) return;
  const arr=section==='warmup'?(wd.days[day].warmup||[]):wd.days[day].exercises;
  const newIdx=dir==='up'?idx-1:idx+1;
  if(newIdx<0||newIdx>=arr.length) return;
  [arr[idx],arr[newIdx]]=[arr[newIdx],arr[idx]];
  saveState(); renderMain();
}

function openMoveToDay(fromDay, idx, section) {
  const days=trainingDays().filter(d=>d!==fromDay);
  if(!days.length){alert('No other training days to move to.');return;}
  document.getElementById('modal-body').innerHTML=`
    <h3>Move Exercise to Another Day</h3>
    <p style="font-size:13px;color:var(--muted);margin-bottom:1rem;">The exercise will be appended to the working sets of the selected day.</p>
    <div class="form-field"><label>Move to day</label>
      <select id="move-day">${days.map(d=>`<option value="${d}">${d}</option>`).join('')}</select>
    </div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
      <button class="btn btn-gold" onclick="confirmMoveToDay('${fromDay}',${idx},'${section}')">Move</button>
    </div>`;
  document.getElementById('overlay').style.display='flex';
}

function confirmMoveToDay(fromDay, idx, section) {
  const toDay=document.getElementById('move-day').value;
  const wd=getWeek(state.currentWeek); if(!wd) return;
  const srcArr=section==='warmup'?(wd.days[fromDay].warmup||[]):wd.days[fromDay].exercises;
  const [ex]=srcArr.splice(idx,1);
  if(!wd.days[toDay]) wd.days[toDay]={focus:'',mobility:'',dayNote:'',exercises:[],warmup:[]};
  if(!wd.days[toDay].exercises) wd.days[toDay].exercises=[];
  wd.days[toDay].exercises.push(ex);
  closeModal(); saveState(); renderMain();
}

function deleteExercise(day, idx, section='main') {
  const wd=getWeek(state.currentWeek);
  if(wd&&wd.days[day]){
    const arr=section==='warmup'?(wd.days[day].warmup||[]):wd.days[day].exercises;
    arr.splice(idx,1);
    renderMain();
  }
}

  // highlight selected week in bar charts

    }
  });
}

// ── Peaking helpers ──
function setCompWeek(w) {
  const p=prog(); if(!p) return;
  p._compWeek=w; saveState(); initPeakingChart();
}

function addPlannedWeek() {
  const p=prog(); if(!p) return;
  if(!p._plannedWeeks) p._plannedWeeks=[];
  const ws=weekNums();
  const usedWeeks=p._plannedWeeks.map(pw=>pw.week);
  let next=(ws.length?Math.max(...ws):0)+1;
  while(usedWeeks.includes(next)) next++;
  p._plannedWeeks.push({week:next,phase:'accumulation',targetVol:150,targetInt:70});
  p._plannedWeeks.sort((a,b)=>a.week-b.week);
  saveState(); renderMain();
}

function updatePlannedWeek(i, field, value) {
  const p=prog(); if(!p||!p._plannedWeeks) return;
  p._plannedWeeks[i][field]=value;
  saveState(); initPeakingChart();
}

function removePlannedWeek(i) {
  const p=prog(); if(!p||!p._plannedWeeks) return;
  p._plannedWeeks.splice(i,1);
  saveState(); renderMain();
}

// ── Core PDF builder ──────────────────────────────
function buildPDF(weekNums, inclMobility) {
  const { jsPDF } = window.jspdf;
  const p = prog();
  // Landscape: all training days fit side-by-side on one page per week
  const doc = new jsPDF({ orientation: 'landscape', unit: 'pt', format: 'letter' });

  // Landscape: 792×612pt
  const PW = 792, PH = 612;
  const ML = 28, MR = 28, MT = 32;
  const CW = PW - ML - MR; // 736
  const GOLD  = [201,168,76];
  const DARK  = [26,26,26];
  const MID   = [110,110,110];
  const BLACK = [20,20,20];
  const safeName = p.name.replace(/[^a-zA-Z0-9]/g, '_');

  const CAT_COLORS_RGB = {
    snatch:[201,168,76], clean:[58,134,212], jerk:[106,174,245], cj:[32,96,184],
    squat:[94,192,138],  bench:[192,96,96],
    accessory:[136,136,136], plyo:[160,127,212],
    core:[212,138,80],   other:[80,80,80],
  };

  const pdfPct = (lo, hi) => {
    if (lo<=0 && (!hi||hi<=0)) return '—';
    if (hi>lo) return `${lo}–${hi}%`;
    return lo>0 ? `${lo}%` : '—';
  };

  let pageNum = 1;

  function addFooter() {
    doc.setFontSize(7);
    doc.setFont('helvetica', 'normal');
    doc.setTextColor(...MID);
    doc.text(p.name + (p.org ? '  ·  ' + p.org : ''), ML, PH - 10);
    doc.text(`Page ${pageNum}`, PW - MR, PH - 10, { align: 'right' });
    doc.setDrawColor(...GOLD);
    doc.setLineWidth(0.4);
    doc.line(ML, PH - 18, PW - MR, PH - 18);
  }

  // ── Day column renderer ────────────────────────────
  function drawDayCol(dayName, dd, cx, cy, colW, colH) {
    // Day header bar
    doc.setFillColor(...DARK);
    doc.roundedRect(cx, cy, colW, 20, 2, 2, 'F');
    doc.setFontSize(8);
    doc.setFont('helvetica', 'bold');
    doc.setTextColor(242, 217, 138);
    doc.text(dayName.toUpperCase(), cx + 5, cy + 14);
    if (dd?.focus) {
      const maxFocusW = colW - 10 - doc.getTextWidth(dayName.toUpperCase()) - 6;
      const focusTxt = dd.focus.length > Math.floor(maxFocusW / 4) ? dd.focus.slice(0, Math.floor(maxFocusW/4))+'…' : dd.focus;
      doc.setFontSize(6.5);
      doc.setFont('helvetica', 'normal');
      doc.setTextColor(150, 150, 150);
      doc.text(focusTxt, cx + colW - 4, cy + 14, { align: 'right' });
    }

    let ey = cy + 24;
    const maxTxtW = colW - 11;

    // Merge warmup into exercises with section tagging
    const allEx = [
      ...(dd?.exercises || []).map(e => ({...e, _wu: false})),
      ...(dd?.warmup    || []).map(e => ({...e, _wu: true})),
    ];

    if (!allEx.length) {
      doc.setFontSize(7); doc.setFont('helvetica','italic'); doc.setTextColor(...MID);
      doc.text('Rest day', cx + 5, ey + 9);
      return;
    }

    let shownWuLabel = false;

    allEx.forEach((ex, idx) => {
      // Warm-up section divider
      if (ex._wu && !shownWuLabel) {
        shownWuLabel = true;
        if (ey + 12 > cy + colH) return;
        doc.setFontSize(6); doc.setFont('helvetica','bold'); doc.setTextColor(80,140,200);
        doc.text('— WARM-UP —', cx + colW/2, ey + 7, { align: 'center' });
        ey += 11;
        doc.setDrawColor(80,140,200); doc.setLineWidth(0.3);
        doc.line(cx+2, ey, cx+colW-2, ey);
        ey += 3;
      }

      // Compute row height for this exercise
      let rowH = 17; // name line + summary line
      if (ex.isSuperset && ex.supersetExercises?.length) {
        rowH = 12 + ex.supersetExercises.length * 11;
      } else if (ex.isComplex && ex.movements?.length) {
        rowH = 12 + ex.movements.length * 9;
      } else if (!ex.isComplex && ex.setGroups?.length > 1) {
        rowH = 12 + ex.setGroups.length * 8;
      }
      if (ex.note) rowH += 8;

      if (ey + rowH > cy + colH) return; // clip

      // Alternating row background
      if (idx % 2 === 0) {
        doc.setFillColor(248, 248, 246);
        doc.rect(cx, ey, colW, rowH, 'F');
      }

      // Category dot
      const catRGB = CAT_COLORS_RGB[ex.category] || [80,80,80];
      doc.setFillColor(...catRGB);
      doc.circle(cx + 4.5, ey + 7, 2, 'F');

      if (ex.isSuperset && ex.supersetExercises?.length) {
        const LTRS = ['A','B','C','D'];
        doc.setFontSize(6.5); doc.setFont('helvetica','bold'); doc.setTextColor(100,130,180);
        doc.text(`SUPERSET  ·  ${ex.sets||0} sets`, cx + 9, ey + 8);
        ex.supersetExercises.forEach((se, si) => {
          const seY = ey + 12 + si * 11;
          if (seY + 9 > cy + colH) return;
          doc.setFontSize(6.5); doc.setFont('helvetica','bold'); doc.setTextColor(180,145,40);
          doc.text(LTRS[si]+'.', cx + 9, seY + 7);
          doc.setFont('helvetica','normal'); doc.setTextColor(...BLACK);
          const nm = doc.splitTextToSize(se.name, maxTxtW - 14)[0];
          doc.text(nm, cx + 18, seY + 7);
          doc.setTextColor(...MID);
          const seSum = (se.useTime ? `${se.seconds||0}s` : `${se.reps||0}r`) + ' @ ' + pdfPct(se.intensity||0, se.intensityHigh||0);
          doc.text(seSum, cx + 18, seY + 13);
        });

      } else if (ex.isComplex && ex.movements?.length) {
        doc.setFontSize(7.5); doc.setFont('helvetica','bold'); doc.setTextColor(...BLACK);
        doc.text(doc.splitTextToSize(ex.name||'Complex', maxTxtW)[0], cx + 9, ey + 8);
        doc.setFontSize(6.5); doc.setFont('helvetica','normal'); doc.setTextColor(...MID);
        doc.text(`${ex.sets||0}sets @ ${ex.intensity||0}%`, cx + 9, ey + 14);
        ex.movements.forEach((mv, mi) => {
          const mvY = ey + 12 + mi * 9;
          if (mvY + 7 > cy + colH) return;
          const mvRGB = CAT_COLORS_RGB[mv.category] || [120,120,120];
          doc.setFillColor(...mvRGB); doc.setDrawColor(...mvRGB); doc.setLineWidth(1.2);
          doc.line(cx + 14, mvY + 2, cx + 14, mvY + 8);
          doc.setFontSize(6.5); doc.setFont('helvetica','normal'); doc.setTextColor(70,70,70);
          doc.text(`${mv.reps}× ${doc.splitTextToSize(mv.name, maxTxtW - 8)[0]}`, cx + 17, mvY + 7);
        });

      } else if (!ex.isComplex && ex.setGroups?.length > 1) {
        doc.setFontSize(7.5); doc.setFont('helvetica','bold'); doc.setTextColor(...BLACK);
        doc.text(doc.splitTextToSize(ex.name, maxTxtW)[0], cx + 9, ey + 8);
        ex.setGroups.forEach((sg, si) => {
          const sgY = ey + 12 + si * 8;
          if (sgY + 7 > cy + colH) return;
          const isTop = ex.scheme==='ladder' && si===ex.setGroups.length-1;
          doc.setFontSize(6); doc.setFont('helvetica', isTop?'bold':'normal');
          doc.setTextColor(isTop?[100,80,20]:MID);
          const sgTxt = `${sg.sets}×${ex.useTime?sg.seconds+'s':sg.reps+'r'} @ ${pdfPct(sg.intensity||0, sg.intensityHigh||0)}${isTop?' ▲':''}`;
          doc.text(sgTxt, cx + 9, sgY + 7);
        });

      } else {
        // Standard single exercise
        doc.setFontSize(7.5);
        doc.setFont('helvetica', ex._wu ? 'italic' : 'normal');
        doc.setTextColor(...BLACK);
        doc.text(doc.splitTextToSize(ex.name, maxTxtW)[0], cx + 9, ey + 8);
        const sg0 = ex.setGroups?.[0];
        const pctStr = ex.scheme==='heavy_single' ? 'max'
          : ex.useRPE ? `RPE ${sg0?.rpe||8}`
          : pdfPct(sg0?.intensity ?? ex.intensity ?? 0, sg0?.intensityHigh ?? 0);
        const repsStr = ex.scheme==='heavy_single' ? 'max'
          : ex.useTime ? `${sg0?.seconds||ex.seconds||0}s`
          : ex.scheme==='amrap' ? `${ex.reps||0}+`
          : String(ex.reps||0);
        doc.setFontSize(6.5); doc.setFont('helvetica','normal'); doc.setTextColor(...MID);
        doc.text(`${ex.sets||0}×${repsStr} @ ${pctStr}`, cx + 9, ey + 14);
        if (ex.scheme && ex.scheme!=='normal') {
          const tag = ex.scheme==='amrap'?'AMRAP':ex.scheme==='heavy_single'?'HEAVY':' LADDER';
          doc.setFontSize(5.5); doc.setFont('helvetica','bold');
          doc.setTextColor(ex.scheme==='amrap'?[200,60,60]:ex.scheme==='heavy_single'?[180,145,20]:[80,160,80]);
          doc.text(tag, cx + colW - 4, ey + 8, { align:'right' });
        }
      }

      // Coaching note
      if (ex.note) {
        const noteY = ey + rowH - 5;
        if (noteY < cy + colH) {
          doc.setFontSize(6); doc.setFont('helvetica','italic'); doc.setTextColor(140,140,140);
          doc.text(doc.splitTextToSize(ex.note, maxTxtW)[0], cx + 9, noteY);
        }
      }

      // Row separator
      doc.setDrawColor(220,220,218); doc.setLineWidth(0.2);
      doc.line(cx+2, ey+rowH, cx+colW-2, ey+rowH);
      ey += rowH;
    });

    // Mobility note at bottom of column
    if (inclMobility && dd?.mobility && ey + 14 < cy + colH) {
      ey += 3;
      doc.setFontSize(6); doc.setFont('helvetica','bold'); doc.setTextColor(80,160,200);
      doc.text('MOBILITY', cx + 4, ey + 7);
      ey += 10;
      doc.setFontSize(6.5); doc.setFont('helvetica','italic'); doc.setTextColor(...MID);
      const mobLines = doc.splitTextToSize(dd.mobility, colW - 8);
      mobLines.slice(0, 4).forEach(line => {
        if (ey + 8 < cy + colH) { doc.text(line, cx + 4, ey + 7); ey += 8; }
      });
    }
  }

  // ── Render each week on its own page ──────────────
  weekNums.forEach((wNum, wi) => {
    const wd = getWeek(wNum);
    if (!wd) return;
    if (wi > 0) { addFooter(); doc.addPage(); pageNum++; }

    // Gold accent strip
    doc.setFillColor(...GOLD);
    doc.rect(0, 0, PW, 4, 'F');

    let y = MT;

    // Week header
    doc.setFillColor(...DARK);
    doc.roundedRect(ML, y, CW, 26, 3, 3, 'F');
    doc.setFontSize(13); doc.setFont('helvetica','bold'); doc.setTextColor(242,217,138);
    doc.text(`WEEK ${wNum}`, ML + 10, y + 18);
    const hdrRight = [p.name, p.org, p.season].filter(Boolean).join('  ·  ');
    doc.setFontSize(8.5); doc.setFont('helvetica','normal'); doc.setTextColor(160,160,160);
    doc.text(hdrRight, PW - MR - 8, y + 18, { align:'right' });
    y += 31;

    // Coach note (compact single line)
    if (wd.note) {
      doc.setFontSize(7.5); doc.setFont('helvetica','italic'); doc.setTextColor(...MID);
      doc.text('Note: ' + wd.note, ML + 4, y + 8);
      y += 13;
    }

    // Day columns — all days side by side
    const days = trainingDays().filter(d => wd.days?.[d]);
    if (!days.length) { addFooter(); return; }

    const nDays  = days.length;
    const colGap = nDays > 5 ? 5 : 7;
    const colW   = (CW - colGap * (nDays - 1)) / nDays;
    const colH   = PH - y - 24;

    days.forEach((day, di) => {
      const cx = ML + di * (colW + colGap);
      drawDayCol(day, wd.days[day], cx, y, colW, colH);
    });
  });

  addFooter();

  const filename = weekNums.length === 1
    ? `${safeName}_Week${weekNums[0]}.pdf`
    : `${safeName}_FullProgram.pdf`;
  doc.save(filename);
}

function exportWeekPDF(wNum, inclMobility) {
  buildPDF([wNum], inclMobility);
}

function exportFullProgramPDF(inclMobility) {
  buildPDF(weekNums(), inclMobility);
}

}

function saveEditDay(day) {
  const wd=getWeek(state.currentWeek); if(!wd) return;
  wd.days[day].focus=document.getElementById('ed-focus').value.trim();
  wd.days[day].dayNote=document.getElementById('ed-daynote').value.trim();
  wd.days[day].mobility=document.getElementById('ed-mob').value.trim();

}

function openAddWeek() {
  const ws=weekNums(), next=ws.length?Math.max(...ws)+1:1;
  document.getElementById('modal-body').innerHTML=`
    <h3>Create New Week</h3>
    <div class="fg2">
      <div class="form-field"><label>Week #</label><input type="number" id="m-wk" value="${next}" min="1" max="52"></div>
      <div class="form-field"><label>Training phase</label>
        <select id="m-phase">
          <option value="accumulation">Accumulation — 65–75%</option>
          <option value="intensification" selected>Intensification — 75–85%</option>
          <option value="realization">Realization — 85–95%</option>
          <option value="deload">Deload — recovery</option>
        </select>
      </div>
    </div>
    <div class="form-field"><label>Coach note (optional)</label><input type="text" id="m-note" placeholder="e.g. Focus on bar path and timing"></div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
      <button class="btn btn-gold" onclick="saveNewWeek()">Create week</button>
    </div>`;
  document.getElementById('overlay').style.display='flex';
}

function setWeekPhase(weekNum, phase) {
  const wd=getWeek(weekNum); if(!wd) return;
  wd.phase=phase;
  saveState();
  renderProgBar();
}

function saveNewWeek() {
  const w=parseInt(document.getElementById('m-wk').value);
  const phase=document.getElementById('m-phase').value;
  const note=document.getElementById('m-note').value.trim();
  if(!w) return;
  const days={};
  trainingDays().forEach(d=>{days[d]={focus:'',mobility:'',dayNote:'',exercises:[],warmup:[]};});
  prog().weeks[w]={note,phase,days};
  state.currentWeek=w;
  closeModal(); render();
}

let _exSection = 'main'; // 'main' | 'warmup'
let _libraryMode = false; // true = modal is adding/editing a library entry (not a day's exercise)
let _libraryEditIdx = -1; // index into state.exerciseLibrary when editing an existing entry
let _movements = []; // [{name, reps, category}]
let _setGroups = []; // [{sets, reps, seconds, intensity, intensityHigh}] — for single exercises
let _useTime = false; // true = time-based exercise (seconds per set instead of reps)
let _complexGroups = []; // [{sets, intensity}] — set groups for complex exercises
let _scheme = 'normal'; // 'normal' | 'ladder' | 'amrap' | 'heavy_single'
let _supersetExercises = []; // [{name, category, reps, seconds, intensity, intensityHigh, useTime}]
let _supersetSets = 3;
let _exNote = ''; // coaching/technique cue for the exercise
let _useRPE = false; // true = RPE-based intensity instead of %

function openAddToLibrary(editIdx=-1) {

  _setGroups=[{sets:3,reps:3,seconds:30,intensity:75,intensityHigh:0,rpe:8}];

function switchExMode(mode) {
  _exMode=mode;

}

function schemeLabel(s){return s==='amrap'?'AMRAP':s==='heavy_single'?'Heavy Single':s==='ladder'?'Ladder':'Normal';}
function renderSchemeSelector() {
  const el=document.getElementById('scheme-selector'); if(!el) return;
  ['normal','ladder','amrap','heavy_single'].forEach(s=>{
    const btn=el.querySelector(`[data-scheme="${s}"]`);
    if(!btn) return;
    const cls=s==='amrap'?'s-amrap':s==='heavy_single'?'s-heavy':s==='ladder'?'s-ladder':'';
    btn.className='scheme-btn'+(s===_scheme?' active'+(cls?' '+cls:''):'');
  });
  const hint=document.getElementById('scheme-hint'); if(!hint) return;
  const hints={normal:'',ladder:'Athletes build up through ramp sets to a peak top set. The last set group is the "Top Set".',amrap:'The last set is taken to technical failure — reps shown are the minimum target.',heavy_single:'Athlete builds to a maximal single on this day. No fixed rep target.'};
  hint.textContent=hints[_scheme]||'';
}
function renderLibraryQuickAdd() {
  const el=document.getElementById('lib-quick-add'); if(!el) return;
  const q=(document.getElementById('lib-q')||{}).value||'';
  const items=state.exerciseLibrary.filter(e=>!q||e.name.toLowerCase().includes(q.toLowerCase()));
  if(!items.length){el.innerHTML=q?`<div style="font-size:11px;color:var(--muted);padding:6px 8px;">No matches.</div>`:'';return;}
  el.innerHTML=items.slice(0,8).map((e,i)=>`
    <div class="lib-item" onclick="quickFillFromLibrary(${state.exerciseLibrary.indexOf(e)})">

      <div class="lib-item-meta">
        <div class="lib-item-name">${e.name}</div>
        <div class="lib-item-sub">${Object.entries(CAT_META).find(([k])=>k===e.category)?.[1]?.label||e.category} · ${e.sets}×${e.reps||'—'} @ ${e.intensity||0}%</div>
      </div>
    </div>`).join('');
}
function quickFillFromLibrary(idx) {
  const e=state.exerciseLibrary[idx]; if(!e) return;
  _useTime=e.useTime||false; _useRPE=e.useRPE||false; _scheme=e.scheme||'normal'; _exNote=e.note||'';
  _setGroups=e.setGroups?e.setGroups.map(sg=>({...sg,rpe:sg.rpe||8})):[{sets:e.sets||3,reps:e.reps||5,seconds:e.seconds||30,intensity:e.intensity||0,intensityHigh:e.intensityHigh||0,rpe:e.rpe||8}];

      </div>`:''}
      <div class="form-field"><label>Exercise name</label><input type="text" id="m-name" placeholder="e.g. Back Squat" autofocus></div>
      <div class="form-field" style="margin-bottom:.5rem;"><label>Coaching note <span style="font-weight:400;color:var(--muted);font-size:10px;">(optional — prints on PDF)</span></label>

    body.innerHTML=`

function renderSupersetRows() {
  const container=document.getElementById('superset-rows-container'); if(!container) return;
  const LETTERS=['A','B','C','D'];
  const CAT_OPTS=Object.entries(CAT_META).map(([k,v])=>`<option value="${k}">${v.label}</option>`).join('');
  const header=`<div style="display:grid;grid-template-columns:22px 1fr 100px 60px 60px 28px;gap:5px;padding:0 8px 4px;font-size:10px;color:var(--muted);font-family:'Barlow Condensed',sans-serif;font-weight:600;letter-spacing:.8px;text-transform:uppercase;">
    <span></span><span>Exercise</span><span>Category</span><span style="text-align:center;">Reps</span><span style="text-align:center;">%</span><span></span>
  </div>`;
  const rows=_supersetExercises.map((se,i)=>{
    const catOpts=Object.entries(CAT_META).map(([k,v])=>`<option value="${k}"${(se.category||'other')===k?' selected':''}>${v.label}</option>`).join('');
    return `<div class="superset-ex">
      <span style="font-family:'Barlow Condensed',sans-serif;font-weight:700;color:var(--gold);font-size:13px;">${LETTERS[i]}</span>
      <input type="text" placeholder="Exercise name" value="${se.name||''}" oninput="_supersetExercises[${i}].name=this.value">
      <select oninput="_supersetExercises[${i}].category=this.value">${catOpts}</select>
      <input type="number" min="1" max="30" value="${se.reps||1}" style="text-align:center;" oninput="_supersetExercises[${i}].reps=parseInt(this.value)||1;autoVol()">
      <input type="number" min="0" max="115" value="${se.intensity||''}" placeholder="0=BW" style="text-align:center;" oninput="_supersetExercises[${i}].intensity=parseInt(this.value)||0">
      ${_supersetExercises.length>2?`<button class="complex-remove-btn" onclick="removeSupersetEx(${i})">✕</button>`:'<div></div>'}
    </div>`;
  }).join('');
  container.innerHTML=header+rows;
  const addBtn=document.getElementById('ss-add-btn');
  if(addBtn){addBtn.textContent=`+ Add exercise (${_supersetExercises.length}/4)`;addBtn.style.display=_supersetExercises.length>=4?'none':'';}
  autoVol();
}
function addSupersetEx() {
  if(_supersetExercises.length>=4) return;
  _supersetExercises.push({name:'',category:'accessory',reps:10,seconds:30,intensity:0,intensityHigh:0,useTime:false});
  renderSupersetRows();
}
function removeSupersetEx(i) {
  if(_supersetExercises.length<=2) return;
  _supersetExercises.splice(i,1);
  renderSupersetRows();
}

function renderMovements() {
  const container=document.getElementById('complex-movements');
  if(!container) return;
  const CAT_OPTS=Object.entries(CAT_META).map(([k,v])=>`<option value="${k}">${v.label}</option>`).join('');
  const header=`<div style="display:grid;grid-template-columns:1fr 120px 80px 28px;gap:6px;padding:0 10px 4px;font-size:10px;color:var(--muted);font-family:'Barlow Condensed',sans-serif;font-weight:600;letter-spacing:.8px;text-transform:uppercase;">
    <span>Movement</span><span>Category</span><span style="text-align:center;">Reps</span><span></span>
  </div>`;
  const rows=_movements.map((m,i)=>{

    return `<div class="complex-movement">
      <input type="text" placeholder="e.g. Power Clean" value="${m.name}"

      <div style="display:flex;align-items:center;gap:4px;">
        <input class="rep-input" type="number" min="1" max="20" value="${m.reps}"

        <span style="font-size:10px;color:var(--muted);">reps</span>

      ${_movements.length>1?`<button class="complex-remove-btn" onclick="removeMovement(${i})">✕</button>`:'<div></div>'}

function autoNameComplex() {

function updateComplexVol() {
  const totalSets=_complexGroups.reduce((s,cg)=>s+(cg.sets||0),0);
  const repsPerSet=_movements.reduce((s,m)=>s+(parseInt(m.reps)||0),0);
  const total=totalSets*repsPerSet;
  const el=document.getElementById('vol-preview-val');
  if(el) el.textContent=`${total} reps (${repsPerSet}/set × ${totalSets} sets)`;
}

function autoVol() {
  const el=document.getElementById('vol-preview-val'); if(!el) return;
  if(_exMode==='superset') {
    const total=_supersetSets*_supersetExercises.reduce((s,se)=>s+(se.reps||0),0);
    el.textContent=`${total} reps (${_supersetSets} sets × ${_supersetExercises.length} exercises)`;
    return;
  }
  const totalSets=_setGroups.reduce((s,sg)=>s+(sg.sets||0),0);
  if(_useTime) {
    const totalSecs=_setGroups.reduce((s,sg)=>s+(sg.sets||0)*(sg.seconds||0),0);
    el.textContent=`${totalSecs}s total (${totalSets} set${totalSets!==1?'s':''})`;
  } else {
    const total=_setGroups.reduce((s,sg)=>s+(sg.sets||0)*(sg.reps||0),0);
    el.textContent=`${total} reps (${totalSets} set${totalSets!==1?'s':''})`;
  }
}

function saveExercise() {
  const day=document.getElementById('m-day').value;
  const category=document.getElementById('m-cat').value;
  const wd=getWeek(state.currentWeek);
  if(!wd.days[day]) wd.days[day]={focus:'',mobility:'',exercises:[]};

  let ex;
  if(_exMode==='complex') {
    const filled=_movements.filter(m=>m.name.trim());
    if(!filled.length){alert('Add at least one movement to the complex.');return;}
    const repsPerSet=filled.reduce((s,m)=>s+(parseInt(m.reps)||0),0);
    const groups=_complexGroups.map(cg=>({sets:parseInt(cg.sets)||1,intensity:parseInt(cg.intensity)||0}));
    const totalSets=groups.reduce((s,cg)=>s+cg.sets,0);
    const wInt=groups.reduce((s,cg)=>s+cg.intensity*cg.sets,0);
    const avgIntensity=totalSets>0?Math.round(wInt/totalSets):0;
    const volume=totalSets*repsPerSet;
    const rawName=document.getElementById('m-name').value.trim();
    const autoName=filled.map(m=>`${m.reps}× ${m.name}`).join(' + ');
    const topCat=document.getElementById('m-cat').value||filled[0].category||'other';
    ex={
      name: rawName||autoName,
      isComplex: true,
      movements: filled.map(m=>({name:m.name.trim(),reps:parseInt(m.reps)||1,category:m.category||'other'})),
      complexGroups: groups,
      sets: totalSets,
      reps: volume,
      repsPerSet,
      intensity: avgIntensity,
      volume,
      category: topCat
    };
  } else if(_exMode==='superset') {
    const filled=_supersetExercises.filter(se=>se.name.trim());
    if(filled.length<2){alert('Enter names for at least 2 exercises in the superset.');return;}
    const sets=_supersetSets||1;
    const volume=sets*filled.reduce((s,se)=>s+(se.reps||0),0);
    const avgInt=Math.round(filled.reduce((s,se)=>s+(se.intensity||0),0)/filled.length);
    ex={name:'',isSuperset:true,isComplex:false,supersetExercises:filled.map(se=>({name:se.name.trim(),category:se.category||'other',reps:se.reps||1,seconds:se.seconds||30,intensity:se.intensity||0,intensityHigh:se.intensityHigh||0,useTime:se.useTime||false})),sets,volume,intensity:avgInt,scheme:'normal',category:filled[0].category||'other'};
  } else {
    const name=document.getElementById('m-name').value.trim();
    if(!name){alert('Please enter an exercise name.');return;}
    const note=(document.getElementById('m-note')||{}).value?.trim()||_exNote||'';
    const groups=_setGroups.map(sg=>({
      sets:parseInt(sg.sets)||1,
      reps:(_useTime||_useRPE)?0:(parseInt(sg.reps)||1),
      seconds:_useTime?(parseInt(sg.seconds)||30):0,
      intensity:_useRPE?0:(parseInt(sg.intensity)||0),
      intensityHigh:_useRPE?0:(parseInt(sg.intensityHigh)||0),
      rpe:_useRPE?(parseFloat(sg.rpe)||8):0
    }));
    const totalSets=groups.reduce((s,sg)=>s+sg.sets,0);
    const wInt=_useRPE?0:groups.reduce((s,sg)=>{const lo=sg.intensity||0;const hi=sg.intensityHigh||lo;return s+((lo+hi)/2)*sg.sets;},0);
    const avgIntensity=(!_useRPE&&totalSets>0)?Math.round(wInt/totalSets):0;
    const volume=(_useTime||_useRPE)?0:groups.reduce((s,sg)=>s+sg.sets*sg.reps,0);
    ex={name,isComplex:false,useTime:_useTime,useRPE:_useRPE,setGroups:groups,scheme:_scheme,note,sets:totalSets,reps:(_useTime||_useRPE)?0:(groups[0]?.reps||0),seconds:_useTime?(groups[0]?.seconds||0):0,intensity:avgIntensity,volume,category};
  }

  if(_exSection==='warmup') {
    if(!wd.days[day].warmup) wd.days[day].warmup=[];
    wd.days[day].warmup.push(ex);
  } else {
    wd.days[day].exercises.push(ex);
  }
  closeModal(); renderMain();
}

    ?ex.supersetExercises.map(se=>({...se,intensityHigh:se.intensityHigh||0}))

      <select id="m-cat">

      </select>

    <div class="ex-type-tabs">

      <div class="ex-type-tab ${ex.isSuperset?'active':''}" id="tab-superset" onclick="switchExMode('superset')">Superset</div>
      <div class="ex-type-tab ${ex.isComplex?'active':''}" id="tab-complex" onclick="switchExMode('complex')">Complex</div>
    </div>
    <div id="ex-mode-body"></div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
      <button class="btn btn-gold" onclick="saveEditExercise('${day}',${idx},'${section}')">Save changes</button>

function buildCalendarHTML() {
  const p=prog();
  if(!p) return '<div class="empty-msg">No program selected.</div>';
  const ws=weekNums().sort((a,b)=>a-b);
  if(!ws.length) return '<div class="empty-msg">No weeks yet — add a week to get started.</div>';
  const PHASE_COLORS={accumulation:'#4A90D9',intensification:'#D4A017',realization:'#E85252',deload:'#7DC87D'};
  const days=trainingDays();
  const cards=ws.map(wn=>{
    const wd=getWeek(wn); if(!wd) return '';
    const totalVol=Object.values(wd.days||{}).reduce((s,d)=>s+(d.exercises||[]).reduce((a,e)=>a+(e.volume||0),0),0);
    const phaseColor=PHASE_COLORS[wd.phase]||'#4A90D9';
    const phaseName=wd.phase?(wd.phase.charAt(0).toUpperCase()+wd.phase.slice(1)):'—';
    const isActive=wn===state.currentWeek;
    const dayColumns=days.map(day=>{
      const dd=wd.days?.[day];
      const exes=dd?.exercises||[];
      const exList=exes.slice(0,6).map(ex=>{
        const nm=ex.isSuperset?`SS (${ex.supersetExercises?.length||2}ex)`:(ex.name||'Complex');
        const info=ex.isSuperset?`${ex.sets}×`
          :ex.isComplex?`${ex.sets}×${ex.repsPerSet}/set`
          :ex.useRPE?`${ex.sets}×${ex.reps} RPE${(ex.setGroups?.[0]?.rpe)||8}`
          :ex.useTime?`${ex.sets}×${ex.seconds||0}s`
          :`${ex.sets}×${ex.reps}`;
        return `<div style="display:flex;align-items:baseline;gap:4px;padding:1px 0;"><span class="cat-dot cat-${ex.category}" style="width:5px;height:5px;flex-shrink:0;margin-top:3px;"></span><span style="font-size:11px;color:var(--light);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:110px;">${nm}</span><span style="font-size:10px;color:var(--muted);white-space:nowrap;">${info}</span></div>`;
      }).join('');
      const more=exes.length>6?`<div style="font-size:10px;color:var(--muted);padding-top:1px;">+${exes.length-6} more</div>`:'';
      return `<div style="flex:1;min-width:0;padding:0 8px;border-left:1px solid var(--dark3);">
        <div style="font-size:10px;font-weight:700;color:${dd?.focus?'var(--gold-light)':'var(--muted)'};letter-spacing:.4px;text-transform:uppercase;margin-bottom:3px;">${day}${dd?.focus?`<span style="font-weight:400;color:var(--muted);margin-left:5px;font-size:9px;">${dd.focus}</span>`:''}</div>
        ${exList||'<div style="font-size:10px;color:var(--dark3);">Rest</div>'}
        ${more}
      </div>`;
    }).join('');
    return `<div class="cal-week-card ${isActive?'active':''}">
      <div class="cal-week-header">
        <div style="display:flex;align-items:center;gap:10px;flex:1;min-width:0;">
          <span style="font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;white-space:nowrap;">Week ${wn}</span>
          <span style="font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:600;padding:2px 8px;border-radius:3px;background:${phaseColor}22;color:${phaseColor};border:1px solid ${phaseColor}44;white-space:nowrap;">${phaseName}</span>
          ${wd.note?`<span style="font-size:11px;color:var(--muted);font-style:italic;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${wd.note}</span>`:''}
        </div>
        <div style="display:flex;align-items:center;gap:8px;flex-shrink:0;">
          <span style="font-size:11px;color:var(--muted);">Vol: <strong style="color:var(--white);">${totalVol}</strong></span>
          <button onclick="state.currentWeek=${wn};switchTab('program')" style="background:var(--gold-a15);border:1px solid var(--gold-a30);color:var(--gold);border-radius:3px;cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:600;padding:3px 10px;">Go →</button>
        </div>
      </div>
      <div style="display:flex;padding:8px 0 8px 8px;overflow-x:auto;">
        ${dayColumns}
      </div>
    </div>`;
  }).join('');
  const totalVol=ws.reduce((s,wn)=>{const wd=getWeek(wn);return s+Object.values(wd?.days||{}).reduce((a,d)=>a+(d.exercises||[]).reduce((b,e)=>b+(e.volume||0),0),0);},0);
  return `<div style="padding:1.25rem;">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;">
      <div>
        <h2 style="font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:700;margin:0;">${p.name} — Program Calendar</h2>
        <p style="font-size:12px;color:var(--muted);margin:3px 0 0;">${ws.length} weeks · ${totalVol} total reps</p>
      </div>
    </div>
    ${cards}
  </div>`;
}
