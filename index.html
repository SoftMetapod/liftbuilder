function _createDefaultTeam() {
  const id = 'team_1';
  _stateCore.teams[id] = { id, name: 'Team 1', programs: {}, roster: { athletes: [], customFields: [] }, meets: [] };
  _stateCore.activeTeamId = id;
}

function _ensureTeamInit(t) {
  if (!t.programs) t.programs = {};
  if (!t.roster) t.roster = { athletes: [], customFields: [] };
  if (!t.roster.athletes) t.roster.athletes = [];
  if (!t.roster.customFields) t.roster.customFields = [];
  if (!t.meets) t.meets = [];
  // Assign IDs to athletes that predate the ID field
  t.roster.athletes.forEach(a => {
    if (!a.id) a.id = 'ath_' + Date.now() + '_' + Math.floor(Math.random()*9999);
  });
}

function switchTeam(id) {
  if (!_stateCore.teams[id]) return;
  _stateCore.activeTeamId = id;
  const progs = Object.keys(state.programs);
  state.activeProgId = progs[0] || null;
  if (state.activeProgId) {
    const ws = Object.keys(state.programs[state.activeProgId]?.weeks || {}).map(Number).sort((a,b)=>a-b);
    state.currentWeek = ws[0] || 1;
  } else {
    state.currentWeek = 1;
  }
  state.activeTab = 'program';
  _rosterSel.clear();       // don't carry over selections from previous team
  _hiddenVolCats.clear();   // don't carry over volume legend filters
  _activeMeetId = null;     // don't open a meet that belongs to the previous team
  _meetFilter = { timing: '', homeAway: '' };
  saveState();
  render();
}

function openEditDay(day) {

function addLibraryExerciseToDayDirect(libIdx, day) {
  const wd = getWeek(state.currentWeek); if (!wd) return;
  const e = (state.exerciseLibrary||[])[libIdx]; if (!e) return;
  const ex = {
    name: e.name, isComplex: false, isSuperset: false,
    useTime: e.useTime||false, useRPE: e.useRPE||false,
    scheme: e.scheme||'normal', note: e.note||'',
    setGroups: e.setGroups ? e.setGroups.map(sg=>({...sg})) : [{sets:e.sets||3,reps:e.reps||1,seconds:e.seconds||30,intensity:e.intensity||0,intensityHigh:e.intensityHigh||0,rpe:e.rpe||8}],
    sets: e.sets||3, reps: e.useTime?0:(e.reps||0), seconds: e.useTime?(e.seconds||30):0,
    intensity: e.intensity||0, volume: e.volume||0, category: e.category||'other',
  };
  if (!wd.days[day]) wd.days[day]={focus:'',mobility:'',dayNote:'',exercises:[],warmup:[],accessories:[]};
  wd.days[day].exercises.push(ex);

  showToast(`"${e.name}" added to ${day}`);
  renderLibraryContent();
}

function setWeekPhase(weekNum, phase) {
  const wd=getWeek(weekNum); if(!wd) return;
  wd.phase=phase;
  saveState();
  renderProgBar();
}

function saveNewWeek() {
  const w=parseInt(document.getElementById('m-wk').value);
  const phase=document.getElementById('m-phase').value;

  if(!w) return;
  const days={};
  trainingDays().forEach(d=>{days[d]={focus:'',mobility:'',dayNote:'',exercises:[],warmup:[],accessories:[]};});

  state.currentWeek=w;

}

function autoNameComplex() {
  const nameEl=document.getElementById('m-name');
  if(!nameEl||nameEl.value.trim()) return; // don't overwrite if coach typed one
  const filled=_movements.filter(m=>m.name.trim());
  if(filled.length>=2) nameEl.placeholder=filled.map(m=>`${m.reps}× ${m.name}`).join(' + ');
}

function updateComplexVol() {
  const totalSets=_complexGroups.reduce((s,cg)=>s+(cg.sets||0),0);
  const repsPerSet=_movements.reduce((s,m)=>s+(parseInt(m.reps)||0),0);
  const total=totalSets*repsPerSet;
  const el=document.getElementById('vol-preview-val');
  if(el) el.textContent=`${total} reps (${repsPerSet}/set × ${totalSets} sets)`;
}

function autoVol() {
  const el=document.getElementById('vol-preview-val'); if(!el) return;
  if(_exMode==='superset') {
    const totalReps=_supersetSets*_supersetExercises.filter(se=>!se.useTime).reduce((s,se)=>s+(se.reps||0),0);
    const totalSecs=_supersetSets*_supersetExercises.filter(se=>se.useTime).reduce((s,se)=>s+(se.seconds||0),0);
    const parts=[]; if(totalReps) parts.push(`${totalReps} reps`); if(totalSecs) parts.push(`${totalSecs}s`);
    el.textContent=`${parts.join(' + ')} (${_supersetSets} sets × ${_supersetExercises.length} exercises)`;
    return;
  }
  const totalSets=_setGroups.reduce((s,sg)=>s+(sg.sets||0),0);
  if(_useTime) {
    const totalSecs=_setGroups.reduce((s,sg)=>s+(sg.sets||0)*(sg.seconds||0),0);
    el.textContent=`${totalSecs}s total (${totalSets} set${totalSets!==1?'s':''})`;
  } else {
    const total=_setGroups.reduce((s,sg)=>s+(sg.sets||0)*(sg.reps||0),0);
    el.textContent=`${total} reps (${totalSets} set${totalSets!==1?'s':''})`;
  }
}

function saveExercise() {
  const day=document.getElementById('m-day').value;
  const category=document.getElementById('m-cat').value;
  const wd=getWeek(state.currentWeek);
  if(!wd.days[day]) wd.days[day]={focus:'',mobility:'',exercises:[]};

  let ex;
  if(_exMode==='complex') {
    const filled=_movements.filter(m=>m.name.trim());
    if(!filled.length){alert('Add at least one movement to the complex.');return;}
    const repsPerSet=filled.reduce((s,m)=>s+(parseInt(m.reps)||0),0);
    const groups=_complexGroups.map(cg=>({sets:parseInt(cg.sets)||1,intensity:parseInt(cg.intensity)||0}));
    const totalSets=groups.reduce((s,cg)=>s+cg.sets,0);
    const wInt=groups.reduce((s,cg)=>s+cg.intensity*cg.sets,0);
    const avgIntensity=totalSets>0?Math.round(wInt/totalSets):0;
    const volume=totalSets*repsPerSet;
    const rawName=document.getElementById('m-name').value.trim();
    const autoName=filled.map(m=>`${m.reps}× ${m.name}`).join(' + ');
    const topCat=document.getElementById('m-cat').value||filled[0].category||'other';
    ex={
      name: rawName||autoName,
      isComplex: true,
      movements: filled.map(m=>({name:m.name.trim(),reps:parseInt(m.reps)||1,category:m.category||'other'})),
      complexGroups: groups,
      sets: totalSets,
      reps: volume,
      repsPerSet,
      intensity: avgIntensity,
      volume,
      category: topCat
    };
  } else if(_exMode==='superset') {
    const filled=_supersetExercises.filter(se=>se.name.trim());
    if(filled.length<2){alert('Enter names for at least 2 exercises in the superset.');return;}
    const sets=_supersetSets||1;
    const volume=sets*filled.filter(se=>!se.useRPE&&!se.useTime).reduce((s,se)=>s+(se.reps||0),0);
    const pctEx=filled.filter(se=>!se.useRPE);
    const avgInt=pctEx.length?Math.round(pctEx.reduce((s,se)=>s+(se.intensity||0),0)/pctEx.length):0;
    ex={name:'',isSuperset:true,isComplex:false,supersetExercises:filled.map(se=>({name:se.name.trim(),category:se.category||'other',reps:se.reps||1,seconds:se.seconds||30,intensity:se.useRPE?0:(se.intensity||0),intensityHigh:se.intensityHigh||0,useTime:se.useTime||false,rpe:se.rpe||8,useRPE:se.useRPE||false})),sets,volume,intensity:avgInt,scheme:'normal',category:filled[0].category||'other'};
  } else {
    const name=document.getElementById('m-name').value.trim();
    if(!name){alert('Please enter an exercise name.');return;}
    const note=(document.getElementById('m-note')||{}).value?.trim()||'';
    const groups=_setGroups.map(sg=>({
      sets:parseInt(sg.sets)||1,
      reps:_useTime?0:(parseInt(sg.reps)||1),
      seconds:_useTime?(parseInt(sg.seconds)||30):0,
      intensity:_useRPE?0:(parseInt(sg.intensity)||0),
      intensityHigh:_useRPE?0:(parseInt(sg.intensityHigh)||0),
      rpe:_useRPE?(parseFloat(sg.rpe)||8):0
    }));
    const totalSets=groups.reduce((s,sg)=>s+sg.sets,0);
    const wInt=_useRPE?0:groups.reduce((s,sg)=>{const lo=sg.intensity||0;const hi=sg.intensityHigh||lo;return s+((lo+hi)/2)*sg.sets;},0);
    const avgIntensity=(!_useRPE&&totalSets>0)?Math.round(wInt/totalSets):0;
    const volume=(_useTime||_useRPE)?0:groups.reduce((s,sg)=>s+sg.sets*sg.reps,0);
    ex={name,isComplex:false,useTime:_useTime,useRPE:_useRPE,setGroups:groups,scheme:_scheme,note,sets:totalSets,reps:_useTime?0:(groups[0]?.reps||0),seconds:_useTime?(groups[0]?.seconds||0):0,intensity:avgIntensity,volume,category};
  }

  if(_exSection==='warmup') {
    if(!wd.days[day].warmup) wd.days[day].warmup=[];
    wd.days[day].warmup.push(ex);
  } else if(_exSection==='accessory') {
    if(!wd.days[day].accessories) wd.days[day].accessories=[];
    wd.days[day].accessories.push(ex);
  } else {
    wd.days[day].exercises.push(ex);
  }
  closeModal(); renderMain();
}

function openEditExercise(day, idx, section='main') {
  const wd=getWeek(state.currentWeek); if(!wd) return;
  const srcArr=section==='warmup'?(wd.days[day]?.warmup||[]):section==='accessory'?(wd.days[day]?.accessories||[]):wd.days[day]?.exercises;
  const ex=srcArr?srcArr[idx]:null; if(!ex) return;
  const days=trainingDays();
  _exSection=section;

  _exMode=ex.isSuperset?'superset':ex.isComplex?'complex':'single';
  _useTime=ex.useTime||false;
  _useRPE=ex.useRPE||false;
  _exNote=ex.note||'';
  _scheme=ex.scheme||'normal';
  _movements=ex.isComplex
    ? ex.movements.map(m=>({name:m.name,reps:m.reps,category:m.category||'other'}))
    : [{name:'',reps:1,category:'other'}];
  _complexGroups=ex.isComplex
    ? (ex.complexGroups?ex.complexGroups.map(cg=>({...cg})):[{sets:ex.sets||1,intensity:ex.intensity||0}])
    : [{sets:3,intensity:70}];
  _setGroups=ex.isComplex||ex.isSuperset?[]
    :(ex.setGroups?ex.setGroups.map(sg=>({...sg,intensityHigh:sg.intensityHigh||0,rpe:sg.rpe||8})):[{sets:ex.sets||1,reps:ex.reps||1,seconds:ex.seconds||30,intensity:ex.intensity||0,intensityHigh:0,rpe:8}]);
  _supersetSets=ex.isSuperset?(ex.sets||3):3;
  _supersetExercises=ex.isSuperset&&ex.supersetExercises
    ?ex.supersetExercises.map(se=>({...se,intensityHigh:se.intensityHigh||0,rpe:se.rpe||8,useRPE:se.useRPE||false}))
    :[{name:'',category:'squat',reps:5,seconds:30,intensity:0,intensityHigh:0,useTime:false,rpe:8,useRPE:false},{name:'',category:'accessory',reps:10,seconds:30,intensity:0,intensityHigh:0,useTime:false,rpe:8,useRPE:false}];

  document.getElementById('modal-body').innerHTML=`
    <h3>Edit Exercise</h3>
    <div class="fg2" style="margin-bottom:.75rem;">
      <div class="form-field" style="margin-bottom:0;"><label>Day</label>
        <select id="m-day">${days.map(d=>`<option value="${d}"${d===day?' selected':''}>${d}</option>`).join('')}</select>
      </div>
      <div class="form-field" style="margin-bottom:0;"><label>Section</label>
        <select id="m-section" onchange="_exSection=this.value">
          <option value="main" ${section==='main'?'selected':''}>Working sets</option>
          <option value="warmup" ${section==='warmup'?'selected':''}>Warm-up</option>
          <option value="accessory" ${section==='accessory'?'selected':''}>Accessory</option>
        </select>
      </div>
    </div>
    <div class="form-field" style="margin-bottom:.75rem;"><label>Category</label>
      <select id="m-cat">
        ${Object.entries(CAT_META).map(([k,v])=>`<option value="${k}"${ex.category===k?' selected':''}>${v.label}</option>`).join('')}
      </select>
    </div>
    <div class="ex-type-tabs">
      <div class="ex-type-tab ${!ex.isComplex&&!ex.isSuperset?'active':''}" id="tab-single" onclick="switchExMode('single')">Single exercise</div>
      <div class="ex-type-tab ${ex.isSuperset?'active':''}" id="tab-superset" onclick="switchExMode('superset')">Superset</div>
      <div class="ex-type-tab ${ex.isComplex?'active':''}" id="tab-complex" onclick="switchExMode('complex')">Complex</div>
    </div>
    <div id="ex-mode-body"></div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
      <button class="btn btn-gold" onclick="saveEditExercise('${day}',${idx},'${section}')">Save changes</button>
    </div>`;
  document.getElementById('overlay').style.display='flex';

  renderExModeBody();
  if(ex.isSuperset) {
    // superset: renderExModeBody already called renderSupersetRows via its branch
  } else if(!ex.isComplex) {
    const nb=document.getElementById('m-name'); if(nb) nb.value=ex.name||'';
    renderSetGroups();
    renderSchemeSelector();
  } else {
    const nb=document.getElementById('m-name'); if(nb) nb.value=ex.name||'';
    renderComplexGroups();
  }
}

function saveEditExercise(day, idx, section='main') {
  const wd=getWeek(state.currentWeek); if(!wd) return;
  const newDay=document.getElementById('m-day').value;
  const newSection=document.getElementById('m-section').value;
  const category=document.getElementById('m-cat').value;

  let ex;
  if(_exMode==='complex') {
    const filled=_movements.filter(m=>m.name.trim());
    if(!filled.length){alert('Add at least one movement to the complex.');return;}
    const repsPerSet=filled.reduce((s,m)=>s+(parseInt(m.reps)||0),0);
    const groups=_complexGroups.map(cg=>({sets:parseInt(cg.sets)||1,intensity:parseInt(cg.intensity)||0}));
    const totalSets=groups.reduce((s,cg)=>s+cg.sets,0);
    const wInt=groups.reduce((s,cg)=>s+cg.intensity*cg.sets,0);
    const avgIntensity=totalSets>0?Math.round(wInt/totalSets):0;
    const volume=totalSets*repsPerSet;
    const rawName=document.getElementById('m-name').value.trim();
    const autoName=filled.map(m=>`${m.reps}× ${m.name}`).join(' + ');
    ex={name:rawName||autoName,isComplex:true,movements:filled.map(m=>({name:m.name.trim(),reps:parseInt(m.reps)||1,category:m.category||'other'})),complexGroups:groups,sets:totalSets,reps:volume,repsPerSet,intensity:avgIntensity,volume,category};
  } else if(_exMode==='superset') {
    const filled=_supersetExercises.filter(se=>se.name.trim());
    if(filled.length<2){alert('Enter names for at least 2 exercises in the superset.');return;}
    const sets=_supersetSets||1;
    const volume=sets*filled.filter(se=>!se.useRPE&&!se.useTime).reduce((s,se)=>s+(se.reps||0),0);
    const pctEx=filled.filter(se=>!se.useRPE);
    const avgInt=pctEx.length?Math.round(pctEx.reduce((s,se)=>s+(se.intensity||0),0)/pctEx.length):0;
    ex={name:'',isSuperset:true,isComplex:false,supersetExercises:filled.map(se=>({name:se.name.trim(),category:se.category||'other',reps:se.reps||1,seconds:se.seconds||30,intensity:se.useRPE?0:(se.intensity||0),intensityHigh:se.intensityHigh||0,useTime:se.useTime||false,rpe:se.rpe||8,useRPE:se.useRPE||false})),sets,volume,intensity:avgInt,scheme:'normal',category:filled[0].category||'other'};
  } else {
    const name=document.getElementById('m-name').value.trim();
    if(!name){alert('Please enter an exercise name.');return;}
    const note=(document.getElementById('m-note')||{}).value?.trim()||'';
    const groups=_setGroups.map(sg=>({
      sets:parseInt(sg.sets)||1,
      reps:_useTime?0:(parseInt(sg.reps)||1),
      seconds:_useTime?(parseInt(sg.seconds)||30):0,
      intensity:_useRPE?0:(parseInt(sg.intensity)||0),
      intensityHigh:_useRPE?0:(parseInt(sg.intensityHigh)||0),
      rpe:_useRPE?(parseFloat(sg.rpe)||8):0
    }));
    const totalSets=groups.reduce((s,sg)=>s+sg.sets,0);
    const wInt=_useRPE?0:groups.reduce((s,sg)=>{const lo=sg.intensity||0;const hi=sg.intensityHigh||lo;return s+((lo+hi)/2)*sg.sets;},0);
    const avgIntensity=(!_useRPE&&totalSets>0)?Math.round(wInt/totalSets):0;
    const volume=(_useTime||_useRPE)?0:groups.reduce((s,sg)=>s+sg.sets*sg.reps,0);
    ex={name,isComplex:false,useTime:_useTime,useRPE:_useRPE,setGroups:groups,scheme:_scheme,note,sets:totalSets,reps:_useTime?0:(groups[0]?.reps||0),seconds:_useTime?(groups[0]?.seconds||0):0,intensity:avgIntensity,volume,category};
  }

  // Remove from source array
  const srcArr=section==='warmup'?(wd.days[day].warmup||[]):section==='accessory'?(wd.days[day].accessories||[]):wd.days[day].exercises;
  srcArr.splice(idx,1);
  // Insert into destination
  if(!wd.days[newDay]) wd.days[newDay]={focus:'',mobility:'',dayNote:'',exercises:[],warmup:[],accessories:[]};
  const destArr=newSection==='warmup'?(wd.days[newDay].warmup||(wd.days[newDay].warmup=[])):newSection==='accessory'?(wd.days[newDay].accessories||(wd.days[newDay].accessories=[])):wd.days[newDay].exercises;
  if(newDay===day && newSection===section) {
    destArr.splice(idx,0,ex); // preserve position when staying in same place
  } else {
    destArr.push(ex);
  }
  closeModal(); renderMain();
}

function calChangeView(v) { _calView=v; renderMain(); }
function setProgStartDate(date) { const p=prog(); if(!p) return; p.startDate=date; saveState(); renderMain(); }
function calNavPrev() {
  if (_calView==='month') {
    _calNavMonth--; if (_calNavMonth<0) { _calNavMonth=11; _calNavYear--; }
  } else if (_calView==='week') {
    const ws=weekNums(); const idx=ws.indexOf(_calNavWeek); if(idx>0) _calNavWeek=ws[idx-1];
  }
  renderMain();
}
function calNavNext() {
  if (_calView==='month') {
    _calNavMonth++; if (_calNavMonth>11) { _calNavMonth=0; _calNavYear++; }
  } else if (_calView==='week') {
    const ws=weekNums(); const idx=ws.indexOf(_calNavWeek); if(idx<ws.length-1) _calNavWeek=ws[idx+1];
  }
  renderMain();
}

function buildCalendarHTML() {
  const p = prog();
  if (!p) return '<div class="empty-msg">No program selected.</div>';
  const ws = weekNums().sort((a,b)=>a-b);
  if (!ws.length) return '<div class="empty-msg">No weeks yet — add a week on the Program tab first.</div>';

  const startDate = p.startDate || null;
  const tDaySet   = new Set(trainingDays());
  const DAY_NAMES = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
  const MONTH_NAMES = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const PC = {accumulation:'#4A90D9',intensification:'#D4A017',realization:'#E85252',deload:'#7DC87D'};
  const today = new Date(); today.setHours(0,0,0,0);

  // Build meet lookup: ISO date string → [meet, ...]
  const meetsByDate = {};
  (state.meets||[]).forEach(m => {
    if (!m.date) return;
    if (!meetsByDate[m.date]) meetsByDate[m.date] = [];
    meetsByDate[m.date].push(m);
  });
  function dateISO(d) { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
  function meetBadge(m, compact=true) {
    const color = m.eventType==='Games' ? '#A87FD4' : '#C9A84C';
    const icon  = m.eventType==='Games' ? '🏆' : '📋';
    const ha    = m.homeAway==='Home' ? ` · H` : m.homeAway==='Away' ? ` · A` : '';
    const name  = compact ? (m.name.length>14 ? m.name.slice(0,13)+'…' : m.name) : m.name;
    return `<div style="margin-top:2px;padding:1px 5px;border-radius:3px;background:${color}18;border:1px solid ${color}40;font-size:9px;font-family:'Barlow Condensed',sans-serif;font-weight:700;color:${color};word-break:break-word;cursor:pointer;" onclick="event.stopPropagation();_activeMeetId='${m.id}';switchTab('meets')" title="${esc(m.name)}">${icon} ${esc(name)}${ha}</div>`;
  }

  function progDate(weekNum, dayName) {
    if (!startDate) return null;
    const base = new Date(startDate+'T00:00:00');
    base.setDate(base.getDate() + (weekNum-1)*7 + DAY_NAMES.indexOf(dayName));
    return base;
  }
  function progDayForDate(date) {
    if (!startDate) return null;
    const base = new Date(startDate+'T00:00:00');
    const diff = Math.round((date - base) / 86400000);
    if (diff < 0 || diff >= ws.length*7) return null;
    const wi = Math.floor(diff/7), di = diff%7;
    return { weekNum: ws[wi], dayName: DAY_NAMES[di] };
  }
  const noDateBanner = !startDate ? `<div style="margin-bottom:1rem;padding:10px 14px;background:var(--dark2);border:1px solid var(--dark3);border-left:3px solid var(--gold);border-radius:4px;font-size:12px;color:var(--muted);">Set a <strong style="color:var(--white);">Start date</strong> in the sub-header to sync weeks with real calendar dates.</div>` : '';

  // ── MONTH VIEW ───────────────────────────────────────────────────────────
  if (_calView === 'month') {
    const year = _calNavYear, month = _calNavMonth;
    const firstDow = (new Date(year,month,1).getDay()+6)%7; // 0=Mon
    const daysInMonth = new Date(year,month+1,0).getDate();
    // pad to full weeks
    const totalCells = Math.ceil((firstDow+daysInMonth)/7)*7;
    const DAY_ABBR = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
    const hdrs = DAY_ABBR.map(d=>`<div style="text-align:center;font-size:11px;font-weight:700;color:var(--muted);padding:5px 0;font-family:'Barlow Condensed',sans-serif;letter-spacing:.8px;border-bottom:1px solid var(--dark3);">${d}</div>`).join('');
    const cells = Array.from({length:totalCells},(_,i)=>{
      const dayNum = i - firstDow + 1;
      const date = new Date(year, month, dayNum);
      const inMonth = dayNum>=1 && dayNum<=daysInMonth;
      const isToday = date.getTime()===today.getTime();
      const pd = progDayForDate(date);
      const isTraining = pd && tDaySet.has(pd.dayName);
      const wd = pd ? getWeek(pd.weekNum) : null;
      const phaseColor = isTraining ? (PC[wd?.phase]||'#4A90D9') : '';
      const focus = isTraining ? (wd?.days?.[pd.dayName]?.focus||'') : '';
      const iso = dateISO(date);
      const dayMeets = inMonth ? (meetsByDate[iso]||[]) : [];
      const hasMeet = dayMeets.length > 0;
      return `<div onclick="${isTraining?`state.currentWeek=${pd.weekNum};switchTab('program')`:''}" style="height:90px;overflow:hidden;padding:8px;border-radius:6px;border:1px solid ${isTraining?phaseColor+'44':hasMeet?'#C9A84C44':'var(--dark3)'};background:${isTraining?phaseColor+'10':'var(--dark1)'};opacity:${inMonth?(isTraining||hasMeet?1:0.45):0.2};cursor:${isTraining?'pointer':'default'};${isToday?'box-shadow:inset 0 0 0 2px var(--gold);':''}">
        <div style="font-size:12px;font-weight:${isToday?700:400};color:${isToday?'var(--gold)':'var(--muted)'};margin-bottom:4px;">${date.getDate()}</div>
        ${isTraining
          ? `${focus?`<div style="font-size:11px;font-weight:600;color:var(--white);word-break:break-word;">${esc(focus)}</div>`:''}
             ${!focus?`<div style="font-size:10px;color:${phaseColor};font-weight:600;">Training</div>`:''}`
          : `<div style="font-size:10px;color:var(--dark3);">Rest</div>`}
        ${dayMeets.map(m=>meetBadge(m,true)).join('')}
      </div>`;
    }).join('');
    return `<div style="padding:1.25rem;max-width:900px;">${noDateBanner}<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px;">${hdrs}${cells}</div></div>`;
  }

  // ── WEEK VIEW ────────────────────────────────────────────────────────────
  if (_calView === 'week') {
    const wn = _calNavWeek;
    const wd = getWeek(wn);
    if (!wd) return '<div class="empty-msg">Week not found.</div>';
    const phaseColor = PC[wd.phase]||'#4A90D9';
    const phaseName = PHASES[wd.phase]||wd.phase||'—';
    const cards = DAY_NAMES.map(dayName => {
      const isTrain = tDaySet.has(dayName);
      const dd = wd.days?.[dayName];
      const focus = dd?.focus||'';
      const exCount = dd?.exercises?.length||0;
      const warmCount = dd?.warmup?.length||0;
      const date = progDate(wn, dayName);
      const isToday = date && date.getTime()===today.getTime();
      const dayMeets = date ? (meetsByDate[dateISO(date)]||[]) : [];
      const hasMeet = dayMeets.length > 0;
      return `<div style="flex:1;min-width:100px;padding:12px;border-radius:6px;border:1px solid ${isTrain?phaseColor+'44':hasMeet?'#C9A84C44':'var(--dark3)'};background:${isTrain?phaseColor+'10':'var(--dark1)'};opacity:${isTrain||hasMeet?1:0.4};${isToday?'box-shadow:inset 0 0 0 2px var(--gold);':''}">
        <div style="font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;color:var(--muted);margin-bottom:2px;letter-spacing:.5px;">${date?date.toLocaleDateString('en-US',{weekday:'short'}).toUpperCase():dayName.slice(0,3).toUpperCase()}</div>
        ${date?`<div style="font-size:12px;color:${isToday?'var(--gold)':'var(--muted)'};font-weight:${isToday?700:400};margin-bottom:8px;">${date.toLocaleDateString('en-US',{month:'short',day:'numeric'})}</div>`:''}
        ${isTrain?`${focus?`<div style="font-size:14px;font-weight:600;color:var(--white);margin-bottom:6px;">${esc(focus)}</div>`:''}
          <div style="font-size:11px;color:var(--muted);">${exCount} working exercise${exCount!==1?'s':''}</div>
          ${warmCount?`<div style="font-size:11px;color:var(--muted);">${warmCount} warm-up</div>`:''}
          <button onclick="state.currentWeek=${wn};switchTab('program')" style="margin-top:10px;background:none;border:1px solid ${phaseColor}50;color:${phaseColor};border-radius:3px;cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;padding:3px 10px;">Go →</button>
        `:`<div style="font-size:11px;color:var(--dark3);margin-top:4px;">Rest</div>`}
        ${dayMeets.map(m=>meetBadge(m,false)).join('')}
      </div>`;
    }).join('');
    return `<div style="padding:1.25rem;">${noDateBanner}<div style="display:flex;align-items:center;gap:10px;margin-bottom:1rem;">
      <span style="font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:700;">Week ${wn}</span>
      <span style="font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:600;padding:2px 10px;border-radius:3px;background:${phaseColor}22;color:${phaseColor};">${phaseName.toUpperCase()}</span>
      ${wd.note?`<span style="font-size:12px;color:var(--muted);font-style:italic;">${esc(wd.note)}</span>`:''}
    </div><div style="display:flex;gap:8px;">${cards}</div></div>`;
  }

  // ── OVERVIEW ─────────────────────────────────────────────────────────────
  const cards = ws.map(wn=>{
    const wd=getWeek(wn); if(!wd) return '';
    const phaseColor=PC[wd.phase]||'#4A90D9';
    const phaseName=wd.phase?(wd.phase.charAt(0).toUpperCase()+wd.phase.slice(1)):'—';
    const totalVol=Object.values(wd.days||{}).reduce((s,d)=>s+(d.exercises||[]).reduce((a,e)=>a+(e.volume||0),0),0);
    const isActive=wn===state.currentWeek;
    const startD=progDate(wn,'Monday'), endD=progDate(wn,'Sunday');
    const dateRange=startD&&endD?`${startD.toLocaleDateString('en-US',{month:'short',day:'numeric'})} – ${endD.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}`:'';
    const dayColumns=DAY_NAMES.map(day=>{
      const isTrain=tDaySet.has(day);
      const dd=wd.days?.[day];
      const focus=dd?.focus||'';
      const date=progDate(wn,day);
      const dateNum=date?date.getDate():'';
      const dayMeets=date?(meetsByDate[dateISO(date)]||[]):[];
      return `<div style="flex:1;min-width:0;padding:0 7px;border-left:1px solid var(--dark3);opacity:${isTrain||dayMeets.length?1:0.35};">
        <div style="font-size:9px;font-weight:700;color:var(--muted);letter-spacing:.4px;text-transform:uppercase;margin-bottom:2px;">${day.slice(0,3)}${dateNum?` <span style="font-weight:400;opacity:.7;">${dateNum}</span>`:''}</div>
        <div style="font-size:10px;color:${isTrain&&focus?'var(--light)':'var(--dark3)'};white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${isTrain?(focus||'—'):'Rest'}</div>
        ${dayMeets.map(m=>meetBadge(m,true)).join('')}
      </div>`;
    }).join('');
    return `<div class="cal-week-card ${isActive?'active':''}">
      <div class="cal-week-header">
        <div style="display:flex;align-items:center;gap:8px;flex:1;min-width:0;">
          <span style="font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;white-space:nowrap;">Week ${wn}</span>
          <span style="font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:600;padding:2px 7px;border-radius:3px;background:${phaseColor}22;color:${phaseColor};border:1px solid ${phaseColor}44;white-space:nowrap;">${phaseName.toUpperCase()}</span>
          ${dateRange?`<span style="font-size:11px;color:var(--muted);white-space:nowrap;">${dateRange}</span>`:''}
        </div>
        <div style="display:flex;align-items:center;gap:8px;flex-shrink:0;">
          <span style="font-size:11px;color:var(--muted);">Vol: <strong style="color:var(--white);">${totalVol}</strong></span>
          <button onclick="state.currentWeek=${wn};switchTab('program')" style="background:var(--gold-a15);border:1px solid var(--gold-a30);color:var(--gold);border-radius:3px;cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:600;padding:3px 10px;">Go →</button>
        </div>
      </div>
      <div style="display:flex;padding:6px 0 6px 6px;overflow-x:auto;">${dayColumns}</div>
    </div>`;
  }).join('');
  return `<div style="padding:1.25rem;">${noDateBanner}${cards}</div>`;
}

function saveToLibraryFromModal() {
  const name=(document.getElementById('m-name')||{}).value?.trim();
  if(!name){alert('Enter an exercise name before saving to library.');return;}
  const category=(document.getElementById('m-cat')||{}).value||'other';
  const note=(document.getElementById('m-note')||{}).value?.trim()||'';
  const groups=_setGroups.map(sg=>({...sg}));
  const totalSets=groups.reduce((s,sg)=>s+sg.sets,0);
  const entry={name,category,note,useTime:_useTime,useRPE:_useRPE,scheme:_scheme,setGroups:groups,
    sets:totalSets,reps:_useTime?0:(groups[0]?.reps||0),seconds:_useTime?(groups[0]?.seconds||0):0,
    intensity:groups[0]?.intensity||0,intensityHigh:groups[0]?.intensityHigh||0,rpe:groups[0]?.rpe||0};
  if(_libraryEditIdx>=0) {
    state.exerciseLibrary[_libraryEditIdx]=entry;
  } else {
    const existing=state.exerciseLibrary.findIndex(e=>e.name.toLowerCase()===name.toLowerCase());
    if(existing>=0){
      if(!confirm(`"${name}" is already in your library. Overwrite it?`)) return;
      state.exerciseLibrary[existing]=entry;
    } else {
      state.exerciseLibrary.push(entry);
    }
  }
  saveState();
  if(_libraryMode){
    closeModal();
    renderMain();
  } else {
    alert(`"${name}" saved to library.`);
  }
}

function removeFromLibrary(idx) {
  if(!confirm('Remove this exercise from your library?')) return;
  state.exerciseLibrary.splice(idx,1);
  saveState();
  renderMain();
}

function calcWeight(max, pct) {
  if (!max || max <= 0) return '—';
  const raw = max * pct / 100;
  if (state.weightUnit === 'kg') return Math.round(raw / 2.5) * 2.5; // round to nearest 2.5
  return Math.round(raw / 2.5) * 2.5; // same rounding in lbs
}

  const athletes = (state.roster.athletes || []).filter(a => a.name);
  const unit = state.weightUnit;
  const pcts = [];
  for (let p = 50; p <= 105; p += 2.5) pcts.push(p);
  const lifts = [
    {id:'snatch', label:'Snatch'},
    {id:'cj',     label:'C&J'},
    {id:'fsq',    label:'Front Squat'},
    {id:'bsq',    label:'Back Squat'},

    <div class="form-field" style="margin-bottom:0;">

        style="background:var(--dark2);border:1px solid var(--dark3);color:var(--white);border-radius:4px;padding:6px 8px;font-size:14px;width:100%;text-align:center;"
        oninput="renderCalcTable()">
    </div>`).join('');
  return `<div style="padding:1.25rem;max-width:780px;">
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:1rem;">${maxRow}</div>
    <div id="calc-table-wrap" style="overflow-x:auto;">
      <table style="width:100%;border-collapse:collapse;font-size:13px;">
        <thead>
          <tr style="background:var(--dark2);">
            <th style="padding:7px 10px;text-align:center;font-family:'Barlow Condensed',sans-serif;font-size:11px;letter-spacing:1px;color:var(--muted);border-bottom:1px solid var(--dark3);">%</th>
            ${lifts.map(l=>`<th style="padding:7px 10px;text-align:center;font-family:'Barlow Condensed',sans-serif;font-size:11px;letter-spacing:1px;color:var(--muted);border-bottom:1px solid var(--dark3);">${l.label}</th>`).join('')}
          </tr>
        </thead>
        <tbody id="calc-table-body">
          ${pcts.map((p,i)=>`<tr style="background:${i%2===0?'transparent':'var(--dark1)'};">
            <td style="padding:6px 10px;text-align:center;font-weight:600;color:var(--gold);font-family:'Barlow Condensed',sans-serif;font-size:13px;">${p}%</td>
            ${lifts.map(l=>`<td id="ctd-${l.id}-${p}" style="padding:6px 10px;text-align:center;color:var(--muted);">—</td>`).join('')}
          </tr>`).join('')}
        </tbody>
      </table>
    </div>
  </div>`;
}

function loadAthleteIntoCalc() {
  const sel = document.getElementById('calc-athlete'); if (!sel) return;
  const val = sel.value;
  const a = (state.roster.athletes||[]).find(a=>(a.id||a.name)===val);
  if (!a) return;
  const unit = state.weightUnit;
  const conv = unit==='kg' ? (1/2.20462) : 1;  // stored as lbs; convert to kg if needed
  ['snatch','cj','fsq','bsq'].forEach(k => {
    const el = document.getElementById('calc-'+k);
    if (el) { const raw = a[k]||0; el.value = raw ? Math.round(raw*conv) : ''; }
  });
  renderCalcTable();
}

function renderCalcTable() {
  const lifts = ['snatch','cj','fsq','bsq'];
  const maxes = {};
  lifts.forEach(k => { const el=document.getElementById('calc-'+k); maxes[k]=el?parseFloat(el.value)||0:0; });
  const pcts = [];
  for (let p = 50; p <= 105; p += 2.5) pcts.push(p);
  pcts.forEach(p => {
    lifts.forEach(k => {
      const td = document.getElementById(`ctd-${k}-${p}`);
      if (!td) return;
      const w = calcWeight(maxes[k], p);
      if (w === '—') { td.textContent='—'; td.style.color='var(--muted)'; }
      else { td.textContent=w; td.style.color='var(--white)'; }
    });
  });
}

// ═══════════════════════════════════════════════════
//  ATTEMPT HELPERS
// ═══════════════════════════════════════════════════
function roundAttempt(weight) {
  if (!weight || weight <= 0) return null;
  return state.weightUnit === 'kg'
    ? Math.round(weight)         // 1kg precision
    : Math.round(weight / 5) * 5; // 5lb precision
}

function toggleMeetSuggest(ei) {
  const el = document.getElementById('meet-suggest-' + ei);
  if (el) el.style.display = el.style.display === 'none' ? 'table-row' : 'none';
}

function fillMeetAttempts(meetId, ei, sMax, cjMax, bMax) {
  const meet = (state.meets||[]).find(m=>m.id===meetId);
  if (!meet) return;
  const e = meet.entries[ei]; if (!e) return;
  if (sMax)  e.snatchAttempts = [roundAttempt(sMax*.90), roundAttempt(sMax*.98), roundAttempt(sMax*1.03)];
  if (cjMax) e.cjAttempts     = [roundAttempt(cjMax*.90), roundAttempt(cjMax*.98), roundAttempt(cjMax*1.03)];
  if (bMax)  e.benchAttempts  = [roundAttempt(bMax*.90), roundAttempt(bMax*.98), roundAttempt(bMax*1.03)];
  saveState();
}

//  MEET PLANNER
// ═══════════════════════════════════════════════════
function newMeetId() { return 'meet_'+Date.now(); }

let _activeMeetId = null;
let _meetFilter = { timing: '', homeAway: '' };

function buildMeetsHTML() {
  if (_activeMeetId) {
    const meet = (state.meets||[]).find(m=>m.id===_activeMeetId);
    if (meet) return buildMeetDetailHTML(meet);
    _activeMeetId = null;
  }
  const meets = state.meets || [];
  const today = new Date().toISOString().slice(0,10);
  const haFilter = _meetFilter.homeAway;
  const filtered = haFilter ? meets.filter(m => (m.homeAway||'Away') === haFilter) : meets;
  const showUpcoming = _meetFilter.timing !== 'past';
  const showPast     = _meetFilter.timing !== 'upcoming';
  const upcoming = showUpcoming ? filtered.filter(m => !m.date || m.date >= today).sort((a,b)=>(a.date||'9999').localeCompare(b.date||'9999')) : [];
  const past     = showPast    ? filtered.filter(m =>  m.date && m.date <  today).sort((a,b)=>b.date.localeCompare(a.date)) : [];

  function eventCard(m) {
    const entryCount = (m.entries||[]).length;
    const dateStr = m.date ? new Date(m.date+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}) : 'No date set';
    const typeLabel = m.eventType || 'Meet';
    const typeColor = typeLabel === 'Games' ? '#A87FD4' : 'var(--gold)';
    const typeBg    = typeLabel === 'Games' ? 'rgba(168,127,212,.15)' : 'var(--gold-a15)';
    const typeBorder= typeLabel === 'Games' ? 'rgba(168,127,212,.4)'  : 'var(--gold-a30)';
    const weighin   = m.weighinTime ? ` · Weigh-in ${m.weighinTime}` : '';
    const homeAway  = m.homeAway === 'Home' ? `<span style="font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;padding:1px 7px;border-radius:3px;background:rgba(94,192,138,.12);color:#5EC08A;border:1px solid rgba(94,192,138,.3);margin-left:2px;">HOME</span>` : m.homeAway === 'Away' ? `<span style="font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;padding:1px 7px;border-radius:3px;background:rgba(201,168,76,.08);color:var(--muted);border:1px solid var(--dark3);margin-left:2px;">AWAY</span>` : '';
    return `<div style="display:flex;align-items:center;gap:12px;padding:12px 14px;border:1px solid var(--dark3);border-radius:5px;margin-bottom:8px;background:var(--dark1);" onmouseenter="this.style.borderColor='var(--gold-a40)'" onmouseleave="this.style.borderColor='var(--dark3)'">
      <div style="flex:1;min-width:0;cursor:pointer;" onclick="_activeMeetId='${m.id}';renderMain();">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:3px;">
          <span style="font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;padding:1px 8px;border-radius:3px;background:${typeBg};color:${typeColor};border:1px solid ${typeBorder};">${typeLabel.toUpperCase()}</span>
          <span style="font-size:15px;font-weight:600;color:var(--white);">${esc(m.name)}</span>
          ${homeAway}
        </div>
        <div style="font-size:12px;color:var(--muted);">${dateStr}${m.location?' · '+esc(m.location):''}${weighin} · ${entryCount} athlete${entryCount!==1?'s':''}</div>
      </div>
      <div style="display:flex;gap:6px;align-items:center;flex-shrink:0;">
        <button onclick="event.stopPropagation();launchHostMeet('${m.id}')" style="font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;padding:3px 9px;border:1px solid rgba(94,192,138,.4);border-radius:3px;background:none;color:#5EC08A;cursor:pointer;" title="Open in Host Meet">🏆 Host</button>
        <button onclick="event.stopPropagation();openEditMeet('${m.id}')" style="background:none;border:none;cursor:pointer;color:var(--muted);font-size:13px;padding:3px 7px;" title="Edit">✏️</button>
        <button onclick="event.stopPropagation();deleteMeet('${m.id}')" style="background:none;border:none;cursor:pointer;color:#E07070;font-size:13px;padding:3px 7px;" title="Delete">✕</button>
        ${m.result?.placement ? `<span style="font-size:16px;" title="Team placement">${m.result.placement===1?'🥇':m.result.placement===2?'🥈':m.result.placement===3?'🥉':m.result.placement+'th'}</span>` : ''}
        <span onclick="_activeMeetId='${m.id}';renderMain();" style="font-family:'Barlow Condensed',sans-serif;font-size:12px;color:var(--gold);padding:3px 10px;border:1px solid var(--gold-a30);border-radius:3px;cursor:pointer;">Results →</span>
      </div>
    </div>`;
  }

  const upcomingHTML = upcoming.length
    ? upcoming.map(eventCard).join('')
    : showUpcoming ? '<div style="font-size:13px;color:var(--muted);padding:10px 0;">No upcoming events.</div>' : '';
  const pastHTML = past.map(eventCard).join('');

  // Season stats (always from full unfiltered past — not affected by filters)
  const allPast     = meets.filter(m => m.date && m.date < today);
  const firstPlace  = allPast.filter(m => m.result?.placement === 1).length;
  const secondPlace = allPast.filter(m => m.result?.placement === 2).length;
  const thirdPlace  = allPast.filter(m => m.result?.placement === 3).length;
  const statsBar = allPast.length ? `
    <div style="display:flex;gap:16px;padding:12px 14px;background:var(--dark2);border:1px solid var(--dark3);border-radius:8px;margin-bottom:1.25rem;flex-wrap:wrap;">
      <div style="text-align:center;min-width:52px;">
        <div style="font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:700;color:var(--white);">${allPast.length}</div>
        <div style="font-size:10px;font-weight:700;letter-spacing:1px;color:var(--muted);">MEETS</div>
      </div>
      ${firstPlace ? `<div style="text-align:center;min-width:52px;">
        <div style="font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:700;color:#C9A84C;">🥇 ${firstPlace}</div>
        <div style="font-size:10px;font-weight:700;letter-spacing:1px;color:var(--muted);">1ST PLACE</div>
      </div>` : ''}
      ${secondPlace ? `<div style="text-align:center;min-width:52px;">
        <div style="font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:700;color:#9EA7B0;">🥈 ${secondPlace}</div>
        <div style="font-size:10px;font-weight:700;letter-spacing:1px;color:var(--muted);">2ND PLACE</div>
      </div>` : ''}
      ${thirdPlace ? `<div style="text-align:center;min-width:52px;">
        <div style="font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:700;color:#B4714C;">🥉 ${thirdPlace}</div>
        <div style="font-size:10px;font-weight:700;letter-spacing:1px;color:var(--muted);">3RD PLACE</div>
      </div>` : ''}
    </div>` : '';

  return `<div style="padding:1.25rem;">
    <div style="max-width:760px;">
      ${statsBar}
      ${showUpcoming ? `<div style="font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:1.5px;color:var(--muted);margin-bottom:8px;">UPCOMING</div>${upcomingHTML}` : ''}
      ${showPast && past.length ? `
      <div style="font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:1.5px;color:var(--muted);margin:1.25rem 0 8px;">PAST</div>
      ${pastHTML}` : ''}
      ${!meets.length ? '<div class="empty-msg">No events yet. Click "+ Add Event" to get started.</div>' : (filtered.length === 0 ? '<div class="empty-msg">No events match the current filter.</div>' : '')}
    </div>
  </div>`;
}

function buildMeetDetailHTML(meet) {
  const athletes = state.roster.athletes || [];
  const entries = meet.entries || [];
  const unit = state.weightUnit;
  const dateStr = meet.date ? new Date(meet.date+'T12:00:00').toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'}) : '';

  const entryRows = entries.map((entry, ei) => {
    const athIdx = athletes.findIndex(a=>(a.id||a.name)===entry.athleteId);
    const ath = athIdx >= 0 ? athletes[athIdx] : {name: entry.athleteId};
    const sn = entry.snatchAttempts || [null,null,null];
    const cj = entry.cjAttempts    || [null,null,null];
    const bn = entry.benchAttempts  || [null,null,null];
    const sm = entry.snatchMade    || [null,null,null];
    const cm = entry.cjMade        || [null,null,null];
    const bm = entry.benchMade     || [null,null,null];
    const bestSnatch = sn.reduce((best,w,i)=>sm[i]===true&&w>best?w:best, 0);
    const bestCJ     = cj.reduce((best,w,i)=>cm[i]===true&&w>best?w:best, 0);
    const bestBench  = bn.reduce((best,w,i)=>bm[i]===true&&w>best?w:best, 0);
    const total      = bestSnatch&&bestCJ ? bestSnatch+bestCJ : 0;
    const tradTotal  = bestCJ&&bestBench  ? bestCJ+bestBench  : 0;
    const div        = entry.division||'';
    const conv = unit === 'kg' ? (1/2.20462) : 1;
    const sMax  = ath.snatch ? Math.round(ath.snatch * conv) : 0;
    const cjMax = ath.cj    ? Math.round(ath.cj    * conv) : 0;
    const bMax  = ath.bench ? Math.round(ath.bench  * conv) : 0;

    function attCell(lift, idx) {
      const arr  = lift==='s'?sn:lift==='c'?cj:bn;
      const made = lift==='s'?sm:lift==='c'?cm:bm;
      const w = arr[idx]||'';
      const m = made[idx];
      const bg = m===true?'rgba(94,192,138,0.15)':m===false?'rgba(232,82,82,0.1)':'transparent';
      const border = m===true?'1px solid rgba(94,192,138,0.4)':m===false?'1px solid rgba(232,82,82,0.3)':'1px solid var(--dark3)';
      return `<td style="padding:4px;text-align:center;border-right:1px solid var(--dark3);">
        <div style="display:flex;flex-direction:column;align-items:center;gap:2px;">
          <input type="number" value="${w}" placeholder="—" min="0"
            style="width:56px;text-align:center;background:${bg};border:${border};color:var(--white);border-radius:3px;padding:3px 2px;font-size:13px;"
            onchange="updateMeetAttempt('${meet.id}',${ei},'${lift}',${idx},'weight',this.value);renderMain();">
          <div style="display:flex;gap:2px;">
            <button onclick="updateMeetAttempt('${meet.id}',${ei},'${lift}',${idx},'made',true);renderMain();"
              style="padding:1px 5px;font-size:10px;border:none;border-radius:2px;cursor:pointer;background:${m===true?'#5EC08A':'var(--dark3)'};color:${m===true?'#000':'var(--muted)'};">✓</button>
            <button onclick="updateMeetAttempt('${meet.id}',${ei},'${lift}',${idx},'made',false);renderMain();"
              style="padding:1px 5px;font-size:10px;border:none;border-radius:2px;cursor:pointer;background:${m===false?'#E85252':'var(--dark3)'};color:${m===false?'#fff':'var(--muted)'};">✗</button>
          </div>
        </div>
      </td>`;
    }

    const divColor = {OLY:'#C9A84C',Traditional:'#A87FD4',Both:'#5EC08A',Exhibition:'#3A86D4'}[div]||'var(--muted)';
    const suggestChips = (() => {
      if (!sMax && !cjMax && !bMax) return '<span style="font-size:12px;color:var(--muted);">No training maxes — set them in the Roster tab.</span>';
      return [
        {label:'Opener', pct:0.90, color:'#5EC08A'},
        {label:'Second', pct:0.98, color:'#C9A84C'},
        {label:'Third',  pct:1.03, color:'#E85252'},
      ].map(p => {
        const vals = [sMax?`S:${roundAttempt(sMax*p.pct)}`:'', cjMax?`CJ:${roundAttempt(cjMax*p.pct)}`:'', bMax?`B:${roundAttempt(bMax*p.pct)}`:''].filter(Boolean).join(' · ');
        return `<span style="font-size:11px;background:var(--dark3);padding:3px 9px;border-radius:4px;white-space:nowrap;"><span style="color:${p.color};font-weight:700;">${p.label}</span> <span style="color:var(--white);">${vals}</span></span>`;
      }).join('');
    })();
    return `<tr style="border-bottom:1px solid var(--dark3);">
      <td style="padding:8px 10px;border-right:1px solid var(--dark3);">
        <div style="display:flex;align-items:center;gap:6px;">
          <span style="font-weight:600;color:var(--white);font-size:13px;">${ath.name}</span>
          ${athIdx>=0?`<button onclick="openEditAthlete(${athIdx})" title="Edit athlete" style="background:none;border:none;cursor:pointer;color:var(--muted);font-size:11px;padding:1px 4px;line-height:1;">✏</button>`:''}
        </div>
        ${ath.wc?`<div style="font-size:11px;color:var(--muted);">${ath.wc} lbs</div>`:''}
        <button onclick="toggleMeetSuggest(${ei})" title="Suggest attempts from training maxes"
          style="margin-top:3px;background:none;border:1px solid #333;border-radius:3px;cursor:pointer;color:var(--muted);font-size:10px;padding:1px 6px;font-family:'Barlow Condensed',sans-serif;font-weight:700;letter-spacing:.5px;">💡 Suggest</button>
      </td>
      <td style="padding:4px 8px;text-align:center;border-right:1px solid var(--dark3);">
        <select onchange="updateMeetDivision('${meet.id}',${ei},this.value,this)"
          style="background:var(--dark2);border:1px solid var(--dark3);color:${divColor};border-radius:3px;padding:3px 6px;font-size:11px;font-family:'Barlow Condensed',sans-serif;font-weight:700;cursor:pointer;">
          <option value="" ${!div?'selected':''}>—</option>
          ${['OLY','Traditional','Both','Exhibition'].map(d=>`<option value="${d}" ${div===d?'selected':''}>${d}</option>`).join('')}
        </select>
      </td>
      ${attCell('s',0)}${attCell('s',1)}${attCell('s',2)}
      ${attCell('c',0)}${attCell('c',1)}${attCell('c',2)}
      ${attCell('b',0)}${attCell('b',1)}${attCell('b',2)}
      <td style="padding:8px 10px;text-align:center;border-right:1px solid var(--dark3);">
        ${total?`<div style="font-weight:700;color:var(--gold);font-size:15px;">${total}</div><div style="font-size:10px;color:var(--muted);">${bestSnatch}+${bestCJ}</div>`:'<span style="color:var(--muted);">—</span>'}
      </td>
      <td style="padding:8px 10px;text-align:center;border-right:1px solid var(--dark3);">
        ${tradTotal?`<div style="font-weight:700;color:#A87FD4;font-size:15px;">${tradTotal}</div><div style="font-size:10px;color:var(--muted);">${bestCJ}+${bestBench}</div>`:'<span style="color:var(--muted);">—</span>'}
      </td>
      <td style="padding:4px 8px;text-align:center;">
        <button onclick="removeMeetEntry('${meet.id}',${ei});renderMain();" style="background:none;border:none;cursor:pointer;color:#E07070;font-size:12px;">✕</button>
      </td>
    </tr>
    <tr id="meet-suggest-${ei}" style="display:none;background:rgba(201,168,76,0.04);">
      <td colspan="14" style="padding:8px 14px;border-bottom:1px solid var(--dark3);">
        <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
          <span style="font-size:10px;font-weight:700;letter-spacing:1px;color:var(--muted);font-family:'Barlow Condensed',sans-serif;white-space:nowrap;">SUGGESTED (${unit.toUpperCase()})</span>
          <div style="display:flex;gap:8px;flex-wrap:wrap;flex:1;">${suggestChips}</div>
          ${(sMax||cjMax||bMax)?`<button onclick="fillMeetAttempts('${meet.id}',${ei},${sMax},${cjMax},${bMax});renderMain();" style="font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;padding:3px 10px;border:1px solid var(--gold-a50);border-radius:3px;background:none;color:var(--gold);cursor:pointer;white-space:nowrap;">Fill All</button>`:''}
        </div>
      </td>
    </tr>`;
  }).join('');

  const unathletes = athletes.filter(a => !entries.find(e=>e.athleteId===(a.id||a.name)))
    .sort((a,b) => (parseFloat(a.wc)||9999) - (parseFloat(b.wc)||9999));
  const weighinStr = meet.weighinTime ? ` · Weigh-in ${meet.weighinTime}` : '';

  const rosterPanel = unathletes.length ? `
    <div style="margin-top:1.5rem;border:1px solid var(--dark3);border-radius:8px;overflow:hidden;">
      <div style="display:flex;align-items:center;justify-content:space-between;padding:8px 14px;background:var(--dark2);border-bottom:1px solid var(--dark3);">
        <span style="font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:1.5px;color:var(--muted);">ADD ATHLETES FROM ROSTER</span>
        <button onclick="addAllMeetEntries('${meet.id}')" style="font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;padding:2px 10px;border:1px solid var(--gold-a50);border-radius:3px;background:none;color:var(--gold);cursor:pointer;">+ Add All</button>
      </div>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:1px;background:var(--dark3);">
        ${unathletes.map((a, ui)=>{
          const aId  = esc(a.id||a.name);
          const selId = `div-sel-${ui}`;
          const oly  = a.wc ? _olySlots(entries, athletes, a.wc)  : 0;
          const trad = a.wc ? _tradSlots(entries, athletes, a.wc) : 0;
          const slotsHint = a.wc
            ? `OLY ${oly}/2 · Trad ${trad}/2`
            : '';
          const defaultDiv = _autoDiv(a);
          return `<div style="display:flex;align-items:flex-start;gap:8px;padding:9px 14px;background:var(--dark1);">
            <div style="flex:1;min-width:0;">
              <div style="font-size:13px;font-weight:600;color:var(--white);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(a.name)}</div>
              <div style="font-size:11px;color:var(--muted);">${a.wc?a.wc+' lbs · ':''}<span style="color:#888;">${slotsHint}</span></div>
            </div>
            <select id="${selId}" style="background:var(--dark3);color:var(--white);border:1px solid #444;border-radius:3px;padding:3px 5px;font-size:11px;font-family:'Barlow Condensed',sans-serif;font-weight:600;flex-shrink:0;">
              <option value="OLY"         ${defaultDiv==='OLY'        ?'selected':''}>OLY</option>
              <option value="Traditional" ${defaultDiv==='Traditional'?'selected':''}>Trad</option>
              <option value="Both"        ${defaultDiv==='Both'       ?'selected':''}>Both</option>
              <option value="Exhibition">Exhib</option>
            </select>
            <button onclick="addMeetEntryDirect('${meet.id}','${aId}',document.getElementById('${selId}').value)"
              style="font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;padding:3px 10px;border:1px solid var(--gold-a50);border-radius:3px;background:none;color:var(--gold);cursor:pointer;white-space:nowrap;flex-shrink:0;">+ Add</button>
          </div>`;
        }).join('')}
      </div>
    </div>` : athletes.length ? `
    <div style="margin-top:1.5rem;padding:10px 14px;border:1px solid var(--dark3);border-radius:8px;font-size:12px;color:var(--muted);">All roster athletes have been added to this event.</div>` : `
    <div style="margin-top:1.5rem;padding:14px;border:1px solid var(--dark3);border-radius:8px;font-size:13px;color:var(--muted);">No athletes in roster yet. Add athletes in the <button onclick="switchTab('roster')" style="background:none;border:none;color:var(--gold);cursor:pointer;font-size:13px;padding:0;text-decoration:underline;">Roster</button> tab first.</div>`;

  return `<div style="padding:1.25rem;">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:1rem;flex-wrap:wrap;">

function printSchedule() {
  const meets = state.meets || [];
  const today = new Date().toISOString().slice(0,10);
  const upcoming = meets.filter(m => !m.date || m.date >= today).sort((a,b)=>(a.date||'9999').localeCompare(b.date||'9999'));
  const past     = meets.filter(m =>  m.date && m.date <  today).sort((a,b)=>b.date.localeCompare(a.date));
  function row(m) {
    const d = m.date ? new Date(m.date+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}) : '—';
    const place = m.result?.placement ? ['1st','2nd','3rd'][m.result.placement-1] || m.result.placement+'th' : '';
    return `<tr><td>${d}</td><td>${m.name||''}</td><td>${m.location||''}</td><td>${(m.entries||[]).length}</td><td>${place}</td><td>${m.result?.notes||''}</td></tr>`;
  }
  const teamName = state.teams?.[state.activeTeamId]?.name || 'Team';
  const html = `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>${teamName} — Schedule</title>
  <style>
    body{font-family:Arial,sans-serif;color:#111;padding:24px;max-width:800px;margin:0 auto;}
    h1{font-size:22px;margin-bottom:4px;}p{font-size:13px;color:#666;margin:0 0 20px;}
    h2{font-size:14px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#555;border-bottom:1px solid #ddd;padding-bottom:4px;margin:20px 0 8px;}
    table{width:100%;border-collapse:collapse;font-size:13px;}
    th{background:#f5f5f5;padding:6px 8px;text-align:left;border-bottom:2px solid #ddd;font-size:11px;text-transform:uppercase;letter-spacing:.5px;}
    td{padding:7px 8px;border-bottom:1px solid #eee;}
    @media print{body{padding:12px;}}
  </style></head><body>
  <h1>${teamName} — Season Schedule</h1>
  <p>Printed ${new Date().toLocaleDateString()}</p>
  ${upcoming.length?`<h2>Upcoming (${upcoming.length})</h2><table><thead><tr><th>Date</th><th>Event</th><th>Location</th><th>Athletes</th><th>Result</th><th>Notes</th></tr></thead><tbody>${upcoming.map(row).join('')}</tbody></table>`:''}
  ${past.length?`<h2>Past (${past.length})</h2><table><thead><tr><th>Date</th><th>Event</th><th>Location</th><th>Athletes</th><th>Result</th><th>Notes</th></tr></thead><tbody>${past.map(row).join('')}</tbody></table>`:''}
  \x3cscript\x3ewindow.onload=()=>window.print();\x3c/script\x3e
  </body></html>`;
  const w = window.open('','_blank');
  if (w) { w.document.write(html); w.document.close(); }
}

function addMeetEntry(meetId) {

}
function _olySlots(entries, athletes, wc) {
  return entries.filter(e => {
    const a = athletes.find(x => (x.id||x.name) === e.athleteId);
    return a && a.wc === wc && (e.division === 'OLY' || e.division === 'Both');
  }).length;
}
function _tradSlots(entries, athletes, wc) {
  return entries.filter(e => {
    const a = athletes.find(x => (x.id||x.name) === e.athleteId);
    return a && a.wc === wc && (e.division === 'Traditional' || e.division === 'Both');
  }).length;
}
function _divBlocked(entries, athletes, wc, division) {
  if (division === 'Exhibition' || !wc) return false;
  if (division === 'OLY')         return _olySlots(entries, athletes, wc)  >= 2;
  if (division === 'Traditional') return _tradSlots(entries, athletes, wc) >= 2;
  if (division === 'Both')        return _olySlots(entries, athletes, wc)  >= 2 || _tradSlots(entries, athletes, wc) >= 2;
  return false;
}
function _autoDiv(ath) {
  const hasSnatch = (ath.snatch || 0) > 0;
  const hasBench  = (ath.bench  || 0) > 0;
  if (hasSnatch && hasBench) return 'Both';
  if (hasBench)              return 'Traditional';
  return 'OLY';
}

function addMeetEntryDirect(meetId, athleteId, division) {
  const meet = (state.meets||[]).find(m=>m.id===meetId); if(!meet) return;
  if (!meet.entries) meet.entries=[];
  if (meet.entries.find(e=>e.athleteId===athleteId)) return;
  const athletes = state.roster.athletes || [];
  const ath = athletes.find(a=>(a.id||a.name)===athleteId);
  const div = division || '';
  if (ath && _divBlocked(meet.entries, athletes, ath.wc, div)) {
    const which = div === 'Both'
      ? (_olySlots(meet.entries, athletes, ath.wc) >= 2 ? 'OLY' : 'Traditional')
      : div;
    alert(`Cannot add ${ath.name} — the ${ath.wc} lbs ${which} slot is full (max 2 per division per weight class).`);
    return;
  }
  meet.entries.push({athleteId, division:div, snatchAttempts:[null,null,null], cjAttempts:[null,null,null], benchAttempts:[null,null,null], snatchMade:[null,null,null], cjMade:[null,null,null], benchMade:[null,null,null]});
  saveState(); renderMain();
}

function addAllMeetEntries(meetId) {
  const meet = (state.meets||[]).find(m=>m.id===meetId); if(!meet) return;
  const athletes = state.roster.athletes || [];
  if (!meet.entries) meet.entries=[];
  let added = 0, skipped = 0;
  athletes.forEach(a => {
    const id = a.id||a.name;
    if (meet.entries.find(e=>e.athleteId===id)) return;
    const div = _autoDiv(a);
    if (_divBlocked(meet.entries, athletes, a.wc, div)) { skipped++; return; }
    meet.entries.push({athleteId:id, division:div, snatchAttempts:[null,null,null], cjAttempts:[null,null,null], benchAttempts:[null,null,null], snatchMade:[null,null,null], cjMade:[null,null,null], benchMade:[null,null,null]});
    added++;
  });
  if (skipped) alert(`${skipped} athlete${skipped!==1?'s were':' was'} not added — their auto-detected division slot was full. Add them individually to choose a different division.`);
  saveState(); renderMain();
}

function removeMeetEntry(meetId, idx) {

function updateMeetAttempt(meetId, entryIdx, lift, attIdx, field, value) {
  const meet = (state.meets||[]).find(m=>m.id===meetId); if(!meet) return;
  const entry = meet.entries[entryIdx]; if(!entry) return;
  if (lift==='s') {
    if (field==='weight') entry.snatchAttempts[attIdx]=parseFloat(value)||null;
    else entry.snatchMade[attIdx]=value;
  } else if (lift==='c') {
    if (field==='weight') entry.cjAttempts[attIdx]=parseFloat(value)||null;
    else entry.cjMade[attIdx]=value;
  } else {
    if (!entry.benchAttempts) entry.benchAttempts=[null,null,null];
    if (!entry.benchMade)     entry.benchMade=[null,null,null];
    if (field==='weight') entry.benchAttempts[attIdx]=parseFloat(value)||null;
    else entry.benchMade[attIdx]=value;
  }
  // If a made attempt is a new PR, update the athlete's roster max (always stored in lbs)
  if (field==='made' && value===true) {
    const liftMap = {s:['snatchAttempts','snatch'], c:['cjAttempts','cj'], b:['benchAttempts','bench']};
    const [attKey, rosterKey] = liftMap[lift]||[];
    if (attKey) {
      const w = entry[attKey]?.[attIdx];
      if (w) {
        const wLbs = state.weightUnit==='kg' ? Math.round(w*2.20462) : w;
        const ath = (state.roster.athletes||[]).find(a=>(a.id||a.name)===entry.athleteId);
        if (ath && wLbs > (ath[rosterKey]||0)) {
          ath[rosterKey] = wLbs;
        }
      }
    }
  }
  saveState();
}

function updateMeetDivision(meetId, entryIdx, value, selectEl) {
  const meet = (state.meets||[]).find(m=>m.id===meetId); if(!meet) return;
  const entry = meet.entries[entryIdx]; if(!entry) return;
  if (value === entry.division) return;
  if (value !== 'Exhibition') {
    const athletes = state.roster.athletes || [];
    const ath = athletes.find(a=>(a.id||a.name)===entry.athleteId);
    const otherEntries = meet.entries.filter((_, i) => i !== entryIdx);
    if (ath && _divBlocked(otherEntries, athletes, ath.wc, value)) {
      const which = value === 'Both'
        ? (_olySlots(otherEntries, athletes, ath.wc) >= 2 ? 'OLY' : 'Traditional')
        : value;
      alert(`Cannot move ${ath.name} to ${value} — the ${ath.wc} lbs ${which} slot is full (max 2 per division per weight class).`);
      if (selectEl) selectEl.value = entry.division;
      return;
    }
  }
  entry.division = value;
  saveState();
}

function exportMeetRosterCSV(meetId) {
  const meet = (state.meets||[]).find(m=>m.id===meetId); if(!meet) return;
  const athletes = state.roster.athletes||[];
  const rows = [['Name','Weight Class','Division']];
  (meet.entries||[]).forEach(entry=>{
    const ath = athletes.find(a=>(a.id||a.name)===entry.athleteId)||{name:entry.athleteId,wc:''};
    rows.push([csvCell(ath.name), csvCell(ath.wc||''), csvCell(entry.division||'')]);
  });
  const csv = rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob([csv],{type:'text/csv'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href=url; a.download=`${meet.name.replace(/[^a-z0-9]/gi,'_')}_roster.csv`;
  a.click(); URL.revokeObjectURL(url);
}

function loadDefaultLibrary() {
  const defaults=getDefaultLibrary();
  let added=0, skipped=0;
  defaults.forEach(entry=>{
    const exists=state.exerciseLibrary.some(e=>e.name.toLowerCase()===entry.name.toLowerCase());
    if(exists){skipped++;}else{state.exerciseLibrary.push(entry);added++;}
  });
  saveState();
  renderMain();
  if(skipped>0) alert(`Added ${added} exercise${added!==1?'s':''}. Skipped ${skipped} already in your library.`);
}

function buildLibraryHTML() {
  const lib = state.exerciseLibrary || [];
  if (!lib.length) return `<div style="padding:1.25rem;"><div class="empty-msg">No exercises saved yet. Click "+ Add Exercise" above, or use "📚 Save to Library" inside the exercise modal.</div></div>`;

  const searchTerm = (_libraryFilter.search || '').toLowerCase().trim();
  const catFilter  = _libraryFilter.category || '';
  const wd   = getWeek(state.currentWeek);
  const days = wd ? trainingDays() : [];

  // Build indexed list then filter
  let entries = lib.map((e, i) => ({ e, i }));
  if (searchTerm) entries = entries.filter(({e}) => e.name.toLowerCase().includes(searchTerm));
  if (catFilter)  entries = entries.filter(({e}) => e.category === catFilter);

  if (!entries.length) return `<div style="padding:1.25rem;"><div class="empty-msg">No exercises match the current filter.</div></div>`;

  function exCard({e, i}) {
    const meta = `${e.sets} set${e.sets!==1?'s':''} × ${e.useRPE?'—':e.useTime?(e.seconds||0)+'s':(e.reps||0)+' reps'} @ ${e.useRPE?'RPE '+(e.rpe||8):e.intensityHigh>0?e.intensity+'–'+e.intensityHigh+'%':(e.intensity||0)+'%'}${e.note?` · <em>${esc(e.note)}</em>`:''}`;
    const dayOpts = days.map(d => `<button onclick="addLibraryExerciseToDayDirect(${i},'${d}');document.getElementById('lib-ex-menu-${i}').style.display='none'" style="display:block;width:100%;text-align:left;padding:6px 14px;background:none;border:none;cursor:pointer;color:var(--white);font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:600;">${d}</button>`).join('');
    const addBtn = days.length ? `
      <div style="position:relative;display:inline-block;flex-shrink:0;">
        <button onclick="toggleLibExAddMenu(event,${i})" style="background:var(--gold-a12);border:1px solid var(--gold-a30);cursor:pointer;color:var(--gold);font-size:11px;padding:2px 8px;border-radius:3px;font-family:'Barlow Condensed',sans-serif;font-weight:600;white-space:nowrap;">+ Add ▾</button>
        <div id="lib-ex-menu-${i}" style="display:none;position:absolute;right:0;top:100%;margin-top:3px;background:var(--dark2);border:1px solid var(--dark3);border-radius:5px;z-index:200;min-width:150px;padding:4px 0;box-shadow:0 4px 14px rgba(0,0,0,0.5);">${dayOpts}</div>
      </div>` : '';
    return `<div style="display:flex;align-items:center;gap:10px;padding:10px 12px;border:1px solid var(--dark3);border-radius:5px;margin-bottom:6px;background:var(--dark1);">
      <span class="cat-dot cat-${e.category}" style="flex-shrink:0;"></span>
      <div style="flex:1;min-width:0;">
        <div style="font-size:14px;color:var(--white);font-weight:500;">${esc(e.name)}</div>
        <div style="font-size:11px;color:var(--muted);">${meta}</div>
      </div>
      ${addBtn}
      <button onclick="openAddToLibrary(${i})" style="background:none;border:none;cursor:pointer;color:var(--muted);font-size:13px;padding:3px 8px;flex-shrink:0;" title="Edit">✏️</button>
      <button onclick="removeFromLibrary(${i})" style="background:none;border:none;cursor:pointer;color:#555;font-size:13px;padding:3px 6px;flex-shrink:0;" title="Remove">✕</button>
    </div>`;
  }

  // Category order
  const CAT_ORDER = ['snatch','clean','jerk','cj','squat','bench','accessory','plyo','core','other'];
  let html;

  if (searchTerm) {
    // Flat list when searching
    html = entries.map(exCard).join('');
  } else {
    // Group by category
    const groups = {};
    entries.forEach(item => {
      const cat = item.e.category || 'other';
      if (!groups[cat]) groups[cat] = [];
      groups[cat].push(item);
    });
    const orderedCats = CAT_ORDER.filter(c => groups[c]);
    Object.keys(groups).forEach(c => { if (!orderedCats.includes(c)) orderedCats.push(c); });
    html = orderedCats.map(cat => {
      const color = CAT_META[cat]?.color || '#888';
      const label = CAT_META[cat]?.label || cat;
      return `<div style="margin-bottom:1.5rem;">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;padding-bottom:5px;border-bottom:1px solid var(--dark3);">
          <span class="cat-dot cat-${cat}"></span>
          <span style="font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:.8px;color:${color};">${label.toUpperCase()}</span>
          <span style="font-family:'Barlow Condensed',sans-serif;font-size:11px;color:var(--muted);">${groups[cat].length}</span>
        </div>
        ${groups[cat].map(exCard).join('')}
      </div>`;
    }).join('');
  }

  return `<div style="padding:1.25rem;">${html}</div>`;
}

let _libraryFilter = { search: '', category: '' };

let _rosterSort    = { field:'name', dir:1 };

function buildRosterHTML() {
  const athletes = state.roster.athletes || [];
  const fields   = rosterFields();

  // Derive filter options
  const genders = [...new Set(athletes.map(a=>a.gender).filter(Boolean))].sort();
  const wcs     = [...new Set(athletes.map(a=>a.wc).filter(Boolean))].sort((a,b)=>{
    if(a==='UNL') return 1; if(b==='UNL') return -1;
    return parseInt(a)-parseInt(b);
  });
  const teams   = [...new Set(athletes.map(a=>a.team).filter(Boolean))].sort();

  // Apply filters
  let filtered = athletes.filter(a=>{
    if(_rosterFilter.gender && a.gender!==_rosterFilter.gender) return false;
    if(_rosterFilter.wc && a.wc!==_rosterFilter.wc) return false;
    if(_rosterFilter.team && a.team!==_rosterFilter.team) return false;
    return true;
  });

  // Sort
  filtered.sort((a,b)=>{
    const sf=_rosterSort.field;
    if(sf==='olympicTotal'){
      return (athleteOlympicTotal(b)-athleteOlympicTotal(a))*_rosterSort.dir;
    }
    if(sf==='traditionalTotal'){
      return (athleteTraditionalTotal(b)-athleteTraditionalTotal(a))*_rosterSort.dir;
    }
    if(sf==='wc'){
      const toNum=v=>v==='UNL'?Infinity:(parseInt(v)||0);
      return (toNum(a.wc)-toNum(b.wc))*_rosterSort.dir;
    }
    const av=a[sf]||0, bv=b[sf]||0;
    if(typeof av==='number') return (bv-av)*_rosterSort.dir;
    return String(av).localeCompare(String(bv))*_rosterSort.dir;
  });

  function sortBtn(field, label) {
    const active=_rosterSort.field===field;
    const arrow=active?(_rosterSort.dir===1?'↓':'↑'):'';

function parseCSV(text) {
  const lines = text.replace(/\r\n/g,'\n').replace(/\r/g,'\n').split('\n').filter(l=>l.trim());
  function parseLine(line) {
    const vals=[]; let cur='', inQ=false;
    for(let i=0;i<line.length;i++){
      const ch=line[i];
      if(ch==='"'&&!inQ&&(i===0||line[i-1]===',')){inQ=true;}
      else if(ch==='"'&&inQ&&(i+1===line.length||line[i+1]===',')){inQ=false;}
      else if(ch===','&&!inQ){vals.push(cur.trim());cur='';}
      else{cur+=ch;}
    }
    vals.push(cur.trim());
    return vals;
  }
  const headers=parseLine(lines[0]).map(h=>h.replace(/^"|"$/g,'').trim().toLowerCase());
  const rows=lines.slice(1).map(l=>parseLine(l).map(v=>v.replace(/^"|"$/g,'').trim()));
  return {headers,rows};
}

function detectRosterColumns(headers) {
  const find=(...keys)=>headers.findIndex(h=>keys.some(k=>h===k||h.includes(k)));
  return {
    name:      find('full name','athlete name','athlete','name'),
    firstName: find('first name','firstname','fname','first'),
    lastName:  find('last name','lastname','lname','last'),
    gender:    find('gender','sex','m/f','male/female'),
    wc:        find('weight class','wt class','wt. class','wt.class','wc'),
    team:      find('team','school','org','club','program'),
    gradYear:  find('grad year','graduation year','class year','class of','grad yr','graduation','gradyear','grad'),
    snatch:    find('snatch'),
    cj:        find('clean & jerk','clean and jerk','clean/jerk','clean jerk','c&j','c & j','cj'),
    bench:     find('bench press','bench'),
    jerk:      find('jerk max','jerk'),
    fsq:       find('front squat','front sq','fsq'),
    bsq:       find('back squat','back sq','bsq'),
  };
}

function handleCSVFile(input) {
  const file=input.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=e=>{
    try {
      const {headers,rows}=parseCSV(e.target.result);
      _csvCols=detectRosterColumns(headers);
      _csvData={headers,rows};
      renderCSVPreview(headers,rows,_csvCols);
    } catch(err) {
      document.getElementById('csv-preview').innerHTML=`<div style="color:#E85252;margin-top:1rem;">Error reading file: ${esc(err.message)}</div>`;
    }
  };
  reader.readAsText(file);
}

function renderCSVPreview(headers,rows,cols) {
  const preview=document.getElementById('csv-preview'); if(!preview) return;
  const actions=document.getElementById('csv-actions'); if(!actions) return;
  const valid=rows.filter(r=>r.length>0&&r.some(c=>c));
  const fieldMap=[
    {key:'name',label:'Name',idx:cols.firstName>=0&&cols.lastName>=0?-2:cols.name},
    {key:'gender',label:'Gender',idx:cols.gender},
    {key:'wc',label:'Weight Class',idx:cols.wc},
    {key:'team',label:'Team',idx:cols.team},
    {key:'snatch',label:'Snatch',idx:cols.snatch},
    {key:'cj',label:'C&J',idx:cols.cj},
    {key:'bench',label:'Bench',idx:cols.bench},
    {key:'jerk',label:'Jerk Max',idx:cols.jerk},
    {key:'fsq',label:'Front Squat',idx:cols.fsq},
    {key:'bsq',label:'Back Squat',idx:cols.bsq},
    {key:'gradYear',label:'Grad Year',idx:cols.gradYear},
  ];
  const detected=fieldMap.filter(f=>f.idx!==-1);
  const mappingRows=fieldMap.map(f=>`<tr>
    <td style="padding:3px 8px;color:var(--muted);font-size:12px;">${f.label}</td>
    <td style="padding:3px 8px;font-size:12px;color:${f.idx!==-1?'var(--white)':'#555'};">${
      f.idx===-2?`"${esc(headers[cols.firstName])}" + "${esc(headers[cols.lastName])}"`:
      f.idx>=0?`"${esc(headers[f.idx])}"`:
      '— not found'
    }</td>
  </tr>`).join('');
  const detectedLabels = detected.map(f=>f.key==='name'?'Name':f.label);
  const sampleRows=valid.slice(0,5).map(r=>{
    const name=cols.firstName>=0&&cols.lastName>=0?(r[cols.firstName]||'')+' '+(r[cols.lastName]||''):cols.name>=0?r[cols.name]||'':'?';
    const cells=[name.trim()];
    detected.filter(f=>f.key!=='name').forEach(f=>{ cells.push(f.idx>=0?r[f.idx]||'':''); });
    return `<tr>${cells.map(p=>`<td style="padding:3px 8px;font-size:11px;color:var(--light);">${esc(p)}</td>`).join('')}</tr>`;
  }).join('');
  preview.innerHTML=`
    <div style="margin-top:1rem;">
      <div style="font-size:12px;font-weight:600;color:var(--gold);margin-bottom:6px;">Detected ${valid.length} athlete${valid.length!==1?'s':''} — column mapping:</div>
      <table style="width:100%;border-collapse:collapse;margin-bottom:1rem;"><tbody>${mappingRows}</tbody></table>
      <div style="font-size:12px;font-weight:600;color:var(--muted);margin-bottom:4px;">Preview (first ${Math.min(5,valid.length)}):</div>
      <table style="width:100%;border-collapse:collapse;"><thead><tr>${detectedLabels.map(h=>`<th style="padding:3px 8px;font-size:10px;color:var(--muted);text-align:left;">${esc(h)}</th>`).join('')}</tr></thead><tbody>${sampleRows}</tbody></table>
    </div>`;
  actions.innerHTML=`
    <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
    <button class="btn btn-gold" onclick="confirmImportRoster()">Import ${valid.length} athlete${valid.length!==1?'s':''}</button>`;
}

function confirmImportRoster() {
  if(!_csvData||!_csvCols) return;
  const {rows}=_csvData; const cols=_csvCols;
  let added=0, skipped=0;
  rows.forEach(r=>{
    if(!r.length||!r.some(c=>c)) return;
    const name=(cols.firstName>=0&&cols.lastName>=0)
      ?((r[cols.firstName]||'')+' '+(r[cols.lastName]||'')).trim()
      :(cols.name>=0?r[cols.name]?.trim():'');
    if(!name){skipped++;return;}
    const a={
      id: 'ath_'+Date.now()+'_'+Math.floor(Math.random()*9999),
      name,
      gender: cols.gender>=0?(r[cols.gender]?.trim()||''):'',
      wc:     cols.wc>=0?(r[cols.wc]?.trim()||''):'',
      team:   cols.team>=0?(r[cols.team]?.trim()||''):'',
      gradYear: cols.gradYear>=0?(parseInt(r[cols.gradYear])||0):0,
      snatch: cols.snatch>=0?(parseInt(r[cols.snatch])||0):0,
      cj:     cols.cj>=0?(parseInt(r[cols.cj])||0):0,
      bench:  cols.bench>=0?(parseInt(r[cols.bench])||0):0,
      jerk:   cols.jerk>=0?(parseInt(r[cols.jerk])||0):0,
      fsq:    cols.fsq>=0?(parseInt(r[cols.fsq])||0):0,
      bsq:    cols.bsq>=0?(parseInt(r[cols.bsq])||0):0,
    };
    if(!state.roster.athletes) state.roster.athletes=[];
    const existing = state.roster.athletes.find(ex=>ex.name.toLowerCase()===a.name.toLowerCase());
    if (existing) {
      // Update existing athlete with any non-zero imported values
      Object.keys(a).forEach(k=>{ if(k!=='name' && k!=='id' && a[k]) existing[k]=a[k]; });
      skipped++;
    } else {
      state.roster.athletes.push(a); added++;
    }
  });
  closeModal(); saveState(); renderMain();
  if(skipped>0) alert(`Added ${added} new athlete${added!==1?'s':''}. Updated ${skipped} existing athlete${skipped!==1?'s':''}`);
}

function exportRosterCSV() {
  const athletes = state.roster?.athletes || [];
  const fields   = rosterFields();
  const extraIds = fields.filter(f=>!['snatch','cj','bench'].includes(f.id));
  const headers  = ['Name','Gender','WT Class (lbs)','Grad Year','Team','Snatch','C&J','Bench',
    ...extraIds.map(f=>f.label),'Olympic Total','Traditional Total'];
  const rows = athletes.map(a => [
    a.name||'', a.gender||'', a.wc||'', a.gradYear||'', a.team||'',
    a.snatch||0, a.cj||0, a.bench||0,
    ...extraIds.map(f=>a[f.id]||''),
    athleteOlympicTotal(a)||'', athleteTraditionalTotal(a)||'',
  ]);
  const csv = [headers,...rows].map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob([csv],{type:'text/csv'});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href=url; a.download='Athlete_Roster.csv'; a.click(); URL.revokeObjectURL(url);
}

function exportRosterPDF() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation:'landscape', unit:'pt', format:'letter' });
  const PW=792, PH=612, ML=36, MR=36, MT=36;
  const CW=PW-ML-MR;
  const GOLD=[201,168,76], DARK=[26,26,26], MID=[120,120,120], BLACK=[17,17,17], LGRAY=[240,240,238];
  const athletes=state.roster.athletes||[];
  const fields=rosterFields();

  doc.setFillColor(...GOLD); doc.rect(0,0,PW,5,'F');
  doc.setFontSize(18); doc.setFont('helvetica','bold'); doc.setTextColor(...BLACK);
  doc.text('Athlete Roster', ML, 30);
  doc.setFontSize(10); doc.setFont('helvetica','normal'); doc.setTextColor(...MID);
  doc.text(`Generated ${new Date().toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'})}  ·  ${athletes.length} athletes`, ML, 44);
  doc.setDrawColor(...GOLD); doc.setLineWidth(1); doc.line(ML,50,PW-MR,50);

  let y=62;
  const cols=['Name','Gender','WT Class','Grad','Team','Snatch','C&J','Bench',
    ...fields.filter(f=>!['snatch','cj','bench'].includes(f.id)).map(f=>f.label),
    'Olympic Total','Traditional Total'];
  const colW=CW/cols.length;

  // Header
  doc.setFillColor(...DARK); doc.rect(ML,y,CW,16,'F');
  doc.setFontSize(7); doc.setFont('helvetica','bold'); doc.setTextColor(...GOLD);
  cols.forEach((c,i)=>doc.text(c.toUpperCase(),ML+i*colW+colW/2,y+11,{align:'center'}));
  y+=16;

  // Rows
  athletes.forEach((a,ri)=>{
    if(y>PH-50){ doc.addPage(); y=MT; }
    if(ri%2===0){doc.setFillColor(245,245,243);doc.rect(ML,y,CW,14,'F');}
    doc.setFontSize(8); doc.setFont('helvetica','normal'); doc.setTextColor(...BLACK);
    const ot=athleteOlympicTotal(a), tt=athleteTraditionalTotal(a);
    const vals=[a.name,a.gender||'',a.wc||'',a.gradYear||'',a.team||'',
      a.snatch||0,a.cj||0,a.bench||0,
      ...fields.filter(f=>!['snatch','cj','bench'].includes(f.id)).map(f=>a[f.id]||0),
      ot||'—',tt||'—'];
    vals.forEach((v,i)=>doc.text(String(v),ML+i*colW+colW/2,y+10,{align:'center'}));
    y+=14;
  });
  doc.save('Athlete_Roster.pdf');
}

function saveProgramAsTemplate() {
  const name = document.getElementById('tpl-save-name').value.trim() || 'Program Template';
  const mode = document.querySelector('input[name="tpl-save-mode"]:checked')?.value || 'structure';
  const p = prog(); if (!p) return;
  const ws = weekNums();

  let weeks;
  if (mode === 'full') {
    // Deep copy all week data including exercises
    weeks = ws.map(w => ({
      weekNum: w,
      phase: p.weeks[w]?.phase || 'accumulation',
      note: p.weeks[w]?.note || '',
      days: JSON.parse(JSON.stringify(p.weeks[w]?.days || {}))
    }));
  } else {
    // Structure only — phases + empty day shells
    weeks = ws.map(w => ({
      weekNum: w,
      phase: p.weeks[w]?.phase || 'accumulation',
      note: '',
      days: {}
    }));
  }

  if (!state.templates) state.templates = [];
  state.templates.push({
    name,
    mode,
    trainingDays: [...p.trainingDays],
    weeks,
    created: Date.now()
  });
  closeModal();
  saveState();
  switchTab('templates');
  renderMain();
}

function applyTemplate(idx) {
  const tpl=state.templates[idx]; if(!tpl) return;
  const p=prog(); if(!p) return;
  const existingWks=weekNums();
  const modeLabel = tpl.mode==='full' ? 'including all exercises' : 'week structure only (no exercises)';
  if(!confirm(`Apply "${tpl.name}" to "${p.name}"?\n\nThis will add ${tpl.weeks.length} new week${tpl.weeks.length!==1?'s':''} (${modeLabel}) after any existing weeks. Existing weeks will not be changed.`)) return;
  const startWk=existingWks.length?Math.max(...existingWks)+1:1;
  if(tpl.trainingDays) p.trainingDays=tpl.trainingDays;
  tpl.weeks.forEach((tw,i)=>{
    const wNum=startWk+i;
    let days={};
    if(tpl.mode==='full' && tw.days && Object.keys(tw.days).length) {
      // Deep copy exercises from template
      days = JSON.parse(JSON.stringify(tw.days));
    } else {
      (tpl.trainingDays||p.trainingDays).forEach(d=>{
        days[d]={focus:'',mobility:'',dayNote:'',exercises:[],warmup:[],accessories:[]};
      });
    }
    p.weeks[wNum]={note:tw.note||'',phase:tw.phase,days};
  });
  state.currentWeek=startWk;
  state.activeTab='program';
  saveState(); render();
}
