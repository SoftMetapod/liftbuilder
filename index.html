<body>

<div id="app-shell">

<!-- Header -->
<div class="header">
  <div class="logo">
    <div class="logo-mark">LB</div>
    <div class="logo-info">
      <div class="logo-text">LiftBuilder</div>
      <div style="display:flex;align-items:center;gap:5px;margin-top:1px;">
        <span id="app-version" style="font-size:9px;color:var(--muted);letter-spacing:.3px;"></span>
        <button id="update-btn" onclick="checkForUpdates()" style="display:none;font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:9px;padding:1px 6px;border-radius:2px;cursor:pointer;background:var(--gold-a10);color:var(--gold);border:1px solid var(--gold-a40);" title="Check for updates"></button>
      </div>
    </div>
  </div>
  <div class="logo-sep"></div>
  <div id="prog-name-display" class="prog-name-display"></div>
  <div class="header-nav" id="header-nav"></div>
  <div style="flex:1;"></div>
  <span id="save-badge" style="font-size:11px;color:#5EC08A;opacity:0;transition:opacity 0.4s;margin-right:4px;">✓ Saved</span>
  <div id="header-actions" style="display:flex;align-items:center;gap:6px;margin-left:6px;"></div>
</div>

<!-- Update toast -->
<div id="update-toast" style="display:none;position:fixed;bottom:20px;right:20px;background:var(--dark);border:1px solid var(--gold-a40);border-left:3px solid var(--gold);border-radius:6px;padding:12px 16px;z-index:9999;box-shadow:0 4px 20px rgba(0,0,0,0.5);max-width:320px;">
  <div id="update-toast-msg" style="font-size:13px;color:var(--white);margin-bottom:8px;"></div>
  <div style="display:flex;gap:8px;">
    <button id="update-toast-action" onclick="updateAction()" style="display:none;font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:12px;padding:4px 12px;border-radius:3px;cursor:pointer;background:var(--gold);color:var(--black);border:none;"></button>
    <button onclick="document.getElementById('update-toast').style.display='none'" style="font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:12px;padding:4px 10px;border-radius:3px;cursor:pointer;background:none;color:var(--muted);border:1px solid var(--dark3);">Dismiss</button>
  </div>
</div>

<!-- Program context toolbar — only shown on program tab -->
<div class="prog-toolbar" id="prog-toolbar" style="display:none;"></div>

<!-- App shell -->
<div class="layout">
  <nav class="sidebar" id="sidebar">
    <!-- populated by JS -->
  </nav>
  <main class="main" id="main-area">
    <!-- populated by JS -->
  </main>
</div>

<!-- Modal -->
<div id="overlay" class="overlay" style="display:none;" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modal-body"></div>
</div>
</div><!-- /app-shell -->

<script>
// ═══════════════════════════════════════════════════
//  CONSTANTS
// ═══════════════════════════════════════════════════
const ALL_DAYS=['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
const PHASES={accumulation:'Accumulation',intensification:'Intensification',realization:'Realization',deload:'Deload'};
const CAT_META={
  snatch:   {label:'Snatch',    color:'#C9A84C'},
  clean:    {label:'Clean',        color:'#3A86D4'},
  jerk:     {label:'Jerk',          color:'#6AAEF5'},
  cj:       {label:'Clean & Jerk', color:'#2060B8'},
  squat:    {label:'Squat',     color:'#5EC08A'},
  bench:    {label:'Bench',     color:'#C06060'},
  accessory:{label:'Accessory', color:'#888888'},
  plyo:     {label:'Plyo',      color:'#A07FD4'},
  core:     {label:'Core',      color:'#D48A50'},
  other:    {label:'Other',     color:'#555555'},
};

// ═══════════════════════════════════════════════════
//  STATE  (multi-team)
// ═══════════════════════════════════════════════════
// Per-team data (programs / roster / meets) lives inside _stateCore.teams.
// The `state` Proxy transparently routes reads/writes of state.programs,
// state.roster, and state.meets to the currently active team's object,
// so all existing code continues to work without modification.

let _pendingImportPrograms = null;

let _stateCore = {
  activeTeamId: null,
  teams: {},             // { [teamId]: { id, name, programs, roster, meets } }
  activeProgId: null,
  activeTab: 'program',
  currentWeek: 1,
  volWeek: null,
  templates: [],
  exerciseLibrary: [],
  weightUnit: 'lbs',
};

function team() { return _stateCore.teams[_stateCore.activeTeamId] || null; }

const state = new Proxy(_stateCore, {
  get(target, key) {
    if (key === 'programs') { const t = team(); return t ? t.programs : {}; }
    if (key === 'roster')   { const t = team(); return t ? (t.roster || {athletes:[],customFields:[]}) : {athletes:[],customFields:[]}; }
    if (key === 'meets')    { const t = team(); return t ? (t.meets   || []) : []; }
    return target[key];
  },
  set(target, key, value) {
    if (key === 'programs') { const t = team(); if (t) t.programs = value; return true; }
    if (key === 'roster')   { const t = team(); if (t) t.roster   = value; return true; }
    if (key === 'meets')    { const t = team(); if (t) t.meets     = value; return true; }
    target[key] = value; return true;
  }
});

// ═══════════════════════════════════════════════════
//  THEMES
// ═══════════════════════════════════════════════════
const THEMES = {
  seminole:  { accent:'#F5821F', light:'#FFA552', dark:'#B85D0A', white:'#F5F5F0' },
  fortmyers: { accent:'#00843D', light:'#4DAF7C', dark:'#00582A', white:'#FFFFFF' },
  default:   { accent:'#4A90D9', light:'#6AABF0', dark:'#2E6FAF', white:'#F0F4F8' },
};
let _theme = THEMES.default;

function hexToRgba(hex, a) {
  const r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}
function lightenHex(hex, pct) {
  const amt=Math.round(255*pct/100);
  const r=Math.min(255,parseInt(hex.slice(1,3),16)+amt);
  const g=Math.min(255,parseInt(hex.slice(3,5),16)+amt);
  const b=Math.min(255,parseInt(hex.slice(5,7),16)+amt);
  return '#'+[r,g,b].map(v=>v.toString(16).padStart(2,'0')).join('');
}
function darkenHex(hex, pct) {
  const amt=Math.round(255*pct/100);
  const r=Math.max(0,parseInt(hex.slice(1,3),16)-amt);
  const g=Math.max(0,parseInt(hex.slice(3,5),16)-amt);
  const b=Math.max(0,parseInt(hex.slice(5,7),16)-amt);
  return '#'+[r,g,b].map(v=>v.toString(16).padStart(2,'0')).join('');
}

function applyTheme() {
  const t = team();
  if (t?.color) {
    _theme = { accent: t.color, light: lightenHex(t.color, 20), dark: darkenHex(t.color, 20), white: '#F0F4F8' };
  } else {
    const p = prog();
    const org = (p?.org || '').toLowerCase();
    _theme = org.includes('fort myers') ? THEMES.fortmyers
           : org.includes('seminole')   ? THEMES.seminole
           : THEMES.default;
  }
  const root = document.documentElement;
  root.style.setProperty('--gold',       _theme.accent);
  root.style.setProperty('--gold-light', _theme.light);
  root.style.setProperty('--gold-dark',  _theme.dark);
  root.style.setProperty('--white',      _theme.white);
}

// Charts map per program
let charts = {};

// ═══════════════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════════════
function esc(v) {
  return String(v ?? '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}
function sanitizeHTML(v) {
  return typeof DOMPurify !== 'undefined'
    ? DOMPurify.sanitize(String(v ?? ''))
    : esc(v);
}
function validateNoProtoPollution(obj) {
  if (obj === null || typeof obj !== 'object') return;
  const banned = ['__proto__', 'constructor', 'prototype'];
  for (const key of Object.keys(obj)) {
    if (banned.includes(key)) throw new Error('Prototype pollution blocked.');
    validateNoProtoPollution(obj[key]);
  }
}
function csvCell(v) {
  const s = String(v ?? '');
  if (/^[=+\-@\t\r]/.test(s)) return "'" + s;
  return s;
}

function prog() { return state.programs[state.activeProgId] || null; }
function getWeek(w) { return prog() ? (prog().weeks[w]||null) : null; }
function weekNums() { return prog() ? Object.keys(prog().weeks).map(Number).sort((a,b)=>a-b) : []; }
function trainingDays() { return prog() ? prog().trainingDays : []; }
function activeVolWeek() {
  const ws=weekNums();
  if(!ws.length) return null;
  if(state.volWeek!=null && ws.includes(state.volWeek)) return state.volWeek;
  return ws[ws.length-1]; // default to latest
}
function changeVolWeek(dir) {
  const ws=weekNums(), cur=activeVolWeek(), i=ws.indexOf(cur), ni=i+dir;
  if(ni>=0&&ni<ws.length){ state.volWeek=ws[ni]; renderMain(); }
}

function totalVol(w) {
  const wd=getWeek(w); if(!wd) return 0;
  return Object.values(wd.days).reduce((s,d)=>s+d.exercises.reduce((a,e)=>a+(e.volume||0),0),0);
}
function avgInt(w) {
  const wd=getWeek(w); if(!wd) return 0;
  let t=0,n=0;
  Object.values(wd.days).forEach(d=>d.exercises.forEach(e=>{if(e.intensity>0){t+=e.intensity;n++;}}));
  return n?Math.round(t/n):0;
}
function catVolumes(w) {
  const wd=getWeek(w); if(!wd) return {};
  const out={};
  Object.values(wd.days).forEach(d=>d.exercises.forEach(e=>{
    if(e.isComplex && e.movements && e.movements.length) {
      // Distribute volume to each movement's own category
      e.movements.forEach(m=>{
        const cat=m.category||e.category||'other';
        const movVol=(m.reps||0)*e.sets;
        out[cat]=(out[cat]||0)+movVol;
      });
    } else {
      out[e.category]=(out[e.category]||0)+(e.volume||0);
    }
  }));
  return out;
}
function newProgId() { return 'prog_'+Date.now(); }
function destroyCharts(pid) {
  if(!charts[pid]) return;
  Object.values(charts[pid]).forEach(c=>{if(c)c.destroy();});
  charts[pid]={};
}


// ═══════════════════════════════════════════════════
//  TOP-LEVEL RENDER
// ═══════════════════════════════════════════════════
function render() {
  applyTheme();
  renderHeader();
  renderProgToolbar();
  renderSidebar();
  renderMain();
}

function renderHeader() {
  const tab = state.activeTab;
  const isProg = ['program','volume','peaking','calendar'].includes(tab);

  // Program name — only for program-related tabs
  const pn = document.getElementById('prog-name-display');
  if (pn) {
    const p = prog();
    pn.style.display = isProg ? '' : 'none';
    pn.innerHTML = isProg && p ? `<span onclick="switchTab('program')" style="cursor:pointer;" title="Go to program">${esc(p.name)}</span>` : '';
  }

  // Sub-tabs (Volume / Peaking) — only for program-related tabs
  const nav = document.getElementById('header-nav');
  if (nav) {
    nav.innerHTML = isProg ? [
      _toolsVisible['volume']!==false   ? `<button class="header-nav-btn ${tab==='volume'?'active':''}" onclick="switchTab('volume')">📊 Volume</button>`   : '',
      _toolsVisible['peaking']!==false  ? `<button class="header-nav-btn ${tab==='peaking'?'active':''}" onclick="switchTab('peaking')">🏆 Peaking</button>`  : '',
      _toolsVisible['calendar']!==false ? `<button class="header-nav-btn ${tab==='calendar'?'active':''}" onclick="switchTab('calendar')">📅 Calendar</button>` : '',
    ].join('') : '';
  }

  // Right-side actions — fully tab-specific
  const actions = document.getElementById('header-actions');
  if (!actions) return;
  const selStyle = `background:var(--dark2);color:var(--white);border:1px solid var(--dark3);border-radius:4px;padding:4px 8px;font-size:12px;font-family:'Barlow',sans-serif;`;

  if (isProg) {
    actions.innerHTML = `<button class="btn btn-gold" style="font-size:13px;" onclick="openExportModal()">⬇ Export PDF</button>`;
  } else if (tab === 'meets') {
    const meets = state.meets || [];
    actions.innerHTML =
      (meets.length ? `<button class="btn btn-outline" style="font-size:13px;" onclick="printSchedule()">🖨 Print</button>` : '') +
      `<button class="btn btn-gold" style="font-size:13px;" onclick="openAddMeet()">+ Add Event</button>`;
  } else if (tab === 'hostmeet') {
    actions.innerHTML = `<button class="btn btn-gold" style="font-size:13px;" onclick="HM.newMeet()">+ New Meet</button>`;
  } else if (tab === 'templates') {
    actions.innerHTML = `<button class="btn btn-gold" style="font-size:13px;" onclick="openNewTemplate()">+ New template</button>`;
  } else if (tab === 'roster') {
    actions.innerHTML =
      `<button class="btn btn-outline" style="font-size:13px;" onclick="openImportRosterCSV()">⬆ Import CSV</button>` +
      `<div style="position:relative;display:inline-block;">
        <button class="btn btn-outline" style="font-size:13px;" onclick="event.stopPropagation();const m=document.getElementById('roster-dl-menu');m.style.display=m.style.display==='block'?'none':'block';">⬇ Download ▾</button>
        <div id="roster-dl-menu" style="display:none;position:absolute;right:0;top:100%;margin-top:3px;background:var(--dark2);border:1px solid var(--dark3);border-radius:5px;z-index:200;min-width:150px;padding:4px 0;box-shadow:0 4px 14px rgba(0,0,0,0.5);">
          <button onclick="exportRosterPDF();document.getElementById('roster-dl-menu').style.display='none'" style="display:block;width:100%;text-align:left;padding:8px 14px;background:none;border:none;cursor:pointer;color:var(--white);font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:600;">⬇ PDF</button>
          <button onclick="exportRosterCSV();document.getElementById('roster-dl-menu').style.display='none'" style="display:block;width:100%;text-align:left;padding:8px 14px;background:none;border:none;cursor:pointer;color:var(--white);font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:600;">⬇ CSV</button>
        </div>
      </div>` +
      `<button class="btn btn-gold" style="font-size:13px;" onclick="openAddAthlete()">+ Add Athlete</button>`;
  } else {
    actions.innerHTML = '';
  }
}

function renderProgToolbar() {
  const bar = document.getElementById('prog-toolbar');
  if (!bar) return;
  const tab = state.activeTab;

  if (tab === 'program') {
    bar.style.display = 'flex';
    const wd = getWeek(state.currentWeek);
    const phase = wd?.phase || 'accumulation';
    const ws = weekNums();
    bar.innerHTML = `
      <button class="btn-ghost" onclick="changeWeek(-1)" style="font-size:18px;padding:2px 6px;border:none;cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-weight:700;color:var(--muted);">‹</button>
      <span style="font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;color:var(--white);white-space:nowrap;">Week ${state.currentWeek||'—'}</span>
      ${wd?`<select onchange="setWeekPhase(${state.currentWeek},this.value)" class="phase-badge phase-${phase}" style="font-size:10px;padding:2px 7px;border:none;cursor:pointer;appearance:none;-webkit-appearance:none;background:inherit;font-family:'Barlow Condensed',sans-serif;font-weight:600;letter-spacing:1px;text-transform:uppercase;">
        ${Object.entries(PHASES).map(([k,v])=>`<option value="${k}" ${k===phase?'selected':''}>${v}</option>`).join('')}
      </select>`:''}${wd?`<style>#prog-bar select.phase-badge option{background:var(--dark2);color:var(--white);text-transform:none;letter-spacing:0;font-size:13px;}</style>`:''}${''}
      <button class="btn-ghost" onclick="changeWeek(1)" style="font-size:18px;padding:2px 6px;border:none;cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-weight:700;color:var(--muted);">›</button>
      <div class="prog-toolbar-sep"></div>
      <button onclick="openManageDays()" style="background:none;border:none;cursor:pointer;color:var(--muted);font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:600;padding:3px 8px;">⚙ Days</button>
      <button onclick="openAddWeek()" style="background:none;border:none;cursor:pointer;color:var(--muted);font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:600;padding:3px 8px;">+ Week</button>
      <div class="prog-toolbar-sep"></div>
      <button onclick="openAddExercise()" style="background:none;border:none;cursor:pointer;color:var(--gold);font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:600;padding:3px 8px;">+ Add exercise</button>
      <button onclick="openDuplicateWeek()" style="background:none;border:none;cursor:pointer;color:var(--muted);font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:600;padding:3px 8px;">⧉ Duplicate</button>
      ${ws.length>0?`<button onclick="confirmDeleteWeek()" style="background:none;border:none;cursor:pointer;color:#E07070;font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:600;padding:3px 8px;">🗑 Delete week</button>`:''}`;

  } else if (tab === 'meets') {
    bar.style.display = 'flex';
    const meets = state.meets || [];
    const today = new Date().toISOString().slice(0,10);
    const upcomingCount = meets.filter(m => !m.date || m.date >= today).length;
    const pastMeets     = meets.filter(m =>  m.date && m.date <  today);
    const first  = pastMeets.filter(m => m.result?.placement === 1).length;
    const second = pastMeets.filter(m => m.result?.placement === 2).length;
    const third  = pastMeets.filter(m => m.result?.placement === 3).length;
    const statParts = [];
    if (upcomingCount)     statParts.push(`${upcomingCount} upcoming`);
    if (pastMeets.length)  statParts.push(`${pastMeets.length} past`);
    if (first)             statParts.push(`🥇 ${first}`);
    if (second)            statParts.push(`🥈 ${second}`);
    if (third)             statParts.push(`🥉 ${third}`);
    const selStyle = `background:var(--dark);color:var(--white);border:1px solid var(--dark3);border-radius:3px;padding:2px 6px;font-size:12px;font-family:'Barlow',sans-serif;height:26px;`;
    bar.innerHTML = `
      <span style="font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;color:var(--white);">Schedule</span>
      ${statParts.length ? `<div class="prog-toolbar-sep"></div><span style="font-family:'Barlow Condensed',sans-serif;font-size:12px;color:var(--muted);">${statParts.join(' · ')}</span>` : ''}
      <div class="prog-toolbar-sep"></div>
      <select onchange="_meetFilter.timing=this.value;renderMain()" style="${selStyle}">
        <option value="" ${_meetFilter.timing===''?'selected':''}>All events</option>
        <option value="upcoming" ${_meetFilter.timing==='upcoming'?'selected':''}>Upcoming</option>
        <option value="past" ${_meetFilter.timing==='past'?'selected':''}>Past</option>
      </select>
      <select onchange="_meetFilter.homeAway=this.value;renderMain()" style="${selStyle}">
        <option value="" ${_meetFilter.homeAway===''?'selected':''}>Home &amp; Away</option>
        <option value="Home" ${_meetFilter.homeAway==='Home'?'selected':''}>Home</option>
        <option value="Away" ${_meetFilter.homeAway==='Away'?'selected':''}>Away</option>
      </select>`;

  } else if (tab === 'roster') {
    bar.style.display = 'flex';
    const athletes = state.roster?.athletes || [];
    const count = athletes.length;
    const genders = [...new Set(athletes.map(a=>a.gender).filter(Boolean))].sort();
    const wcs = [...new Set(athletes.map(a=>a.wc).filter(Boolean))].sort((a,b)=>{
      if(a==='UNL') return 1; if(b==='UNL') return -1; return parseInt(a)-parseInt(b);
    });
    const teams = [...new Set(athletes.map(a=>a.team).filter(Boolean))].sort();
    const selStyle = `background:var(--dark);color:var(--white);border:1px solid var(--dark3);border-radius:3px;padding:2px 6px;font-size:12px;font-family:'Barlow',sans-serif;height:26px;`;
    bar.innerHTML = `
      <span style="font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;color:var(--white);white-space:nowrap;">Athlete Roster</span>
      <span style="font-family:'Barlow Condensed',sans-serif;font-size:12px;color:var(--muted);margin-left:8px;white-space:nowrap;">${count} athlete${count!==1?'s':''}</span>
      <div class="prog-toolbar-sep"></div>
      ${genders.length ? `<select onchange="_rosterFilter.gender=this.value;renderMain()" style="${selStyle}"><option value="">All genders</option>${genders.map(g=>`<option value="${g}" ${_rosterFilter.gender===g?'selected':''}>${g}</option>`).join('')}</select>` : ''}
      ${wcs.length ? `<select onchange="_rosterFilter.wc=this.value;renderMain()" style="${selStyle}"><option value="">All weight classes</option>${wcs.map(w=>`<option value="${w}" ${_rosterFilter.wc===w?'selected':''}>${w}</option>`).join('')}</select>` : ''}
      ${teams.length ? `<select onchange="_rosterFilter.team=this.value;renderMain()" style="${selStyle}"><option value="">Varsity &amp; JV</option>${teams.map(t=>`<option value="${t}" ${_rosterFilter.team===t?'selected':''}>${t}</option>`).join('')}</select>` : ''}
      <div class="prog-toolbar-sep"></div>
      <button onclick="openManageRosterFields()" style="background:none;border:none;cursor:pointer;color:var(--muted);font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:600;padding:3px 8px;">⚙ Manage fields</button>
      ${count?`<button onclick="clearRoster()" style="background:none;border:none;cursor:pointer;color:#E07070;font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:600;padding:3px 8px;">🗑 Clear roster</button>`:''}`;

  } else if (tab === 'templates') {
    bar.style.display = 'flex';
    const count = (state.templates || []).length;
    bar.innerHTML = `
      <span style="font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;color:var(--white);">Program Templates</span>
      <span style="font-family:'Barlow Condensed',sans-serif;font-size:12px;color:var(--muted);margin-left:8px;">${count} template${count!==1?'s':''}</span>
      <div class="prog-toolbar-sep"></div>
      <button onclick="openSaveAsTemplate()" style="background:none;border:none;cursor:pointer;color:var(--muted);font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:600;padding:3px 8px;">💾 Save current program</button>
      <button onclick="openImportTemplate()" style="background:none;border:none;cursor:pointer;color:var(--muted);font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:600;padding:3px 8px;">📂 Import</button>`;

  } else if (tab === 'calendar') {
    bar.style.display = 'flex';
    const p = prog();
    const ws = weekNums();
    // Initialize nav state
    if (_calNavYear === null) { const now=new Date(); _calNavYear=now.getFullYear(); _calNavMonth=now.getMonth(); }
    if (!ws.includes(_calNavWeek)) _calNavWeek = ws[0]||1;
    const MONTH_NAMES=['January','February','March','April','May','June','July','August','September','October','November','December'];
    const btnV = (v,label) => `<button onclick="calChangeView('${v}')" style="font-size:11px;padding:2px 10px;border:1px solid ${_calView===v?'var(--gold)':'var(--dark3)'};background:${_calView===v?'var(--gold-a15)':'var(--dark2)'};color:${_calView===v?'var(--gold)':'var(--muted)'};cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-weight:700;">${label}</button>`;
    const navLabel = _calView==='month' ? `${MONTH_NAMES[_calNavMonth]} ${_calNavYear}` : _calView==='week' ? `Week ${_calNavWeek}` : '';
    const selStyle = `background:var(--dark);color:var(--white);border:1px solid var(--dark3);border-radius:3px;padding:2px 6px;font-size:12px;font-family:'Barlow',sans-serif;height:26px;`;
    bar.innerHTML = `
      <span style="font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;color:var(--white);">Program Calendar</span>
      <div class="prog-toolbar-sep"></div>
      <label style="font-size:12px;color:var(--muted);display:flex;align-items:center;gap:5px;">Start date
        <input type="date" value="${p?.startDate||''}" onchange="setProgStartDate(this.value)" style="${selStyle}width:130px;">
      </label>
      <div class="prog-toolbar-sep"></div>
      <div style="display:flex;border-radius:4px;overflow:hidden;">
        ${btnV('month','Month')}${btnV('week','Week')}${btnV('overview','Overview')}
      </div>
      ${_calView!=='overview'?`<div class="prog-toolbar-sep"></div>
        <button onclick="calNavPrev()" style="background:none;border:none;cursor:pointer;color:var(--muted);font-size:18px;padding:0 4px;font-family:'Barlow Condensed',sans-serif;font-weight:700;">‹</button>
        <span style="font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:600;color:var(--white);white-space:nowrap;">${navLabel}</span>
        <button onclick="calNavNext()" style="background:none;border:none;cursor:pointer;color:var(--muted);font-size:18px;padding:0 4px;font-family:'Barlow Condensed',sans-serif;font-weight:700;">›</button>`:''}
      ${ws.length?`<div class="prog-toolbar-sep"></div><span style="font-family:'Barlow Condensed',sans-serif;font-size:12px;color:var(--muted);">${ws.length} week${ws.length!==1?'s':''}</span>`:''}
    `;

  } else if (tab === 'peaking') {
    bar.style.display = 'flex';
    const ws = weekNums();
    const p = prog();
    const storedComp = p?._compWeek || ws[ws.length-1];
    const weekOpts = ws.map(w => {
      const wd = getWeek(w);
      const phase = wd ? (PHASES[wd.phase]||wd.phase) : '';
      return `<option value="${w}" ${w===storedComp?'selected':''}>Week ${w}${phase?' — '+phase:''}</option>`;
    }).join('');
    const selStyle = `background:var(--dark);color:var(--gold);border:1px solid var(--dark3);border-radius:3px;padding:2px 6px;font-size:12px;font-family:'Barlow Condensed',sans-serif;font-weight:600;height:26px;`;
    bar.innerHTML = `
      <span style="font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;color:var(--white);">Peaking Plan</span>
      ${ws.length ? `<div class="prog-toolbar-sep"></div>
        <label style="font-size:12px;color:var(--muted);display:flex;align-items:center;gap:6px;">Competition week
          <select id="comp-week-sel" onchange="setCompWeek(+this.value)" style="${selStyle}">${weekOpts}</select>
        </label>` : ''}`;

  } else if (tab === 'volume') {
    bar.style.display = 'flex';
    const ws = weekNums();
    const vw = activeVolWeek();
    bar.innerHTML = `
      <span style="font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;color:var(--white);">Volume Tracking</span>
      ${ws.length ? `<div class="prog-toolbar-sep"></div>
        <button class="btn-ghost" onclick="changeVolWeek(-1)" style="font-size:18px;padding:2px 6px;border:none;cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-weight:700;color:var(--muted);">‹</button>
        <span style="font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;color:var(--white);white-space:nowrap;">Week ${vw}</span>
        <button class="btn-ghost" onclick="changeVolWeek(1)" style="font-size:18px;padding:2px 6px;border:none;cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-weight:700;color:var(--muted);">›</button>
        <span style="font-size:12px;color:var(--muted);">${ws.indexOf(vw)+1} of ${ws.length} weeks</span>` : ''}`;

  } else if (tab === 'hostmeet') {
    bar.style.display = 'flex';
    bar.innerHTML = typeof HM !== 'undefined' ? HM.buildSubHeaderHTML() : '';

  } else if (tab === 'library') {
    bar.style.display = 'flex';
    const lib = state.exerciseLibrary || [];
    const count = lib.length;
    const usedCats = [...new Set(lib.map(e=>e.category).filter(Boolean))];
    const selStyle = `background:var(--dark);color:var(--white);border:1px solid var(--dark3);border-radius:3px;padding:2px 6px;font-size:12px;font-family:'Barlow',sans-serif;height:26px;`;
    bar.innerHTML = `
      <span style="font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;color:var(--white);">Exercise Library</span>
      <span style="font-family:'Barlow Condensed',sans-serif;font-size:12px;color:var(--muted);margin-left:8px;">${count} exercise${count!==1?'s':''}</span>
      <div class="prog-toolbar-sep"></div>
      <input type="text" placeholder="Search…" value="${esc(_libraryFilter.search)}"
        oninput="_libraryFilter.search=this.value;renderLibraryContent()"
        style="background:var(--dark);color:var(--white);border:1px solid var(--dark3);border-radius:3px;padding:2px 8px;font-size:12px;font-family:'Barlow',sans-serif;height:26px;width:160px;">
      <select onchange="_libraryFilter.category=this.value;renderLibraryContent()" style="${selStyle}">
        <option value="" ${_libraryFilter.category===''?'selected':''}>All categories</option>
        ${usedCats.sort().map(c=>`<option value="${c}" ${_libraryFilter.category===c?'selected':''}>${CAT_META[c]?.label||c}</option>`).join('')}
      </select>
      <div class="prog-toolbar-sep"></div>
      <button onclick="loadDefaultLibrary()" style="background:none;border:none;cursor:pointer;color:var(--muted);font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:600;padding:3px 8px;" title="Add the standard Olympic weightlifting exercise list">⬇ Load Defaults</button>
      <div class="prog-toolbar-sep"></div>
      <button onclick="openAddToLibrary()" style="background:none;border:none;cursor:pointer;color:var(--gold);font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:600;padding:3px 8px;">+ Add Exercise</button>`;

  } else if (tab === 'calculator') {
    bar.style.display = 'flex';
    const unit = state.weightUnit;
    const athletes = (state.roster?.athletes || []).filter(a => a.name);
    const selStyle = `background:var(--dark);color:var(--white);border:1px solid var(--dark3);border-radius:3px;padding:2px 6px;font-size:12px;font-family:'Barlow',sans-serif;height:26px;`;
    bar.innerHTML = `
      <span style="font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;color:var(--white);">Weight Calculator</span>
      <div class="prog-toolbar-sep"></div>
      <select id="calc-athlete" onchange="loadAthleteIntoCalc()" style="${selStyle}">
        <option value="">— Select athlete —</option>
        ${athletes.map(a=>`<option value="${esc(a.id||a.name)}">${esc(a.name)}${a.wc?' ('+esc(a.wc)+' lbs)':''}</option>`).join('')}
      </select>
      <div class="prog-toolbar-sep"></div>
      <div style="display:flex;background:var(--dark);border:1px solid var(--dark3);border-radius:3px;overflow:hidden;">
        <button onclick="state.weightUnit='lbs';saveState();renderMain();" style="padding:2px 10px;border:none;cursor:pointer;font-size:11px;font-weight:700;font-family:'Barlow Condensed',sans-serif;background:${unit==='lbs'?'var(--dark3)':'transparent'};color:${unit==='lbs'?'var(--white)':'var(--muted)'};">LBS</button>
        <button onclick="state.weightUnit='kg';saveState();renderMain();" style="padding:2px 10px;border:none;cursor:pointer;font-size:11px;font-weight:700;font-family:'Barlow Condensed',sans-serif;background:${unit==='kg'?'var(--dark3)':'transparent'};color:${unit==='kg'?'var(--white)':'var(--muted)'};">KG</button>
      </div>`;

  } else {
    bar.style.display = 'none';
  }
}

let _progSectionOpen = true;
let _hiddenVolCats = new Set(); // categories hidden in the volume legend filter
let _calView = 'month';   // 'month' | 'week' | 'overview'
let _calNavYear  = null;  // initialized on first render
let _calNavMonth = null;  // 0-11
let _calNavWeek  = 1;     // program week number shown in week view
let _toolsVisible = {};         // per-tool sidebar/header visibility, persisted in localStorage
let _volActiveCats = [];        // ordered category list for the current week (for index mapping)
let _copiedExercise = null;     // clipboard for copy/paste exercise
let _dragDay = null, _dragSection = null, _dragIdx = null; // drag-and-drop state

function renderSidebar() {
  const progs = Object.values(state.programs);

  // Group programs by org, ungrouped last
  const groups = {};
  progs.forEach(p => {
    const key = (p.org || '').trim();
    if (!groups[key]) groups[key] = [];
    groups[key].push(p);
  });
  const orgKeys = Object.keys(groups).sort((a, b) => {
    if (!a && b) return 1;
    if (a && !b) return -1;
    return a.localeCompare(b);
  });
  const multiOrg = orgKeys.length > 1 || (orgKeys.length === 1 && orgKeys[0] !== '');

  const progRow = p => `
    <div class="prog-list-item ${p.id===state.activeProgId&&['program','volume','peaking','calendar'].includes(state.activeTab)?'active':''}" onclick="switchProgram('${p.id}')">
      <span class="pl-name">${esc(p.name)}</span>
      <span class="pl-actions">
        <button class="pl-btn" onclick="event.stopPropagation();shareProgram('${p.id}')" title="Share / Export program as JSON">⬆</button>
        <button class="pl-btn" onclick="event.stopPropagation();openEditProgram('${p.id}')" title="Rename">✏</button>
        ${progs.length>1?`<button class="pl-btn" onclick="event.stopPropagation();deleteProgram('${p.id}')" title="Delete" style="color:#E07070;">✕</button>`:''}
      </span>
    </div>`;

  let progItems = '';
  if (multiOrg) {
    orgKeys.forEach(org => {
      progItems += `<div style="padding:6px 1.25rem 2px;font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:700;letter-spacing:1.4px;color:var(--gold);text-transform:uppercase;opacity:0.85;">${esc(org) || 'No School / Sport'}</div>`;
      progItems += groups[org].map(progRow).join('');
    });
  } else {
    progItems = progs.map(progRow).join('');
  }

  const allTeams = Object.values(_stateCore.teams);
  const teamSelector = `
    <div style="padding:.7rem 1rem .6rem;border-bottom:1px solid var(--dark3);background:var(--dark2);">
      <div style="font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:600;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase;margin-bottom:5px;">Team</div>
      <div style="display:flex;align-items:center;gap:4px;">
        <select onchange="switchTeam(this.value)" style="flex:1;background:var(--dark);border:1px solid var(--dark3);color:var(--white);border-radius:4px;padding:5px 7px;font-size:13px;font-family:'Barlow',sans-serif;min-width:0;">
          ${allTeams.map(t=>`<option value="${t.id}" ${t.id===_stateCore.activeTeamId?'selected':''}>${t.name}</option>`).join('')}
        </select>
        <button onclick="openNewTeam()" title="New team" style="flex-shrink:0;background:var(--dark);border:1px solid var(--dark3);color:var(--gold);border-radius:4px;cursor:pointer;font-size:15px;line-height:1;padding:3px 7px;font-weight:700;">+</button>
        <button onclick="openEditTeam()" title="Edit team" style="flex-shrink:0;background:none;border:none;color:var(--muted);cursor:pointer;font-size:12px;padding:3px 5px;" onmouseenter="this.style.color='var(--white)'" onmouseleave="this.style.color='var(--muted)'">✏</button>
        ${allTeams.length>1?`<button onclick="confirmDeleteTeam()" title="Delete team" style="flex-shrink:0;background:none;border:none;color:#555;cursor:pointer;font-size:12px;padding:3px 5px;" onmouseenter="this.style.color='#E07070'" onmouseleave="this.style.color='#555'">✕</button>`:''}
      </div>
    </div>`;

  document.getElementById('sidebar').innerHTML = teamSelector + `
    <div onclick="toggleProgSection()" style="display:flex;align-items:center;justify-content:space-between;padding:.9rem 1.25rem .4rem;cursor:pointer;user-select:none;" onmouseenter="this.style.background='var(--dark2)'" onmouseleave="this.style.background=''">
      <span style="font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:600;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase;">Programs</span>
      <span style="font-size:11px;color:var(--muted);transition:transform .2s;display:inline-block;transform:${_progSectionOpen?'rotate(0deg)':'rotate(-90deg)'};">▾</span>
    </div>
    <div id="prog-section-body" style="display:${_progSectionOpen?'block':'none'};">
      ${progItems}
      <button onclick="openNewProgram()" style="display:flex;align-items:center;gap:6px;padding:7px 1.25rem 7px 1.5rem;background:none;border:none;cursor:pointer;color:var(--muted);font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:600;width:100%;text-align:left;" onmouseenter="this.style.color='var(--gold)'" onmouseleave="this.style.color='var(--muted)'">+ New program</button>
      <button onclick="importSharedProgram()" style="display:flex;align-items:center;gap:6px;padding:7px 1.25rem 7px 1.5rem;background:none;border:none;cursor:pointer;color:var(--muted);font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:600;width:100%;text-align:left;" onmouseenter="this.style.color='var(--gold)'" onmouseleave="this.style.color='var(--muted)'">↓ Import shared program</button>
    </div>
    <div style="height:1px;background:var(--dark3);margin:4px 0;"></div>
    <div class="sidebar-section-label" style="padding-top:.5rem;">Tools</div>
    ${_toolsVisible['roster']!==false?`<div class="nav-item ${state.activeTab==='roster'?'active':''}" onclick="switchTab('roster')"><span>👥</span> Roster</div>`:''}
    ${_toolsVisible['meets']!==false?`<div class="nav-item ${state.activeTab==='meets'?'active':''}" onclick="switchTab('meets')"><span>🗓</span> Schedule</div>`:''}
    ${_toolsVisible['calculator']!==false?`<div class="nav-item ${state.activeTab==='calculator'?'active':''}" onclick="switchTab('calculator')"><span>⚖️</span> Calculator</div>`:''}
    ${_toolsVisible['templates']!==false?`<div class="nav-item ${state.activeTab==='templates'?'active':''}" onclick="switchTab('templates')"><span>📐</span> Templates</div>`:''}
    ${_toolsVisible['library']!==false?`<div class="nav-item ${state.activeTab==='library'?'active':''}" onclick="switchTab('library')"><span>📚</span> Exercise Library</div>`:''}
    <div style="height:1px;background:var(--dark3);margin:4px 0;"></div>
    ${_toolsVisible['hostmeet']!==false?`<div class="nav-item ${state.activeTab==='hostmeet'?'active':''}" onclick="switchTab('hostmeet')"><span>🏆</span> Host Meet</div>`:''}
    <div style="flex:1;"></div>
    <div style="padding:.75rem 1.25rem;border-top:1px solid var(--dark3);display:flex;gap:5px;">
      <button id="undo-btn" onclick="undo()" style="flex:1;background:var(--dark2);border:1px solid var(--dark3);cursor:pointer;color:var(--muted);font-size:10px;border-radius:3px;padding:4px;opacity:0.3;pointer-events:none;" title="Undo last action (Ctrl+Z)">⟲ Undo</button>
      <button onclick="openSettings()" style="flex:1;background:var(--dark2);border:1px solid var(--dark3);cursor:pointer;color:var(--muted);font-size:10px;border-radius:3px;padding:4px;" title="Settings">⚙ Settings</button>
    </div>`;
}

function toggleProgSection() {
  _progSectionOpen = !_progSectionOpen;
  const body = document.getElementById('prog-section-body');
  if (body) body.style.display = _progSectionOpen ? 'block' : 'none';
  const chevron = document.querySelector('#sidebar [onclick="toggleProgSection()"] span:last-child');
  if (chevron) chevron.style.transform = _progSectionOpen ? 'rotate(0deg)' : 'rotate(-90deg)';
}

function renderHeaderActions() { /* no-op — handled by renderHeader */ }

function renderMain() {
  const area = document.getElementById('main-area');
  if (state.activeTab==='program')   { area.innerHTML=buildProgramHTML(); }
  else if (state.activeTab==='volume')  { area.innerHTML=buildVolumeHTML(); initVolumeCharts(); }
  else if (state.activeTab==='peaking') { area.innerHTML=buildPeakingHTML(); initPeakingChart(); }
  else if (state.activeTab==='roster')  { area.innerHTML=buildRosterHTML(); }
  else if (state.activeTab==='templates') { area.innerHTML=buildTemplatesHTML(); }
  else if (state.activeTab==='library') { area.innerHTML=buildLibraryHTML(); }
  else if (state.activeTab==='calendar') { area.innerHTML=buildCalendarHTML(); }
  else if (state.activeTab==='calculator') { area.innerHTML=buildCalculatorHTML(); }
  else if (state.activeTab==='meets') { area.innerHTML=buildMeetsHTML(); }
  else if (state.activeTab==='hostmeet') { area.innerHTML=HM.buildHTML(); }
  renderProgToolbar();
  renderHeader();
}

// ── Switch program ──
function switchProgram(id) {
  state.activeProgId=id;
  state.currentWeek=weekNums()[0]||1;
  state.volWeek=null;
  state.activeTab='program';
  _hiddenVolCats.clear(); // don't bleed legend filters across programs
  render();
}

// ── Switch tab ──
function switchTab(tab) {
  state.activeTab=tab;
  renderSidebar();
  renderMain();
}

// ── Change week ──
function changeWeek(dir) {
  const ws=weekNums(),i=ws.indexOf(state.currentWeek),ni=i+dir;
  if(ni>=0&&ni<ws.length){state.currentWeek=ws[ni];renderMain();}
}

// ═══════════════════════════════════════════════════
//  PROGRAM TAB
// ═══════════════════════════════════════════════════
function buildProgramHTML() {
  if(!prog()) {
    return `<div style="padding:3rem;text-align:center;">
      <div style="font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:700;margin-bottom:8px;">No programs yet</div>
      <div style="color:var(--muted);font-size:14px;">Use the <span style="color:var(--gold);font-weight:600;">+ New program</span> button above to get started.</div>
    </div>`;
  }
  const wd=getWeek(state.currentWeek);
  const phase=wd?wd.phase:'accumulation';
  const noteHTML=wd&&wd.note?`<div class="note-bar">📌 <span>${esc(wd.note)}</span></div>`:'';
  const ws=weekNums();

  function fmtPct(lo, hi) { if(lo<=0&&(!hi||hi<=0)) return '—'; if(hi>lo) return `${lo}–${hi}%`; return lo>0?`${lo}%`:'—'; }
  function exRow(ex, i, section, totalInSection) {
    const LETTERS=['A','B','C','D'];
    let nameCell;
    if(ex.isSuperset && ex.supersetExercises) {
      const parts=ex.supersetExercises.map((se,si)=>{
        const intDisplay=se.useRPE?`RPE ${se.rpe||8}`:fmtPct(se.intensity||0,se.intensityHigh||0);
        const measure=se.useTime?`${se.seconds||0}s`:`${se.reps||0} reps`;
        return `<span style="display:block;font-size:11px;color:var(--light);padding-left:12px;"><span style="color:var(--gold);font-weight:700;font-family:'Barlow Condensed',sans-serif;">${LETTERS[si]}.</span> ${esc(se.name)} — ${measure} @ ${intDisplay}</span>`;
      }).join('');
      nameCell=`<span class="cat-dot cat-${ex.category}"></span><span style="font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:.5px;color:var(--muted);">SUPERSET</span>${parts}`;
    } else if(ex.isComplex && ex.movements && ex.movements.length){
      const movParts=ex.movements.map(m=>`<span style="display:block;font-size:11px;color:var(--light);padding-left:12px;"><span class="cat-dot cat-${m.category||'other'}" style="width:5px;height:5px;"></span>${m.reps}× ${esc(m.name)}</span>`).join('');
      let groupParts='';
      if(ex.complexGroups&&ex.complexGroups.length>1){
        groupParts=ex.complexGroups.map(cg=>`<span style="display:block;font-size:11px;color:var(--muted);padding-left:12px;">${cg.sets} set${cg.sets!==1?'s':''} @ ${cg.intensity>0?cg.intensity+'%':'BW'}</span>`).join('');
      }
      nameCell=`<span class="cat-dot cat-${ex.category}"></span><span style="font-weight:500;">${esc(ex.name)||'Complex'}</span>${movParts}${groupParts}`;
    } else if(ex.setGroups && ex.setGroups.length>1) {
      const isLadder=ex.scheme==='ladder';
      const parts=ex.setGroups.map((sg,si)=>{
        const measure=ex.useTime?`${sg.seconds}s`:ex.useRPE?`${sg.reps}`:`${sg.reps}`;
        const intensity=ex.useRPE?`<span style="color:#E85252;">RPE ${sg.rpe||8}</span>`:fmtPct(sg.intensity||0,sg.intensityHigh||0);
        const isTop=isLadder&&si===ex.setGroups.length-1;
        return `<span style="display:block;font-size:11px;color:var(--light);padding-left:12px;">${sg.sets}×${measure} @ ${intensity}${isTop?` <span class="top-set-badge">TOP</span>`:''}</span>`;
      }).join('');
      const schemeBadge=ex.scheme&&ex.scheme!=='normal'?`<span class="scheme-badge ${ex.scheme==='amrap'?'amrap':ex.scheme==='heavy_single'?'heavy-single':'ladder'}">${ex.scheme==='amrap'?'AMRAP':ex.scheme==='heavy_single'?'HEAVY SINGLE':'LADDER'}</span>`:'';
      const rpeBadge=ex.useRPE?`<span class="scheme-badge amrap">RPE</span>`:'';
      const noteEl=ex.note?`<span class="ex-note">${esc(ex.note)}</span>`:'';
      nameCell=`<span class="cat-dot cat-${ex.category}"></span><span style="font-weight:500;">${esc(ex.name)}</span>${schemeBadge}${rpeBadge}${noteEl}${parts}`;
    } else {
      const schemeBadge=ex.scheme&&ex.scheme!=='normal'?`<span class="scheme-badge ${ex.scheme==='amrap'?'amrap':ex.scheme==='heavy_single'?'heavy-single':'ladder'}">${ex.scheme==='amrap'?'AMRAP':ex.scheme==='heavy_single'?'HEAVY SINGLE':'LADDER'}</span>`:'';
      const rpeBadge=ex.useRPE?`<span class="scheme-badge amrap">RPE</span>`:'';
      const noteEl=ex.note?`<span class="ex-note">${esc(ex.note)}</span>`:'';
      nameCell=`<span class="cat-dot cat-${ex.category}"></span>${esc(ex.name)}${schemeBadge}${rpeBadge}${noteEl}`;
    }
    const isAMRAP=ex.scheme==='amrap';
    const isHeavySingle=ex.scheme==='heavy_single';
    const sg0=ex.setGroups?.[0];
    const repsDisplay=ex.isSuperset
      ?`<span style="font-size:10px;color:var(--muted);">each</span>`
      :ex.isComplex
        ?`<span title="Reps per set">${ex.repsPerSet}<span style="font-size:10px;color:var(--muted);"> /set</span></span>`
        :isHeavySingle?`<span style="font-size:10px;color:var(--gold);">max</span>`
        :ex.useTime
          ?(ex.setGroups&&ex.setGroups.length>1?`<span style="font-size:10px;color:var(--muted);">mixed</span>`:`<span style="color:var(--gold);">${sg0?.seconds||ex.seconds||0}s</span>`)
          :(ex.setGroups&&ex.setGroups.length>1?`<span style="font-size:10px;color:var(--muted);">mixed</span>`
            :(isAMRAP?`${ex.reps}<span style="color:#E85252;font-weight:700;">+</span>`:`${ex.reps}`));
    const pctDisplay=ex.isSuperset?`<span style="font-size:10px;color:var(--muted);">—</span>`
      :ex.isComplex&&ex.complexGroups&&ex.complexGroups.length>1?`<span style="font-size:10px;color:var(--muted);">mixed</span>`
      :isHeavySingle?`<span style="font-size:10px;color:var(--gold);">build</span>`
      :ex.useRPE?(ex.setGroups&&ex.setGroups.length>1?`<span style="font-size:10px;color:var(--muted);">mixed</span>`:`<span style="color:#E85252;">RPE ${sg0?.rpe||8}</span>`)
      :ex.setGroups&&ex.setGroups.length>1?`<span style="font-size:10px;color:var(--muted);">mixed</span>`
      :fmtPct(sg0?.intensity||ex.intensity||0,sg0?.intensityHigh||0);
    const isWarmup=section==='warmup';
    const isAccessory=section==='accessory';
    const isMain=!isWarmup&&!isAccessory;
    const canUp=i>0, canDown=i<totalInSection-1;
    return `<tr class="${isWarmup?'warmup-ex-row':isAccessory?'accessory-ex-row':''}${ex.isSuperset?' superset-row':''}"
      draggable="true"
      ondragstart="exDragStart('${ex._day}','${section}',${i})"
      ondragover="event.preventDefault();this.style.outline='1px solid var(--gold)'"
      ondragleave="this.style.outline=''"
      ondrop="this.style.outline='';exDrop('${ex._day}','${section}',${i})">
      <td style="width:24px;padding:2px 3px;cursor:grab;" title="Drag to reorder">
        <div style="display:flex;flex-direction:column;gap:1px;align-items:center;">
          <span style="color:#555;font-size:13px;line-height:1;user-select:none;">⠿</span>
          <button onclick="moveExercise('${ex._day}','${section}',${i},'up')" style="background:none;border:none;cursor:${canUp?'pointer':'default'};color:${canUp?'#666':'#2a2a2a'};font-size:9px;padding:0;line-height:1;" ${canUp?'':'disabled'}>▲</button>
          <button onclick="moveExercise('${ex._day}','${section}',${i},'down')" style="background:none;border:none;cursor:${canDown?'pointer':'default'};color:${canDown?'#666':'#2a2a2a'};font-size:9px;padding:0;line-height:1;" ${canDown?'':'disabled'}>▼</button>
        </div>
      </td>
      <td style="color:${isMain?'var(--white)':'var(--muted)'};">${nameCell}</td>
      <td>${ex.sets}</td><td>${repsDisplay}</td>
      <td>${pctDisplay}</td>
      ${isMain?`<td><span class="vol-pill">${ex.volume}</span></td>`:isWarmup?`<td style="color:var(--muted);font-size:11px;">warm-up</td>`:`<td style="color:#5EC08A;font-size:11px;">accessory</td>`}
      <td style="white-space:nowrap;">
        <button onclick="openEditExercise('${ex._day}',${i},'${section}')" style="background:none;border:none;cursor:pointer;color:var(--muted);font-size:12px;padding:1px 5px;" title="Edit">✏</button>
        <button onclick="copyExercise('${ex._day}',${i},'${section}')" style="background:none;border:none;cursor:pointer;color:var(--muted);font-size:11px;padding:1px 4px;" title="Copy exercise">⧉</button>
        ${isMain?`<button onclick="openMoveToDay('${ex._day}',${i},'${section}')" style="background:none;border:none;cursor:pointer;color:var(--muted);font-size:11px;padding:1px 5px;" title="Move to another day">↷</button>`:''}
        <button onclick="deleteExercise('${ex._day}',${i},'${section}')" style="background:none;border:none;cursor:pointer;color:#555;font-size:11px;padding:1px 4px;" title="Remove">✕</button>
      </td>
    </tr>`;
  }

  const _DAY_NAMES=['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
  const _progStartDate=prog()?.startDate||null;
  function _progDayDate(weekNum,dayName){
    if(!_progStartDate) return null;
    const base=new Date(_progStartDate+'T00:00:00');
    base.setDate(base.getDate()+(weekNum-1)*7+_DAY_NAMES.indexOf(dayName));
    return base;
  }

  const days=trainingDays().map(day=>{
    const dd=wd?wd.days[day]:null;
    if(dd && !dd.warmup) dd.warmup=[];
    if(dd && !dd.accessories) dd.accessories=[];
    const mainVol=dd?dd.exercises.reduce((s,e)=>s+(e.volume||0),0):0;
    const warmupArr=dd&&dd.warmup?dd.warmup:[];
    const warmupCount=warmupArr.length;
    const accessoryArr=dd&&dd.accessories?dd.accessories:[];
    const accessoryCount=accessoryArr.length;
    const dayNote=dd&&dd.dayNote?dd.dayNote:'';

    // Tag each exercise with its day so exRow can reference it
    const taggedMain=(dd?dd.exercises:[]).map(e=>({...e,_day:day}));
    const taggedWarmup=warmupArr.map(e=>({...e,_day:day}));
    const taggedAccessory=accessoryArr.map(e=>({...e,_day:day}));

    const mainRows=taggedMain.map((ex,i)=>exRow(ex,i,'main',taggedMain.length)).join('');
    const warmupRows=taggedWarmup.map((ex,i)=>exRow(ex,i,'warmup',taggedWarmup.length)).join('');
    const accessoryRows=taggedAccessory.map((ex,i)=>exRow(ex,i,'accessory',taggedAccessory.length)).join('');

    return `<div class="day-card">
      <div class="day-card-header">
        <div>
          <div class="day-name">${day}</div>
          ${(()=>{const d=_progDayDate(state.currentWeek,day);return d?`<div style="font-size:11px;color:var(--muted);margin-top:1px;">${d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}</div>`:''})()}
          <div class="day-focus-text">${dd&&dd.focus?esc(dd.focus):'—'}</div>
        </div>
        <div style="display:flex;align-items:center;gap:7px;">
          <span class="day-vol-badge">${mainVol} reps</span>
          <div style="position:relative;display:inline-block;">
            <button onclick="toggleDayAddMenu(event,'${day}')" style="background:var(--gold-a12);border:1px solid var(--gold-a30);cursor:pointer;color:var(--gold);font-size:13px;padding:2px 8px;border-radius:3px;font-family:'Barlow Condensed',sans-serif;font-weight:600;">+ Add ▾</button>
            <div id="day-add-menu-${day}" style="display:none;position:absolute;right:0;top:100%;margin-top:3px;background:var(--dark2);border:1px solid var(--dark3);border-radius:5px;z-index:200;min-width:170px;padding:4px 0;box-shadow:0 4px 14px rgba(0,0,0,0.5);">
              <button onclick="openAddExercise('${day}','main');document.getElementById('day-add-menu-${day}').style.display='none'" style="display:block;width:100%;text-align:left;padding:7px 14px;background:none;border:none;cursor:pointer;color:var(--gold);font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:600;">Working sets</button>
              <button onclick="openAddExercise('${day}','warmup');document.getElementById('day-add-menu-${day}').style.display='none'" style="display:block;width:100%;text-align:left;padding:7px 14px;background:none;border:none;cursor:pointer;color:#3A86D4;font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:600;">Warm-up</button>
              <button onclick="openAddExercise('${day}','accessory');document.getElementById('day-add-menu-${day}').style.display='none'" style="display:block;width:100%;text-align:left;padding:7px 14px;background:none;border:none;cursor:pointer;color:#5EC08A;font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:600;">Accessory</button>
              ${_copiedExercise?`<div style="border-top:1px solid var(--dark3);margin:3px 0;"></div>
              <button onclick="pasteExercise('${day}','main');document.getElementById('day-add-menu-${day}').style.display='none'" style="display:block;width:100%;text-align:left;padding:6px 14px;background:none;border:none;cursor:pointer;color:var(--gold);font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:600;opacity:0.75;">⧉ Paste → Working sets</button>
              <button onclick="pasteExercise('${day}','warmup');document.getElementById('day-add-menu-${day}').style.display='none'" style="display:block;width:100%;text-align:left;padding:6px 14px;background:none;border:none;cursor:pointer;color:#3A86D4;font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:600;opacity:0.75;">⧉ Paste → Warm-up</button>
              <button onclick="pasteExercise('${day}','accessory');document.getElementById('day-add-menu-${day}').style.display='none'" style="display:block;width:100%;text-align:left;padding:6px 14px;background:none;border:none;cursor:pointer;color:#5EC08A;font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:600;opacity:0.75;">⧉ Paste → Accessory</button>`:''}
            </div>
          </div>
          <button onclick="openEditDay('${day}')" style="background:none;border:none;cursor:pointer;color:var(--muted);font-size:13px;padding:2px 4px;" title="Edit day">✏</button>
        </div>
      </div>
      ${dayNote?`<div style="background:var(--gold-a08);border-bottom:1px solid var(--gold-a15);padding:5px 13px;font-size:12px;color:var(--gold-light);display:flex;align-items:center;gap:6px;">📌 <span>${esc(dayNote)}</span></div>`:''}
      <div class="warmup-section">
        <div class="warmup-header">
          <div class="warmup-label">Warm-up <span class="warmup-badge">${warmupCount?warmupCount+' exercise'+(warmupCount>1?'s':''):''} <span style="opacity:0.6;">— not counted in volume</span></span></div>

        </div>
        <div class="warmup-body">
          ${warmupRows?`<table class="ex-table">
            <thead><tr><th style="width:20px;"></th><th>Exercise</th><th>Sets</th><th>Reps</th><th>%1RM</th><th></th><th></th></tr></thead>
            <tbody>${warmupRows}</tbody>
          </table>`:`<button onclick="openAddExercise('${day}','warmup')" style="display:block;width:100%;padding:8px 13px;background:none;border:none;border-top:1px dashed rgba(58,134,212,0.2);cursor:pointer;text-align:left;font-size:12px;color:#3A86D4;font-family:'Barlow Condensed',sans-serif;font-weight:600;">+ Add warm-up exercise</button>`}
        </div>
      </div>
      <div>
        <div style="padding:5px 13px 4px;font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:var(--muted);">Working Sets</div>
        ${taggedMain.length?`<table class="ex-table">
          <thead><tr><th style="width:20px;"></th><th>Exercise</th><th>Sets</th><th>Reps</th><th>%1RM</th><th>Vol</th><th></th></tr></thead>
          <tbody>${mainRows}</tbody>
        </table>`:`<div class="empty-msg" style="padding:.75rem 1rem;font-size:13px;cursor:pointer;" onclick="openAddExercise('${day}','main')">No working exercises — <span style="color:var(--gold);">+ Add one</span></div>`}
      </div>
      <div class="accessory-section">
        <div class="accessory-header">
          <div class="accessory-label">Accessories <span class="accessory-badge">${accessoryCount?accessoryCount+' exercise'+(accessoryCount>1?'s':''):''} <span style="opacity:0.6;">— not counted in volume</span></span></div>

        </div>
        <div class="accessory-body">
          ${accessoryRows?`<table class="ex-table">
            <thead><tr><th style="width:20px;"></th><th>Exercise</th><th>Sets</th><th>Reps</th><th>%1RM</th><th></th><th></th></tr></thead>
            <tbody>${accessoryRows}</tbody>
          </table>`:`<button onclick="openAddExercise('${day}','accessory')" style="display:block;width:100%;padding:8px 13px;background:none;border:none;border-top:1px dashed rgba(94,192,138,0.2);cursor:pointer;text-align:left;font-size:12px;color:#5EC08A;font-family:'Barlow Condensed',sans-serif;font-weight:600;">+ Add accessory exercise</button>`}
        </div>
      </div>
    </div>`;
  }).join('');

  return `
    ${noteHTML}
    <div class="days-grid">${days||'<div class="empty-msg">No program data. Add a week from the toolbar above to get started.</div>'}</div>`;
}

function confirmDeleteWeek() {
  if(!confirm(`Delete Week ${state.currentWeek}? All exercises for this week will be permanently removed.`)) return;
  delete prog().weeks[state.currentWeek];
  saveState();
  const remaining=weekNums();
  state.currentWeek=remaining.length?remaining[remaining.length-1]:null;
  render();
}

function moveExercise(day, section, idx, dir) {
  const wd=getWeek(state.currentWeek); if(!wd) return;
  const arr=section==='warmup'?(wd.days[day].warmup||[]):section==='accessory'?(wd.days[day].accessories||[]):wd.days[day].exercises;
  const newIdx=dir==='up'?idx-1:idx+1;
  if(newIdx<0||newIdx>=arr.length) return;
  [arr[idx],arr[newIdx]]=[arr[newIdx],arr[idx]];
  saveState(); renderMain();
}

function _exArr(wd, day, section) {
  const dd = wd.days[day];
  return section==='warmup'?(dd.warmup||[]):section==='accessory'?(dd.accessories||[]):dd.exercises;
}

function exDragStart(day, section, idx) {
  _dragDay=day; _dragSection=section; _dragIdx=idx;
}

function exDrop(toDay, toSection, toIdx) {
  if(_dragDay===null) return;
  const wd=getWeek(state.currentWeek); if(!wd) return;
  const fromArr=_exArr(wd,_dragDay,_dragSection);
  const toArr=_exArr(wd,toDay,toSection);
  const [moved]=fromArr.splice(_dragIdx,1);
  const adjustedIdx=(fromArr===toArr&&toIdx>_dragIdx)?toIdx-1:toIdx;
  toArr.splice(adjustedIdx,0,moved);
  _dragDay=null; _dragSection=null; _dragIdx=null;
  saveState(); renderMain();
}

function copyExercise(day, idx, section) {
  const wd=getWeek(state.currentWeek); if(!wd) return;
  const arr=_exArr(wd,day,section);
  if(!arr[idx]) return;
  _copiedExercise=JSON.parse(JSON.stringify(arr[idx]));
  showToast('Exercise copied — click Paste in any day section to add it');
}

function pasteExercise(day, section) {
  if(!_copiedExercise) return;
  const wd=getWeek(state.currentWeek); if(!wd) return;
  if(!wd.days[day]) wd.days[day]={focus:'',mobility:'',dayNote:'',exercises:[],warmup:[],accessories:[]};
  const arr=_exArr(wd,day,section);
  arr.push(JSON.parse(JSON.stringify(_copiedExercise)));
  saveState(); renderMain();
}

function openMoveToDay(fromDay, idx, section) {
  const days=trainingDays().filter(d=>d!==fromDay);
  if(!days.length){alert('No other training days to move to.');return;}
  document.getElementById('modal-body').innerHTML=`
    <h3>Move Exercise to Another Day</h3>
    <p style="font-size:13px;color:var(--muted);margin-bottom:1rem;">The exercise will be appended to the working sets of the selected day.</p>
    <div class="form-field"><label>Move to day</label>
      <select id="move-day">${days.map(d=>`<option value="${d}">${d}</option>`).join('')}</select>
    </div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
      <button class="btn btn-gold" onclick="confirmMoveToDay('${fromDay}',${idx},'${section}')">Move</button>
    </div>`;
  document.getElementById('overlay').style.display='flex';
}

function confirmMoveToDay(fromDay, idx, section) {
  const toDay=document.getElementById('move-day').value;
  const wd=getWeek(state.currentWeek); if(!wd) return;
  const srcArr=section==='warmup'?(wd.days[fromDay].warmup||[]):section==='accessory'?(wd.days[fromDay].accessories||[]):wd.days[fromDay].exercises;
  const [ex]=srcArr.splice(idx,1);
  if(!wd.days[toDay]) wd.days[toDay]={focus:'',mobility:'',dayNote:'',exercises:[],warmup:[],accessories:[]};
  if(!wd.days[toDay].exercises) wd.days[toDay].exercises=[];
  wd.days[toDay].exercises.push(ex);
  closeModal(); saveState(); renderMain();
}

function deleteExercise(day, idx, section='main') {
  const wd=getWeek(state.currentWeek);
  if(wd&&wd.days[day]){
    const arr=section==='warmup'?(wd.days[day].warmup||[]):section==='accessory'?(wd.days[day].accessories||[]):wd.days[day].exercises;
    arr.splice(idx,1);
    renderMain();
  }
}

function initVolumeCharts() {
  const pid=state.activeProgId;
  destroyCharts(pid);
  charts[pid]={};
  const ws=weekNums();
  if(!ws.length){document.getElementById('vol-metrics').innerHTML='<div class="empty-msg">No data yet.</div>';return;}

  const vw=activeVolWeek();
  const lv=totalVol(vw), li=avgInt(vw);
  const prevW=ws[ws.indexOf(vw)-1];
  const pv=prevW!=null?totalVol(prevW):lv;
  const diff=lv-pv;
  const cats=catVolumes(vw);
  if(document.getElementById('breakdown-wk')) document.getElementById('breakdown-wk').textContent=vw;

  const diffStr=(diff>=0?'+':'')+diff;
  const diffCls=diff>=0?'metric-up':'metric-down';
  document.getElementById('vol-metrics').innerHTML=`
    <div class="metric-card"><div class="metric-label">Total volume</div><div class="metric-value">${lv}</div><div class="metric-sub">reps — week ${vw}${prevW!=null?` <span class="${diffCls}">(${diffStr} vs wk ${prevW})</span>`:''}</div></div>
    <div class="metric-card"><div class="metric-label">Snatch vol</div><div class="metric-value" style="color:#C9A84C;">${cats['snatch']||0}</div><div class="metric-sub">reps — week ${vw}</div></div>
    <div class="metric-card"><div class="metric-label">Clean/Jerk vol</div><div class="metric-value" style="color:#3A86D4;">${(cats['clean']||0)+(cats['jerk']||0)+(cats['cj']||0)}</div><div class="metric-sub">reps — week ${vw}</div></div>
    <div class="metric-card"><div class="metric-label">Bench vol</div><div class="metric-value" style="color:#C06060;">${cats['bench']||0}</div><div class="metric-sub">reps — week ${vw}</div></div>`;

  // ── Clickable legend filter ──
  const activeCats=Object.keys(cats).filter(c=>cats[c]>0);
  _volActiveCats=activeCats;
  document.getElementById('cat-legend').innerHTML=activeCats.map(c=>`
    <div class="legend-item" data-volcat="${c}" onclick="toggleVolCat('${c}')"
      style="cursor:pointer;padding:3px 8px 3px 4px;border-radius:3px;transition:opacity .15s;opacity:${_hiddenVolCats.has(c)?'0.35':'1'};${_hiddenVolCats.has(c)?'text-decoration:line-through;':''}"
      title="Click to show/hide ${CAT_META[c]?CAT_META[c].label:c}"
      onmouseenter="this.style.background='var(--dark3)'" onmouseleave="this.style.background=''">
      <div class="legend-dot" style="background:${CAT_META[c]?CAT_META[c].color:'#888'};"></div>
      ${CAT_META[c]?CAT_META[c].label:c}
    </div>`).join('');

  // ── Category breakdown bar + donut ──

// ── Peaking helpers ──
function setCompWeek(w) {
  const p=prog(); if(!p) return;
  p._compWeek=w; saveState(); initPeakingChart();
}

function addPlannedWeek() {
  const p=prog(); if(!p) return;
  if(!p._plannedWeeks) p._plannedWeeks=[];
  const ws=weekNums();
  const usedWeeks=p._plannedWeeks.map(pw=>pw.week);
  let next=(ws.length?Math.max(...ws):0)+1;
  while(usedWeeks.includes(next)) next++;
  p._plannedWeeks.push({week:next,phase:'accumulation',targetVol:150,targetInt:70});
  p._plannedWeeks.sort((a,b)=>a.week-b.week);
  saveState(); renderMain();
}

function updatePlannedWeek(i, field, value) {
  const p=prog(); if(!p||!p._plannedWeeks) return;
  p._plannedWeeks[i][field]=value;
  saveState(); initPeakingChart();
}

function removePlannedWeek(i) {
  const p=prog(); if(!p||!p._plannedWeeks) return;
  p._plannedWeeks.splice(i,1);
  saveState(); renderMain();
}

// ── Core PDF builder ──────────────────────────────
function buildPDF(weekNums, inclMobility) {
  const { jsPDF } = window.jspdf;
  const p = prog();
  // Portrait letter — sequential days, two-column exercise rows (name | sets/load)
  const doc = new jsPDF({ orientation: 'portrait', unit: 'pt', format: 'letter' });

  // Portrait: 612×792pt
  const PW = 612, PH = 792;
  const ML = 40, MR = 40, MT = 44, MB = 36;
  const CW = PW - ML - MR; // 532
  const CONTENT_BOTTOM = PH - MB - 22; // bottom of usable area (above footer)

  const GOLD  = [201,168,76];
  const DARK  = [26,26,26];
  const MID   = [110,110,110];
  const BLACK = [20,20,20];
  const LIGHT = [248,248,246];

  const CAT_COLORS_RGB = {
    snatch:[201,168,76], clean:[58,134,212], jerk:[106,174,245], cj:[32,96,184],
    squat:[94,192,138],  bench:[192,96,96],
    accessory:[136,136,136], plyo:[160,127,212],
    core:[212,138,80],   other:[80,80,80],
  };

  const pdfPct = (lo, hi) => {
    if (lo<=0 && (!hi||hi<=0)) return '—';
    if (hi>lo) return `${lo}–${hi}%`;
    return lo>0 ? `${lo}%` : '—';
  };

  const safeName = p.name.replace(/[^a-zA-Z0-9]/g, '_');
  let pageNum = 1;
  let y = MT;

  // Two-column split: exercise name left, sets/load right
  const NAME_W = 210;
  const SETS_X = ML + NAME_W + 10;
  const SETS_W = CW - NAME_W - 10;

  function addPageHeader() {
    doc.setFillColor(...GOLD);
    doc.rect(0, 0, PW, 4, 'F');
  }

  function addFooter() {
    doc.setDrawColor(...GOLD);
    doc.setLineWidth(0.4);
    doc.line(ML, CONTENT_BOTTOM + 4, PW - MR, CONTENT_BOTTOM + 4);
    doc.setFontSize(7); doc.setFont('helvetica','normal'); doc.setTextColor(...MID);
    doc.text(p.name + (p.org ? '  ·  ' + p.org : ''), ML, CONTENT_BOTTOM + 16);
    doc.text(`Page ${pageNum}`, PW - MR, CONTENT_BOTTOM + 16, { align: 'right' });
  }

  function newPage() {
    addFooter();
    doc.addPage();
    pageNum++;
    addPageHeader();
    y = MT;
  }

  // Ensure at least `needed` pts remain before CONTENT_BOTTOM; break page if not.
  function ensureSpace(needed) {
    if (y + needed > CONTENT_BOTTOM) newPage();
  }

  // Draw a horizontal rule separator between exercises
  function drawSep() {
    doc.setDrawColor(220,220,218); doc.setLineWidth(0.2);
    doc.line(ML, y, PW - MR, y);
  }

  addPageHeader();

  // ── Render each week ──────────────────────────────
  weekNums.forEach((wNum, wi) => {
    const wd = getWeek(wNum);
    if (!wd) return;
    if (wi > 0) newPage();

    // Week header bar
    ensureSpace(34);
    doc.setFillColor(...DARK);
    doc.roundedRect(ML, y, CW, 28, 3, 3, 'F');
    doc.setFontSize(14); doc.setFont('helvetica','bold'); doc.setTextColor(242,217,138);
    doc.text(`WEEK ${wNum}`, ML + 12, y + 19);
    const hdrRight = [p.name, p.org, p.season].filter(Boolean).join('  ·  ');
    doc.setFontSize(8); doc.setFont('helvetica','normal'); doc.setTextColor(160,160,160);
    doc.text(hdrRight, PW - MR - 10, y + 19, { align:'right' });
    y += 34;

    // Coach week note
    if (wd.note) {
      const noteLines = doc.splitTextToSize('Note: ' + wd.note, CW - 8);
      noteLines.forEach(line => {
        ensureSpace(13);
        doc.setFontSize(8); doc.setFont('helvetica','italic'); doc.setTextColor(...MID);
        doc.text(line, ML + 4, y + 9);
        y += 13;
      });
      y += 4;
    }

    const days = trainingDays().filter(d => wd.days?.[d]);

    days.forEach(day => {
      const dd = wd.days[day];

      // Day header — keep together with at least one exercise row below it
      ensureSpace(56);
      doc.setFillColor(38, 38, 38);
      doc.roundedRect(ML, y, CW, 24, 2, 2, 'F');
      doc.setFontSize(10); doc.setFont('helvetica','bold'); doc.setTextColor(242,217,138);
      doc.text(day.toUpperCase(), ML + 10, y + 16);
      if (dd?.focus) {
        const focusX = ML + 10 + doc.getTextWidth(day.toUpperCase()) + 8;
        doc.setFontSize(8.5); doc.setFont('helvetica','normal'); doc.setTextColor(170,170,170);
        const focusTxt = doc.splitTextToSize(dd.focus, PW - MR - focusX - 8)[0];
        doc.text(focusTxt, focusX, y + 16);
      }
      y += 28;

      // Column header labels
      doc.setFontSize(7); doc.setFont('helvetica','bold'); doc.setTextColor(...MID);
      doc.text('EXERCISE', ML + 10, y + 8);
      doc.text('SETS / REPS / LOAD', SETS_X, y + 8);
      doc.setDrawColor(...GOLD); doc.setLineWidth(0.4);
      doc.line(ML, y + 12, PW - MR, y + 12);
      y += 15;

      const allEx = [
        ...(dd?.exercises   || []).map(e => ({...e, _sec:'main'})),
        ...(dd?.warmup      || []).map(e => ({...e, _sec:'warmup'})),
        ...(dd?.accessories || []).map(e => ({...e, _sec:'acc'})),
      ];

      if (!allEx.length) {
        ensureSpace(20);
        doc.setFontSize(8.5); doc.setFont('helvetica','italic'); doc.setTextColor(...MID);
        doc.text('Rest day', ML + 10, y + 12);
        y += 20;
      }

      let lastSec = 'main';

      allEx.forEach((ex, idx) => {
        // Section divider when switching sections
        if (ex._sec !== lastSec) {
          lastSec = ex._sec;
          const label  = ex._sec === 'warmup' ? '— WARM-UP —' : '— ACCESSORIES —';
          const lColor = ex._sec === 'warmup' ? [80,140,200] : [80,180,130];
          ensureSpace(18);
          doc.setFontSize(7); doc.setFont('helvetica','bold'); doc.setTextColor(...lColor);
          doc.text(label, PW / 2, y + 10, { align: 'center' });
          doc.setDrawColor(...lColor); doc.setLineWidth(0.3);
          doc.line(ML + 2, y + 13, PW - MR - 2, y + 13);
          y += 17;
        }

        if (ex.isSuperset && ex.supersetExercises?.length) {
          // ── Superset ────────────────────────────────
          const LTRS = ['A','B','C','D'];
          const entryH = 24;
          const totalH = 16 + ex.supersetExercises.length * entryH + (ex.note ? 14 : 0) + 4;
          ensureSpace(totalH);

          if (idx % 2 === 0) { doc.setFillColor(...LIGHT); doc.rect(ML, y, CW, totalH, 'F'); }
          doc.setFontSize(7.5); doc.setFont('helvetica','bold'); doc.setTextColor(100,130,180);
          doc.text(`SUPERSET  ·  ${ex.sets||0} sets`, ML + 10, y + 12);
          let sey = y + 18;
          ex.supersetExercises.forEach((se, si) => {
            const catRGB = CAT_COLORS_RGB[se.category] || [80,80,80];
            doc.setFillColor(...catRGB); doc.circle(ML + 6, sey + 8, 2.5, 'F');
            doc.setFontSize(8); doc.setFont('helvetica','bold'); doc.setTextColor(180,145,40);
            doc.text(LTRS[si]+'.', ML + 11, sey + 10);
            doc.setFont('helvetica','normal'); doc.setTextColor(...BLACK);
            doc.text(doc.splitTextToSize(se.name, NAME_W - 22)[0], ML + 21, sey + 10);
            doc.setFontSize(8.5); doc.setFont('helvetica','normal'); doc.setTextColor(...MID);
            const seLoad = (se.useTime ? `${se.seconds||0}s` : `${se.reps||0} reps`) +
              '  @  ' + (se.useRPE ? `RPE ${se.rpe||8}` : pdfPct(se.intensity||0, se.intensityHigh||0));
            doc.text(seLoad, SETS_X, sey + 10);
            sey += entryH;
          });
          if (ex.note) {
            doc.setFontSize(7.5); doc.setFont('helvetica','italic'); doc.setTextColor(130,130,130);
            doc.text(doc.splitTextToSize(ex.note, CW - 12)[0], ML + 10, sey + 10);
            sey += 14;
          }
          drawSep();
          y += totalH;

        } else if (ex.isComplex && ex.movements?.length) {
          // ── Complex ─────────────────────────────────
          const mvH = 13;
          const totalH = 26 + ex.movements.length * mvH + (ex.note ? 14 : 0);
          ensureSpace(totalH);

          if (idx % 2 === 0) { doc.setFillColor(...LIGHT); doc.rect(ML, y, CW, totalH, 'F'); }
          const catRGB = CAT_COLORS_RGB[ex.category] || [80,80,80];
          doc.setFillColor(...catRGB); doc.circle(ML + 6, y + 12, 2.5, 'F');
          doc.setFontSize(9); doc.setFont('helvetica','bold'); doc.setTextColor(...BLACK);
          doc.text(doc.splitTextToSize(ex.name||'Complex', NAME_W - 14)[0], ML + 12, y + 13);
          doc.setFontSize(8.5); doc.setFont('helvetica','normal'); doc.setTextColor(...MID);
          doc.text(`${ex.sets||0} sets  @  ${ex.intensity||0}%`, SETS_X, y + 13);
          let mvy = y + 24;
          ex.movements.forEach(mv => {
            const mvRGB = CAT_COLORS_RGB[mv.category] || [120,120,120];
            doc.setFillColor(...mvRGB); doc.setDrawColor(...mvRGB); doc.setLineWidth(1.2);
            doc.line(ML + 18, mvy + 2, ML + 18, mvy + 10);
            doc.setFontSize(8); doc.setFont('helvetica','normal'); doc.setTextColor(65,65,65);
            doc.text(`${mv.reps}×  ${doc.splitTextToSize(mv.name, NAME_W - 24)[0]}`, ML + 22, mvy + 9);
            mvy += mvH;
          });
          if (ex.note) {
            doc.setFontSize(7.5); doc.setFont('helvetica','italic'); doc.setTextColor(130,130,130);
            doc.text(doc.splitTextToSize(ex.note, CW - 12)[0], ML + 12, mvy + 10);
            mvy += 14;
          }
          drawSep();
          y += totalH;

        } else if (!ex.isComplex && ex.setGroups?.length > 1) {
          // ── Multiple set groups (wave / ladder) ──────
          const sgH = 14;
          const nameLines = doc.splitTextToSize(ex.name||'', NAME_W - 14);
          const nameBlockH = nameLines.length * 12;
          const totalH = Math.max(26, nameBlockH + 6) + ex.setGroups.length * sgH + (ex.note ? 14 : 0);
          ensureSpace(totalH);

          if (idx % 2 === 0) { doc.setFillColor(...LIGHT); doc.rect(ML, y, CW, totalH, 'F'); }
          const catRGB = CAT_COLORS_RGB[ex.category] || [80,80,80];
          doc.setFillColor(...catRGB); doc.circle(ML + 6, y + 12, 2.5, 'F');
          doc.setFontSize(9); doc.setFont('helvetica','bold'); doc.setTextColor(...BLACK);
          let ny = y + 13;
          nameLines.forEach(line => { doc.text(line, ML + 12, ny); ny += 12; });
          let sgy = y + Math.max(22, nameBlockH + 4);
          ex.setGroups.forEach((sg, si) => {
            const isTop = ex.scheme==='ladder' && si===ex.setGroups.length-1;
            doc.setFontSize(8.5); doc.setFont('helvetica', isTop?'bold':'normal');
            doc.setTextColor(...(isTop ? [100,80,20] : MID));
            const sgTxt = `${sg.sets}×${ex.useTime ? sg.seconds+'s' : sg.reps+' reps'}  @  ${pdfPct(sg.intensity||0, sg.intensityHigh||0)}${isTop ? '  ▲' : ''}`;
            doc.text(sgTxt, SETS_X, sgy + 10);
            sgy += sgH;
          });
          if (ex.note) {
            doc.setFontSize(7.5); doc.setFont('helvetica','italic'); doc.setTextColor(130,130,130);
            doc.text(doc.splitTextToSize(ex.note, CW - 12)[0], ML + 12, sgy + 10);
            sgy += 14;
          }
          drawSep();
          y += totalH;

        } else {
          // ── Standard single exercise ─────────────────
          const sg0 = ex.setGroups?.[0];
          const pctStr = ex.scheme==='heavy_single' ? 'max'
            : ex.useRPE ? `RPE ${sg0?.rpe||8}`
            : pdfPct(sg0?.intensity ?? ex.intensity ?? 0, sg0?.intensityHigh ?? 0);
          const repsStr = ex.scheme==='heavy_single' ? 'max'
            : ex.useTime ? `${sg0?.seconds||ex.seconds||0}s`
            : ex.scheme==='amrap' ? `${ex.reps||0}+`
            : String(ex.reps||0);

          const nameLines = doc.splitTextToSize(ex.name||'', NAME_W - 14);
          const rowH = Math.max(26, nameLines.length * 13 + 8) + (ex.note ? 14 : 0);
          ensureSpace(rowH);

          if (idx % 2 === 0) { doc.setFillColor(...LIGHT); doc.rect(ML, y, CW, rowH, 'F'); }
          const catRGB = CAT_COLORS_RGB[ex.category] || [80,80,80];
          doc.setFillColor(...catRGB); doc.circle(ML + 6, y + 12, 2.5, 'F');

          // Exercise name (bold for main, italic for warmup/accessory)
          const isSub = ex._sec === 'warmup' || ex._sec === 'acc';
          doc.setFontSize(9); doc.setFont('helvetica', isSub ? 'italic' : 'bold');
          doc.setTextColor(...BLACK);
          let ny = y + 13;
          nameLines.forEach(line => { doc.text(line, ML + 12, ny); ny += 13; });

          // Sets / reps / load
          doc.setFontSize(8.5); doc.setFont('helvetica','normal'); doc.setTextColor(...MID);
          doc.text(`${ex.sets||0}×${repsStr}  @  ${pctStr}`, SETS_X, y + 13);

          // Scheme tag (AMRAP / HEAVY SINGLE / LADDER)
          if (ex.scheme && ex.scheme !== 'normal') {
            const tag = ex.scheme==='amrap' ? 'AMRAP' : ex.scheme==='heavy_single' ? 'HEAVY SINGLE' : 'LADDER';
            doc.setFontSize(7); doc.setFont('helvetica','bold');
            doc.setTextColor(...(ex.scheme==='amrap'?[200,60,60]:ex.scheme==='heavy_single'?[180,145,20]:[80,160,80]));
            doc.text(tag, PW - MR - 6, y + 13, { align:'right' });
          }

          if (ex.note) {
            doc.setFontSize(7.5); doc.setFont('helvetica','italic'); doc.setTextColor(130,130,130);
            doc.text(doc.splitTextToSize(ex.note, CW - 12)[0], ML + 12, y + rowH - 5);
          }

          drawSep();
          y += rowH;
        }
      });

      // Mobility block at bottom of day
      if (inclMobility && dd?.mobility) {
        ensureSpace(22);
        doc.setFontSize(7.5); doc.setFont('helvetica','bold'); doc.setTextColor(80,160,200);
        doc.text('MOBILITY', ML + 10, y + 11);
        y += 16;
        const mobLines = doc.splitTextToSize(dd.mobility, CW - 12);
        mobLines.forEach(line => {
          ensureSpace(13);
          doc.setFontSize(8.5); doc.setFont('helvetica','italic'); doc.setTextColor(...MID);
          doc.text(line, ML + 10, y + 10);
          y += 13;
        });
      }

      y += 16; // breathing room between days
    });
  });

  addFooter();

  const filename = weekNums.length === 1
    ? `${safeName}_Week${weekNums[0]}.pdf`
    : `${safeName}_FullProgram.pdf`;
  doc.save(filename);
}

function exportWeekPDF(wNum, inclMobility) {
  buildPDF([wNum], inclMobility);
}

function exportFullProgramPDF(inclMobility) {
  buildPDF(weekNums(), inclMobility);
}

  const teamId = 'team_1';
  localStorage.setItem(STORAGE_KEY, JSON.stringify({
    activeTeamId: teamId,
    teams: { [teamId]: { id: teamId, name: 'Team 1', programs: {}, roster: { athletes: [], customFields: [] }, meets: [] } }
  }));
  location.reload();
}

function deleteProgram(pid) {
  if(!confirm(`Delete "${state.programs[pid].name}"? This cannot be undone.`)) return;
  delete state.programs[pid];
  state.activeProgId=Object.keys(state.programs)[0];
  state.currentWeek=weekNums()[0]||1;

  render();
}
