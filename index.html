function saveToLibraryFromModal() {
  const name=(document.getElementById('m-name')||{}).value?.trim();
  if(!name){alert('Enter an exercise name before saving to library.');return;}
  const category=(document.getElementById('m-cat')||{}).value||'other';
  const note=(document.getElementById('m-note')||{}).value?.trim()||'';
  const groups=_setGroups.map(sg=>({...sg}));
  const totalSets=groups.reduce((s,sg)=>s+sg.sets,0);
  const entry={name,category,note,useTime:_useTime,useRPE:_useRPE,scheme:_scheme,setGroups:groups,
    sets:totalSets,reps:_useTime?0:(groups[0]?.reps||0),seconds:_useTime?(groups[0]?.seconds||0):0,
    intensity:groups[0]?.intensity||0,intensityHigh:groups[0]?.intensityHigh||0,rpe:groups[0]?.rpe||0};
  if(_libraryEditIdx>=0) {
    state.exerciseLibrary[_libraryEditIdx]=entry;
  } else {
    const existing=state.exerciseLibrary.findIndex(e=>e.name.toLowerCase()===name.toLowerCase());
    if(existing>=0){
      if(!confirm(`"${name}" is already in your library. Overwrite it?`)) return;
      state.exerciseLibrary[existing]=entry;
    } else {
      state.exerciseLibrary.push(entry);
    }
  }
  saveState();
  if(_libraryMode){
    closeModal();
    renderMain();
  } else {
    alert(`"${name}" saved to library.`);
  }
}

function removeFromLibrary(idx) {
  if(!confirm('Remove this exercise from your library?')) return;
  state.exerciseLibrary.splice(idx,1);
  saveState();
  renderMain();
}

// ═══════════════════════════════════════════════════
function calcWeight(max, pct) {
  if (!max || max <= 0) return '—';
  const raw = max * pct / 100;
  if (state.weightUnit === 'kg') return Math.round(raw / 2.5) * 2.5; // round to nearest 2.5
  return Math.round(raw / 2.5) * 2.5; // same rounding in lbs
}

  const lifts = [

        <select id="calc-athlete" onchange="loadAthleteIntoCalc()" style="background:var(--dark2);border:1px solid var(--dark3);color:var(--white);border-radius:4px;padding:5px 8px;font-size:13px;">
          <option value="">— Select athlete —</option>
          ${athletes.map(a=>`<option value="${a.id||a.name}">${a.name}${a.wc?' ('+a.wc+' lbs)':''}</option>`).join('')}
        </select>
        <div style="display:flex;background:var(--dark2);border:1px solid var(--dark3);border-radius:4px;overflow:hidden;">
          <button onclick="state.weightUnit='lbs';saveState();renderMain();" style="padding:5px 12px;border:none;cursor:pointer;font-size:12px;font-weight:600;font-family:'Barlow Condensed',sans-serif;background:${unit==='lbs'?'var(--dark3)':'transparent'};color:${unit==='lbs'?'var(--white)':'var(--muted)'};">LBS</button>

        </div>

    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:1rem;">${maxRow}</div>
    <div id="calc-table-wrap" style="overflow-x:auto;">
      <table style="width:100%;border-collapse:collapse;font-size:13px;">
        <thead>
          <tr style="background:var(--dark2);">
            <th style="padding:7px 10px;text-align:center;font-family:'Barlow Condensed',sans-serif;font-size:11px;letter-spacing:1px;color:var(--muted);border-bottom:1px solid var(--dark3);">%</th>
            ${lifts.map(l=>`<th style="padding:7px 10px;text-align:center;font-family:'Barlow Condensed',sans-serif;font-size:11px;letter-spacing:1px;color:var(--muted);border-bottom:1px solid var(--dark3);">${l.label}</th>`).join('')}

        <tbody id="calc-table-body">
          ${pcts.map((p,i)=>`<tr style="background:${i%2===0?'transparent':'var(--dark1)'};">
            <td style="padding:6px 10px;text-align:center;font-weight:600;color:var(--gold);font-family:'Barlow Condensed',sans-serif;font-size:13px;">${p}%</td>
            ${lifts.map(l=>`<td id="ctd-${l.id}-${p}" style="padding:6px 10px;text-align:center;color:var(--muted);">—</td>`).join('')}

}

function loadAthleteIntoCalc() {
  const sel = document.getElementById('calc-athlete'); if (!sel) return;
  const val = sel.value;
  const a = (state.roster.athletes||[]).find(a=>(a.id||a.name)===val);
  if (!a) return;
  const unit = state.weightUnit;
  const conv = unit==='kg' ? (1/2.20462) : 1;  // stored as lbs; convert to kg if needed
  ['snatch','cj','fsq','bsq'].forEach(k => {
    const el = document.getElementById('calc-'+k);
    if (el) { const raw = a[k]||0; el.value = raw ? Math.round(raw*conv) : ''; }
  });
  renderCalcTable();
}

function renderCalcTable() {
  const lifts = ['snatch','cj','fsq','bsq'];
  const maxes = {};
  lifts.forEach(k => { const el=document.getElementById('calc-'+k); maxes[k]=el?parseFloat(el.value)||0:0; });
  const pcts = [];
  for (let p = 50; p <= 105; p += 2.5) pcts.push(p);
  pcts.forEach(p => {
    lifts.forEach(k => {
      const td = document.getElementById(`ctd-${k}-${p}`);
      if (!td) return;
      const w = calcWeight(maxes[k], p);
      if (w === '—') { td.textContent='—'; td.style.color='var(--muted)'; }
      else { td.textContent=w; td.style.color='var(--white)'; }
    });
  });
}

function roundAttempt(weight) {
  if (!weight || weight <= 0) return null;
  return state.weightUnit === 'kg'
    ? Math.round(weight)         // 1kg precision
    : Math.round(weight / 5) * 5; // 5lb precision
}

function openAddMeet() {
  document.getElementById('modal-body').innerHTML=`
    <h3>Add Meet</h3>
    <div class="form-field"><label>Meet name</label><input type="text" id="meet-name" placeholder="e.g. Regional Championships" autofocus></div>
    <div class="fg2">
      <div class="form-field"><label>Date</label><input type="date" id="meet-date"></div>
      <div class="form-field"><label>Location</label><input type="text" id="meet-loc" placeholder="e.g. Tampa, FL"></div>
    </div>
    <div class="modal-actions" style="justify-content:space-between;">
      <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
      <button class="btn btn-gold" onclick="saveAddMeet()">Create Meet</button>
    </div>`;
  document.getElementById('overlay').style.display='flex';
}

function saveAddMeet() {
  const name = document.getElementById('meet-name').value.trim();
  if (!name) { alert('Enter a meet name.'); return; }
  const meet = {id:newMeetId(), name, date:document.getElementById('meet-date').value, location:document.getElementById('meet-loc').value.trim(), entries:[]};
  if (!state.meets) state.meets=[];
  state.meets.push(meet);
  _activeMeetId = meet.id;
  saveState(); closeModal(); renderMain();
}

function openEditMeet(id) {
  const meet = (state.meets||[]).find(m=>m.id===id); if(!meet) return;
  document.getElementById('modal-body').innerHTML=`
    <h3>Edit Meet</h3>
    <div class="form-field"><label>Meet name</label><input type="text" id="meet-name" value="${meet.name}"></div>
    <div class="fg2">
      <div class="form-field"><label>Date</label><input type="date" id="meet-date" value="${meet.date||''}"></div>
      <div class="form-field"><label>Location</label><input type="text" id="meet-loc" value="${meet.location||''}"></div>
    </div>
    <div class="modal-actions" style="justify-content:space-between;">
      <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
      <button class="btn btn-gold" onclick="saveEditMeet('${id}')">Save</button>
    </div>`;
  document.getElementById('overlay').style.display='flex';
}

function saveEditMeet(id) {
  const meet = (state.meets||[]).find(m=>m.id===id); if(!meet) return;
  meet.name = document.getElementById('meet-name').value.trim() || meet.name;
  meet.date = document.getElementById('meet-date').value;
  meet.location = document.getElementById('meet-loc').value.trim();
  saveState(); closeModal(); renderMain();
}

function deleteMeet(id) {
  if (!confirm('Delete this meet? This cannot be undone.')) return;
  state.meets = (state.meets||[]).filter(m=>m.id!==id);
  if (_activeMeetId===id) _activeMeetId=null;
  saveState(); renderMain();
}

function addMeetEntry(meetId) {
  const sel = document.getElementById('add-entry-sel'); if(!sel||!sel.value) return;
  const meet = (state.meets||[]).find(m=>m.id===meetId); if(!meet) return;
  if (!meet.entries) meet.entries=[];
  meet.entries.push({athleteId:sel.value, division:'', snatchAttempts:[null,null,null], cjAttempts:[null,null,null], benchAttempts:[null,null,null], snatchMade:[null,null,null], cjMade:[null,null,null], benchMade:[null,null,null]});
  saveState(); renderMain();
}

function removeMeetEntry(meetId, idx) {
  const meet = (state.meets||[]).find(m=>m.id===meetId); if(!meet) return;
  meet.entries.splice(idx,1);
  saveState();
}

function updateMeetAttempt(meetId, entryIdx, lift, attIdx, field, value) {
  const meet = (state.meets||[]).find(m=>m.id===meetId); if(!meet) return;
  const entry = meet.entries[entryIdx]; if(!entry) return;
  if (lift==='s') {
    if (field==='weight') entry.snatchAttempts[attIdx]=parseFloat(value)||null;
    else entry.snatchMade[attIdx]=value;
  } else if (lift==='c') {
    if (field==='weight') entry.cjAttempts[attIdx]=parseFloat(value)||null;
    else entry.cjMade[attIdx]=value;
  } else {
    if (!entry.benchAttempts) entry.benchAttempts=[null,null,null];
    if (!entry.benchMade)     entry.benchMade=[null,null,null];
    if (field==='weight') entry.benchAttempts[attIdx]=parseFloat(value)||null;
    else entry.benchMade[attIdx]=value;
  }
  // If a made attempt is a new PR, update the athlete's roster max (always stored in lbs)
  if (field==='made' && value===true) {
    const liftMap = {s:['snatchAttempts','snatch'], c:['cjAttempts','cj'], b:['benchAttempts','bench']};
    const [attKey, rosterKey] = liftMap[lift]||[];
    if (attKey) {
      const w = entry[attKey]?.[attIdx];
      if (w) {
        const wLbs = state.weightUnit==='kg' ? Math.round(w*2.20462) : w;
        const ath = (state.roster.athletes||[]).find(a=>(a.id||a.name)===entry.athleteId);
        if (ath && wLbs > (ath[rosterKey]||0)) {
          ath[rosterKey] = wLbs;
        }
      }
    }
  }
  saveState();
}

function updateMeetDivision(meetId, entryIdx, value) {
  const meet = (state.meets||[]).find(m=>m.id===meetId); if(!meet) return;
  const entry = meet.entries[entryIdx]; if(!entry) return;
  entry.division = value;
  saveState();
}

function exportMeetRosterCSV(meetId) {
  const meet = (state.meets||[]).find(m=>m.id===meetId); if(!meet) return;
  const athletes = state.roster.athletes||[];
  const rows = [['Name','Weight Class','Division']];
  (meet.entries||[]).forEach(entry=>{
    const ath = athletes.find(a=>(a.id||a.name)===entry.athleteId)||{name:entry.athleteId,wc:''};
    rows.push([ath.name, ath.wc||'', entry.division||'']);
  });
  const csv = rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob([csv],{type:'text/csv'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href=url; a.download=`${meet.name.replace(/[^a-z0-9]/gi,'_')}_roster.csv`;
  a.click(); URL.revokeObjectURL(url);
}

function loadDefaultLibrary() {
  const defaults=getDefaultLibrary();
  let added=0, skipped=0;
  defaults.forEach(entry=>{
    const exists=state.exerciseLibrary.some(e=>e.name.toLowerCase()===entry.name.toLowerCase());
    if(exists){skipped++;}else{state.exerciseLibrary.push(entry);added++;}
  });
  saveState();
  renderMain();
  if(skipped>0) alert(`Added ${added} exercise${added!==1?'s':''}. Skipped ${skipped} already in your library.`);
}

function buildRosterHTML() {
  const athletes = state.roster.athletes || [];

  const wcs     = [...new Set(athletes.map(a=>a.wc).filter(Boolean))].sort((a,b)=>{

    return parseInt(a)-parseInt(b);
  });
  const teams   = [...new Set(athletes.map(a=>a.team).filter(Boolean))].sort();

  // Apply filters
  let filtered = athletes.filter(a=>{
    if(_rosterFilter.gender && a.gender!==_rosterFilter.gender) return false;

// ── CSV Roster Import ──
function parseCSV(text) {
  const lines = text.replace(/\r\n/g,'\n').replace(/\r/g,'\n').split('\n').filter(l=>l.trim());
  function parseLine(line) {
    const vals=[]; let cur='', inQ=false;
    for(let i=0;i<line.length;i++){
      const ch=line[i];
      if(ch==='"'&&!inQ&&(i===0||line[i-1]===',')){inQ=true;}
      else if(ch==='"'&&inQ&&(i+1===line.length||line[i+1]===',')){inQ=false;}
      else if(ch===','&&!inQ){vals.push(cur.trim());cur='';}
      else{cur+=ch;}
    }
    vals.push(cur.trim());
    return vals;
  }
  const headers=parseLine(lines[0]).map(h=>h.replace(/^"|"$/g,'').trim().toLowerCase());
  const rows=lines.slice(1).map(l=>parseLine(l).map(v=>v.replace(/^"|"$/g,'').trim()));
  return {headers,rows};
}

function detectRosterColumns(headers) {
  const find=(...keys)=>headers.findIndex(h=>keys.some(k=>h===k||h.includes(k)));
  return {
    name:      find('full name','athlete name','athlete','name'),
    firstName: find('first name','firstname','fname','first'),
    lastName:  find('last name','lastname','lname','last'),
    gender:    find('gender','sex','m/f','male/female'),
    wc:        find('weight class','wt class','wt. class','wt.class','wc'),
    team:      find('team','school','org','club','program'),
    gradYear:  find('grad year','graduation year','class year','class of','grad yr','graduation','gradyear','grad'),
    snatch:    find('snatch'),
    cj:        find('clean & jerk','clean and jerk','clean/jerk','clean jerk','c&j','c & j','cj'),
    bench:     find('bench press','bench'),
  };
}

function handleCSVFile(input) {
  const file=input.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=e=>{
    try {
      const {headers,rows}=parseCSV(e.target.result);
      _csvCols=detectRosterColumns(headers);
      _csvData={headers,rows};
      renderCSVPreview(headers,rows,_csvCols);
    } catch(err) {
      document.getElementById('csv-preview').innerHTML=`<div style="color:#E85252;margin-top:1rem;">Error reading file: ${err.message}</div>`;
    }
  };
  reader.readAsText(file);
}

    {key:'bench',label:'Bench',idx:cols.bench},
    {key:'gradYear',label:'Grad Year',idx:cols.gradYear},
  ];
  const detected=fieldMap.filter(f=>f.idx!==-1);
  const mappingRows=fieldMap.map(f=>`<tr>
    <td style="padding:3px 8px;color:var(--muted);font-size:12px;">${f.label}</td>
    <td style="padding:3px 8px;font-size:12px;color:${f.idx!==-1?'var(--white)':'#555'};">${
      f.idx===-2?`"${headers[cols.firstName]}" + "${headers[cols.lastName]}"`:
      f.idx>=0?`"${headers[f.idx]}"`:
      '— not found'
    }</td>
  </tr>`).join('');
  const detectedLabels = detected.map(f=>f.key==='name'?'Name':f.label);
  const sampleRows=valid.slice(0,5).map(r=>{
    const name=cols.firstName>=0&&cols.lastName>=0?(r[cols.firstName]||'')+' '+(r[cols.lastName]||''):cols.name>=0?r[cols.name]||'':'?';
    const cells=[name.trim()];
    detected.filter(f=>f.key!=='name').forEach(f=>{ cells.push(f.idx>=0?r[f.idx]||'':''); });
    return `<tr>${cells.map(p=>`<td style="padding:3px 8px;font-size:11px;color:var(--light);">${p}</td>`).join('')}</tr>`;
  }).join('');
  preview.innerHTML=`
    <div style="margin-top:1rem;">
      <div style="font-size:12px;font-weight:600;color:var(--gold);margin-bottom:6px;">Detected ${valid.length} athlete${valid.length!==1?'s':''} — column mapping:</div>
      <table style="width:100%;border-collapse:collapse;margin-bottom:1rem;"><tbody>${mappingRows}</tbody></table>
      <div style="font-size:12px;font-weight:600;color:var(--muted);margin-bottom:4px;">Preview (first ${Math.min(5,valid.length)}):</div>
      <table style="width:100%;border-collapse:collapse;"><thead><tr>${detectedLabels.map(h=>`<th style="padding:3px 8px;font-size:10px;color:var(--muted);text-align:left;">${h}</th>`).join('')}</tr></thead><tbody>${sampleRows}</tbody></table>
    </div>`;
  actions.innerHTML=`
    <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
    <button class="btn btn-gold" onclick="confirmImportRoster()">Import ${valid.length} athlete${valid.length!==1?'s':''}</button>`;
}

function confirmImportRoster() {
  if(!_csvData||!_csvCols) return;
  const {rows}=_csvData; const cols=_csvCols;
  let added=0, skipped=0;
  rows.forEach(r=>{
    if(!r.length||!r.some(c=>c)) return;
    const name=(cols.firstName>=0&&cols.lastName>=0)
      ?((r[cols.firstName]||'')+' '+(r[cols.lastName]||'')).trim()
      :(cols.name>=0?r[cols.name]?.trim():'');
    if(!name){skipped++;return;}
    const a={
      name,
      gender: cols.gender>=0?(r[cols.gender]?.trim()||''):'',
      wc:     cols.wc>=0?(r[cols.wc]?.trim()||''):'',
      team:   cols.team>=0?(r[cols.team]?.trim()||''):'',
      gradYear: cols.gradYear>=0?(parseInt(r[cols.gradYear])||0):0,
      snatch: cols.snatch>=0?(parseInt(r[cols.snatch])||0):0,
      cj:     cols.cj>=0?(parseInt(r[cols.cj])||0):0,
      bench:  cols.bench>=0?(parseInt(r[cols.bench])||0):0,
    };
    if(!state.roster.athletes) state.roster.athletes=[];
    const existing = state.roster.athletes.find(ex=>ex.name.toLowerCase()===a.name.toLowerCase());
    if (existing) {
      // Update existing athlete with any non-zero imported values
      Object.keys(a).forEach(k=>{ if(k!=='name' && a[k]) existing[k]=a[k]; });
      skipped++;
    } else {
      state.roster.athletes.push(a); added++;
    }
  });
  closeModal(); saveState(); renderMain();
  if(skipped>0) alert(`Added ${added} new athlete${added!==1?'s':''}. Updated ${skipped} existing athlete${skipped!==1?'s':''}`);
}

function rosterToggleAll(checked) {

    state.meets.push(newMeet);
  }
  const meet = state.meets.find(m=>m.id===meetId); if(!meet) return;
  if(!meet.entries) meet.entries=[];
  const existing = new Set(meet.entries.map(e=>e.athleteId));
  _rosterSel.forEach(key=>{

      meet.entries.push({athleteId:key, division:'', snatchAttempts:[null,null,null], cjAttempts:[null,null,null], benchAttempts:[null,null,null], snatchMade:[null,null,null], cjMade:[null,null,null], benchMade:[null,null,null]});

  });
  _rosterSel.clear();

  state.activeTab='meets'; renderMain();
}

function exportRosterPDF() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation:'landscape', unit:'pt', format:'letter' });
  const PW=792, PH=612, ML=36, MR=36, MT=36;
  const CW=PW-ML-MR;
  const GOLD=[201,168,76], DARK=[26,26,26], MID=[120,120,120], BLACK=[17,17,17], LGRAY=[240,240,238];
  const athletes=state.roster.athletes||[];
  const fields=rosterFields();

  doc.setFillColor(...GOLD); doc.rect(0,0,PW,5,'F');
  doc.setFontSize(18); doc.setFont('helvetica','bold'); doc.setTextColor(...BLACK);
  doc.text('Athlete Roster', ML, 30);
  doc.setFontSize(10); doc.setFont('helvetica','normal'); doc.setTextColor(...MID);
  doc.text(`Generated ${new Date().toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'})}  ·  ${athletes.length} athletes`, ML, 44);
  doc.setDrawColor(...GOLD); doc.setLineWidth(1); doc.line(ML,50,PW-MR,50);

  let y=62;
  const cols=['Name','Gender','WT Class','Grad','Team','Snatch','C&J','Bench',
    ...fields.filter(f=>!['snatch','cj','bench'].includes(f.id)).map(f=>f.label),
    'Olympic Total','Traditional Total'];
  const colW=CW/cols.length;

  // Header
  doc.setFillColor(...DARK); doc.rect(ML,y,CW,16,'F');
  doc.setFontSize(7); doc.setFont('helvetica','bold'); doc.setTextColor(...GOLD);
  cols.forEach((c,i)=>doc.text(c.toUpperCase(),ML+i*colW+colW/2,y+11,{align:'center'}));
  y+=16;

  // Rows
  athletes.forEach((a,ri)=>{
    if(y>PH-50){ doc.addPage(); y=MT; }
    if(ri%2===0){doc.setFillColor(245,245,243);doc.rect(ML,y,CW,14,'F');}
    doc.setFontSize(8); doc.setFont('helvetica','normal'); doc.setTextColor(...BLACK);
    const ot=athleteOlympicTotal(a), tt=athleteTraditionalTotal(a);
    const vals=[a.name,a.gender||'',a.wc||'',a.gradYear||'',a.team||'',
      a.snatch||0,a.cj||0,a.bench||0,
      ...fields.filter(f=>!['snatch','cj','bench'].includes(f.id)).map(f=>a[f.id]||0),
      ot||'—',tt||'—'];
    vals.forEach((v,i)=>doc.text(String(v),ML+i*colW+colW/2,y+10,{align:'center'}));
    y+=14;
  });
  doc.save('Athlete_Roster.pdf');
}

        <option value="accumulation">Accumulation — 65–75%</option>

function saveNewTemplate() {

function saveProgramAsTemplate() {
  const name = document.getElementById('tpl-save-name').value.trim() || 'Program Template';
  const mode = document.querySelector('input[name="tpl-save-mode"]:checked')?.value || 'structure';
  const p = prog(); if (!p) return;
  const ws = weekNums();

  let weeks;
  if (mode === 'full') {
    // Deep copy all week data including exercises
    weeks = ws.map(w => ({
      weekNum: w,
      phase: p.weeks[w]?.phase || 'accumulation',
      note: p.weeks[w]?.note || '',
      days: JSON.parse(JSON.stringify(p.weeks[w]?.days || {}))
    }));
  } else {
    // Structure only — phases + empty day shells
    weeks = ws.map(w => ({
      weekNum: w,
      phase: p.weeks[w]?.phase || 'accumulation',
      note: '',
      days: {}
    }));
  }

  if (!state.templates) state.templates = [];
  state.templates.push({
    name,
    mode,
    trainingDays: [...p.trainingDays],
    weeks,
    created: Date.now()
  });
  closeModal();
  saveState();
  switchTab('templates');
  renderMain();
}

function applyTemplate(idx) {
  const tpl=state.templates[idx]; if(!tpl) return;
  const p=prog(); if(!p) return;
  const existingWks=weekNums();
  const modeLabel = tpl.mode==='full' ? 'including all exercises' : 'week structure only (no exercises)';
  if(!confirm(`Apply "${tpl.name}" to "${p.name}"?\n\nThis will add ${tpl.weeks.length} new week${tpl.weeks.length!==1?'s':''} (${modeLabel}) after any existing weeks. Existing weeks will not be changed.`)) return;
  const startWk=existingWks.length?Math.max(...existingWks)+1:1;
  if(tpl.trainingDays) p.trainingDays=tpl.trainingDays;
  tpl.weeks.forEach((tw,i)=>{
    const wNum=startWk+i;
    let days={};
    if(tpl.mode==='full' && tw.days && Object.keys(tw.days).length) {
      // Deep copy exercises from template
      days = JSON.parse(JSON.stringify(tw.days));
    } else {
      (tpl.trainingDays||p.trainingDays).forEach(d=>{
        days[d]={focus:'',mobility:'',dayNote:'',exercises:[],warmup:[]};
      });
    }
    p.weeks[wNum]={note:tw.note||'',phase:tw.phase,days};
  });
  state.currentWeek=startWk;
  state.activeTab='program';
  saveState(); render();
}

function deleteTemplate(idx) {
  if(!confirm('Delete this template?')) return;
  state.templates.splice(idx,1);
  saveState(); renderMain();
}

function exportTemplate(idx) {
  const tpl=state.templates[idx]; if(!tpl) return;
  const json=JSON.stringify({liftbuilder_template:true,...tpl},null,2);
  const blob=new Blob([json],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download=`${tpl.name.replace(/[^a-zA-Z0-9]/g,'_')}_template.json`; a.click();
  URL.revokeObjectURL(url);
}

function importTemplate() {

// ═══════════════════════════════════════════════════
//  PERSISTENCE  (localStorage)
// ═══════════════════════════════════════════════════
const STORAGE_KEY = 'liftbuilder_v1';

// ── Undo ──────────────────────────────────────────
let _undoSnapshot = null;

function saveState() {
  // Capture undo snapshot from what's currently persisted before overwriting
  try { const cur = localStorage.getItem(STORAGE_KEY); if(cur) _undoSnapshot = cur; } catch(e) {}
  try {
    const payload = {
      activeProgId: state.activeProgId,
      programs: state.programs,
      roster: state.roster,
      templates: state.templates,
      exerciseLibrary: state.exerciseLibrary,
      meets: state.meets,
      weightUnit: state.weightUnit,
    };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(payload));
    showSaveBadge();
    _renderUndoBtn();
  } catch(e) {
    console.warn('LiftBuilder: could not save to localStorage', e);
    alert('⚠️ Could not save your data. Your storage may be full. Use ⬇ Export JSON to back up your data.');
  }
}

function _renderUndoBtn() {
  const el = document.getElementById('undo-btn');
  if (el) { el.style.opacity = _undoSnapshot ? '1' : '0.3'; el.style.pointerEvents = _undoSnapshot ? 'auto' : 'none'; }
}

function undo() {
  if (!_undoSnapshot) return;
  try {
    const snap = _undoSnapshot;
    _undoSnapshot = null;
    localStorage.setItem(STORAGE_KEY, snap);
    loadState();
    render();
    _renderUndoBtn();
  } catch(e) { console.warn('undo failed', e); }
}

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return false;
    const payload = JSON.parse(raw);
    if (payload && typeof payload.programs !== 'undefined') {
      state.programs = payload.programs || {};
      if (payload.activeProgId && state.programs[payload.activeProgId]) {
        state.activeProgId = payload.activeProgId;
      } else {
        state.activeProgId = Object.keys(state.programs)[0] || null;
      }
      if (state.activeProgId) {
        const ws = Object.keys(state.programs[state.activeProgId]?.weeks || {}).map(Number).sort((a,b)=>a-b);
        state.currentWeek = ws[0] || 1;
      }
      if (payload.roster) state.roster = payload.roster;
      if (payload.templates) state.templates = payload.templates;
      if (payload.exerciseLibrary) state.exerciseLibrary = payload.exerciseLibrary;
      if (payload.meets) state.meets = payload.meets;
      if (payload.weightUnit) state.weightUnit = payload.weightUnit;
      return true;
    }
  } catch(e) {
    console.warn('LiftBuilder: could not load saved state', e);
  }
  return false;
}

// ── JSON Export / Import ───────────────────────────
function exportDataJSON() {
  const payload = {
    _liftbuilder: true,
    version: '2.1.0',
    exported: new Date().toISOString(),
    programs: state.programs,
    roster: state.roster,
    templates: state.templates,
    exerciseLibrary: state.exerciseLibrary,
    meets: state.meets,
  };
  const blob = new Blob([JSON.stringify(payload, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `liftbuilder_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function importDataJSON() {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = '.json';
  input.onchange = e => {
    const file = e.target.files[0]; if(!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const data = JSON.parse(ev.target.result);
        if (!data._liftbuilder && !data.programs) { alert('Not a valid LiftBuilder backup file.'); return; }
        const progCount = Object.keys(data.programs||{}).length;
        const dateStr = data.exported ? new Date(data.exported).toLocaleDateString() : 'unknown date';
        if (!confirm(`Import backup from ${dateStr}?\n${progCount} program(s), ${(data.roster?.athletes||[]).length} athletes.\n\nThis will REPLACE all current data.`)) return;
        state.programs = data.programs || {};
        state.roster = data.roster || {athletes:[],customFields:[]};
        state.templates = data.templates || [];
        state.exerciseLibrary = data.exerciseLibrary || [];
        state.meets = data.meets || [];
        state.activeProgId = Object.keys(state.programs)[0] || null;
        state.currentWeek = 1;
        state.activeTab = 'program';
        saveState();
        render();
      } catch(e) { alert('Could not read backup file. Make sure it is a valid LiftBuilder export.'); }
    };
    reader.readAsText(file);
  };
  input.click();
}

let _saveBadgeTimer = null;
function showSaveBadge() {
  const el = document.getElementById('save-badge');
  if (!el) return;
  el.style.opacity = '1';
  clearTimeout(_saveBadgeTimer);
  _saveBadgeTimer = setTimeout(() => { el.style.opacity = '0'; }, 2000);
}

// Patch every state-mutating function to auto-save
function withSave(fn) {
  return function(...args) {
    const result = fn.apply(this, args);
    saveState();
    return result;
  };
}

// ═══════════════════════════════════════════════════
function openDuplicateWeek() {

    <div class="fg2">
      <div class="form-field"><label>Copy to week #</label><input type="number" id="dup-wk" value="${next}" min="1" max="52"></div>
      <div class="form-field"><label>Training phase</label>
        <select id="dup-phase">
          <option value="accumulation" ${curPhase==='accumulation'?'selected':''}>Accumulation — 65–75%</option>
          <option value="intensification" ${curPhase==='intensification'?'selected':''}>Intensification — 75–85%</option>
          <option value="realization" ${curPhase==='realization'?'selected':''}>Realization — 85–95%</option>
          <option value="deload" ${curPhase==='deload'?'selected':''}>Deload — recovery</option>
        </select>
      </div>
    </div>
    <div class="form-field"><label>Coach note for new week (optional)</label><input type="text" id="dup-note" placeholder="Leave blank to copy existing note"></div>
    <div style="background:var(--dark2);border:1px solid var(--dark3);border-radius:4px;padding:10px 12px;margin-bottom:.75rem;">
      <div style="font-size:11px;color:var(--muted);font-family:'Barlow Condensed',sans-serif;font-weight:600;letter-spacing:.5px;text-transform:uppercase;margin-bottom:8px;">Auto-Progression (applied to all exercises)</div>
      <div class="fg2" style="gap:8px;">
        <div class="form-field" style="margin:0;">
          <label>Intensity adjustment</label>
          <div style="display:flex;align-items:center;gap:6px;">
            <input type="number" id="dup-int-adj" value="0" step="0.5" style="width:80px;text-align:center;background:var(--black);border:1px solid var(--dark3);border-radius:3px;padding:5px 6px;color:var(--white);font-size:14px;">
            <span style="font-size:12px;color:var(--muted);">% (e.g. +2.5)</span>
          </div>
        </div>
        <div class="form-field" style="margin:0;">
          <label>Sets adjustment</label>
          <select id="dup-sets-adj" style="background:var(--black);border:1px solid var(--dark3);border-radius:3px;padding:5px 6px;color:var(--white);font-size:13px;width:100%;">
            <option value="0">No change</option>
            <option value="1">+1 set each group</option>
            <option value="-1">−1 set each group</option>
          </select>
        </div>
      </div>
      <div style="font-size:11px;color:var(--muted);margin-top:6px;">Intensity 0 (BW) and RPE exercises are skipped. Sets floor at 1.</div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
      <button class="btn btn-gold" onclick="saveDuplicateWeek()">Duplicate</button>
    </div>`;
  document.getElementById('overlay').style.display = 'flex';
}

function saveDuplicateWeek() {
  const srcWd = getWeek(state.currentWeek);
  if (!srcWd) return;
  const destW = parseInt(document.getElementById('dup-wk').value);
  if (!destW) return;
  if (prog().weeks[destW]) {
    if (!confirm(`Week ${destW} already exists. Overwrite it?`)) return;
  }
  const phase = document.getElementById('dup-phase').value;
  const noteInput = document.getElementById('dup-note').value.trim();
  const note = noteInput || srcWd.note || '';
  const intAdj = parseFloat(document.getElementById('dup-int-adj').value) || 0;
  const setsAdj = parseInt(document.getElementById('dup-sets-adj').value) || 0;
  // Deep copy the source week's days
  const daysCopy = JSON.parse(JSON.stringify(srcWd.days));
  // Apply progression rules
  if (intAdj !== 0 || setsAdj !== 0) {
    Object.values(daysCopy).forEach(d => {
      (d.exercises||[]).forEach(ex => {
        if (ex.setGroups && !ex.isComplex && !ex.isSuperset && !ex.useRPE) {
          ex.setGroups = ex.setGroups.map(sg => {
            const newSets = setsAdj !== 0 ? Math.max(1, (sg.sets||1) + setsAdj) : sg.sets;
            const newInt = (intAdj !== 0 && (sg.intensity||0) > 0)
              ? Math.round(Math.min(115, Math.max(0, (sg.intensity||0) + intAdj)) * 10) / 10 : sg.intensity;
            const newHi = (intAdj !== 0 && (sg.intensityHigh||0) > 0)
              ? Math.round(Math.min(115, (sg.intensityHigh + intAdj)) * 10) / 10 : sg.intensityHigh;
            return {...sg, sets:newSets, intensity:newInt, intensityHigh:newHi||0};
          });
          const totalSets = ex.setGroups.reduce((s,sg)=>s+sg.sets,0);
          const wInt = ex.setGroups.reduce((s,sg)=>{const lo=sg.intensity||0;const hi=sg.intensityHigh||lo;return s+((lo+hi)/2)*sg.sets;},0);
          ex.intensity = totalSets>0 ? Math.round(wInt/totalSets) : 0;
          ex.sets = totalSets;
          ex.volume = ex.useTime ? 0 : ex.setGroups.reduce((s,sg)=>s+sg.sets*(sg.reps||0),0);
        }
      });
    });
  }
  prog().weeks[destW] = { note, phase, days: daysCopy };
  state.currentWeek = destW;
  closeModal();
  saveState();
  render();
}

// ── Init ──
function initApp() {
  loadState();
  render();
  document.addEventListener('keydown', e => { if((e.ctrlKey||e.metaKey) && e.key==='z' && !e.shiftKey){ e.preventDefault(); undo(); } });
  // Auto-save on any state change — patch key mutating functions
  const _origSaveNewWeek = saveNewWeek;
  saveNewWeek = function() { _origSaveNewWeek(); saveState(); };
  const _origSaveExercise = saveExercise;
  saveExercise = function() { _origSaveExercise(); saveState(); };
  const _origSaveEditExercise = saveEditExercise;
  saveEditExercise = function(...a) { _origSaveEditExercise(...a); saveState(); };
  const _origDeleteExercise = deleteExercise;
  deleteExercise = function(...a) { _origDeleteExercise(...a); saveState(); };
  const _origSaveEditDay = saveEditDay;
  saveEditDay = function(...a) { _origSaveEditDay(...a); saveState(); };
  const _origSaveManageDays = saveManageDays;
  saveManageDays = function() { _origSaveManageDays(); saveState(); };
  const _origSaveNewProgram = saveNewProgram;
  saveNewProgram = function() { _origSaveNewProgram(); saveState(); };
  const _origSaveEditProgram = saveEditProgram;
  saveEditProgram = function(...a) { _origSaveEditProgram(...a); saveState(); };
  const _origDeleteProgram = deleteProgram;
  deleteProgram = function(...a) { _origDeleteProgram(...a); saveState(); };
}

initApp();

// ═══════════════════════════════════════════════════
//  AUTO-UPDATE  (desktop only — window.liftbuilderApp
//  is injected by preload.js when running in Electron)
// ═══════════════════════════════════════════════════
(function setupUpdater() {
  const api = window.liftbuilderApp;
  if (!api) return; // running in a browser, skip

  // Show version in header
  api.getVersion().then(v => {
    const el = document.getElementById('app-version');
    if (el) el.textContent = `v${v}`;
  });

  const btn = document.getElementById('update-btn');
  if (btn) { btn.style.display = ''; btn.textContent = 'Check for Updates'; }

  function showToast(msg, actionLabel) {
    document.getElementById('update-toast-msg').textContent = msg;
    document.getElementById('update-toast-action').textContent = actionLabel;
    document.getElementById('update-toast').style.display = '';
  }

  window.updateAction = function() {
    api.openReleasesPage();
    document.getElementById('update-toast').style.display = 'none';
  };

  window.checkForUpdates = function() {
    if (btn) btn.textContent = 'Checking…';
    api.checkForUpdates().catch(() => {
      if (btn) btn.textContent = 'Check for Updates';
    });
  };

  api.onUpdateAvailable((version) => {
    if (btn) { btn.textContent = 'Update Available'; btn.style.background = 'var(--gold-a20)'; }
    showToast(`LiftBuilder v${version} is available. Download and reinstall to update.`, 'Download Now');
  });

  api.onUpdateNotAvail(() => {
    if (btn) btn.textContent = 'Up to Date';
    setTimeout(() => { if (btn) btn.textContent = 'Check for Updates'; }, 3000);
  });
})();
