function importTemplate() {
  const file=document.getElementById('tpl-file')?.files[0];
  if(!file){alert('Please select a file.');return;}
  if(file.size > 5 * 1024 * 1024){alert('File too large (max 5 MB).');return;}
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const data=JSON.parse(e.target.result);
      validateNoProtoPollution(data);
      if(!data.liftbuilder_template||!data.weeks){alert('Invalid template file.');return;}
      if(!state.templates) state.templates=[];
      state.templates.push({name:data.name||'Imported Template',trainingDays:data.trainingDays||[],weeks:data.weeks,created:Date.now()});
      closeModal(); saveState(); renderMain();
    }catch(err){alert('Could not parse template file.');}
  };
  reader.readAsText(file);
}

// ═══════════════════════════════════════════════════
//  PERSISTENCE  (localStorage)
// ═══════════════════════════════════════════════════
const STORAGE_KEY = 'liftbuilder_v1';

// ── Undo ──────────────────────────────────────────
let _undoSnapshot = null;

function saveState() {
  // Capture undo snapshot from what's currently persisted before overwriting
  try { const cur = localStorage.getItem(STORAGE_KEY); if(cur) _undoSnapshot = cur; } catch(e) {}
  try {
    const payload = {
      schemaVersion: 1,
      activeTeamId: _stateCore.activeTeamId,
      teams: _stateCore.teams,
      activeProgId: state.activeProgId,
      templates: state.templates,
      exerciseLibrary: state.exerciseLibrary,
      weightUnit: state.weightUnit,
    };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(payload));
    showSaveBadge();
    _renderUndoBtn();
  } catch(e) {
    console.warn('LiftBuilder: could not save to localStorage', e);
    if (e instanceof DOMException && (e.name === 'QuotaExceededError' || e.name === 'NS_ERROR_DOM_QUOTA_REACHED')) {
      if (confirm('⚠️ Storage is full — your data was NOT saved.\n\nExport your data now before it is lost?')) {
        exportDataJSON();
      }
    } else {
      alert('⚠️ Could not save your data. Use ⬇ Export JSON to back up your data.');
    }
  }
}

function _renderUndoBtn() {
  const el = document.getElementById('undo-btn');
  if (el) { el.style.opacity = _undoSnapshot ? '1' : '0.3'; el.style.pointerEvents = _undoSnapshot ? 'auto' : 'none'; }
}

function undo() {
  if (!_undoSnapshot) return;
  try {
    const snap = _undoSnapshot;
    _undoSnapshot = null;
    localStorage.setItem(STORAGE_KEY, snap);
    loadState();
    render();
    _renderUndoBtn();
  } catch(e) { console.warn('undo failed', e); }
}

function _migrateAccessories(programs) {
  const ACC_CATS = new Set(['accessory','core','plyo','other']);
  Object.values(programs||{}).forEach(prog => {
    Object.values(prog.weeks||{}).forEach(week => {
      Object.values(week.days||{}).forEach(day => {
        if (!day.accessories) day.accessories = [];
        const toMove = [];
        day.exercises = (day.exercises||[]).filter(ex => {
          if (ACC_CATS.has(ex.category)) { toMove.push(ex); return false; }
          return true;
        });
        day.accessories = [...day.accessories, ...toMove];
      });
    });
  });
}

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return false;
    let payload;
    try {
      payload = JSON.parse(raw);
    } catch(parseErr) {
      console.warn('LiftBuilder: corrupt localStorage', parseErr);
      if (confirm('⚠️ Saved data appears corrupt and cannot be loaded.\n\nClear corrupted data and start fresh?')) {
        localStorage.removeItem(STORAGE_KEY);
        location.reload();
      }
      return false;
    }
    if (!payload) return false;

    if (payload.teams) {
      // ── New multi-team format ──
      _stateCore.teams = payload.teams || {};
      _stateCore.activeTeamId = payload.activeTeamId || Object.keys(_stateCore.teams)[0] || null;
      if (payload.activeProgId) state.activeProgId = payload.activeProgId;
      if (payload.templates) state.templates = payload.templates;
      if (payload.exerciseLibrary) state.exerciseLibrary = payload.exerciseLibrary;
      if (payload.weightUnit) state.weightUnit = payload.weightUnit;
      // Ensure active team exists and is initialized
      if (!_stateCore.activeTeamId || !_stateCore.teams[_stateCore.activeTeamId]) {
        _stateCore.activeTeamId = Object.keys(_stateCore.teams)[0] || null;
      }
      Object.values(_stateCore.teams).forEach(t => {
        _ensureTeamInit(t);
        _migrateAccessories(t.programs);
      });
      // Validate active prog
      if (state.activeProgId && !state.programs[state.activeProgId]) {
        state.activeProgId = Object.keys(state.programs)[0] || null;
      }
    } else if (typeof payload.programs !== 'undefined') {
      // ── Old single-team format — migrate to Team 1 ──
      const teamId = 'team_1';
      _stateCore.teams = {
        [teamId]: {
          id: teamId, name: 'Team 1',
          programs: payload.programs || {},
          roster: payload.roster || { athletes: [], customFields: [] },
          meets: payload.meets || []
        }
      };
      _stateCore.activeTeamId = teamId;
      _ensureTeamInit(_stateCore.teams[teamId]);
      _migrateAccessories(_stateCore.teams[teamId].programs);
      if (payload.activeProgId && state.programs[payload.activeProgId]) {
        state.activeProgId = payload.activeProgId;
      } else {
        state.activeProgId = Object.keys(state.programs)[0] || null;
      }
      if (payload.templates) state.templates = payload.templates;
      if (payload.exerciseLibrary) state.exerciseLibrary = payload.exerciseLibrary;
      if (payload.weightUnit) state.weightUnit = payload.weightUnit;
    } else {
      return false;
    }

    if (state.activeProgId && state.programs[state.activeProgId]) {
      const ws = Object.keys(state.programs[state.activeProgId].weeks || {}).map(Number).sort((a,b)=>a-b);
      state.currentWeek = ws[0] || 1;
    }
    return true;
  } catch(e) {
    console.warn('LiftBuilder: could not load saved state', e);
  }
  return false;
}

function shareProgram(progId) {

    _liftbuilder: true,
    _type: 'shared_program',
    version: '2.6.0',
    exported: new Date().toISOString(),
    programs: { [progId]: p },
  };
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `${p.name.replace(/[^a-zA-Z0-9]/g, '_')}_liftbuilder.json`;
  a.click();

}

function importSharedProgram() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json';
  input.onchange = e => {
    const file = e.target.files[0];
    if (!file) return;
    if (file.size > 5 * 1024 * 1024) { alert('File too large (max 5 MB).'); return; }
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const data = JSON.parse(ev.target.result);
        validateNoProtoPollution(data);
        const programsMap = data.programs || (data._teamExport && data.team && data.team.programs);
        if (!data._liftbuilder || !programsMap) {
          alert('Not a valid LiftBuilder program file.'); return;
        }
        const incoming = Object.values(programsMap);
        if (!incoming.length) { alert('No programs found in this file.'); return; }
        if (incoming.length === 1) {
          _doImportPrograms(incoming);
        } else {
          _showProgramSelectModal(incoming);
        }
      } catch (err) {
        alert('Could not read the file. Make sure it is a valid LiftBuilder program export.');
      }
    };
    reader.readAsText(file);
  };
  input.click();
}

function _confirmImportSelected(programs) {
  const checked = [...document.querySelectorAll('#prog-select-list input[type=checkbox]:checked')].map(cb => parseInt(cb.value));

function _doImportPrograms(programs) {
  let lastId = null;
  programs.forEach(p => {
    let id = p.id || ('prog_' + Date.now());
    if (state.programs[id]) id = 'prog_' + Date.now() + '_' + Math.floor(Math.random() * 1000);
    p.id = id;
    state.programs[id] = p;
    lastId = id;
  });
  state.activeProgId = lastId;
  const ws = Object.keys(state.programs[lastId]?.weeks || {}).map(Number).sort((a,b)=>a-b);
  state.currentWeek = ws[0] || 1;
  state.activeTab = 'program';
  saveState();
  render();
  showToast(`Imported: ${programs.map(p => p.name).join(', ')}`);
}

function exportTeamJSON() {
  const t = team(); if (!t) return;

    _liftbuilder: true,

function importDataJSON() {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = '.json';
  input.onchange = e => {
    const file = e.target.files[0]; if(!file) return;
    if (file.size > 5 * 1024 * 1024) { alert('File too large (max 5 MB).'); return; }
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const data = JSON.parse(ev.target.result);
        validateNoProtoPollution(data);
        if (!data._liftbuilder && !data.programs && !data.teams && !data.team) { alert('Not a valid LiftBuilder backup file.'); return; }
        const dateStr = data.exported ? new Date(data.exported).toLocaleDateString() : 'unknown date';
        if (data._teamExport && data.team) {
          // Single-team export — import as a new team (merge, don't replace)
          const tData = data.team;
          if (!confirm(`Import team "${tData.name||'Unnamed'}" from ${dateStr}?\nThis will add it as a new team without removing existing data.`)) return;
          const newId = 'team_' + Date.now();
          tData.id = newId;
          _stateCore.teams[newId] = tData;
          _ensureTeamInit(tData);
          _migrateAccessories(tData.programs);
          _stateCore.activeTeamId = newId;
          state.activeProgId = Object.keys(state.programs)[0] || null;
        } else if (data.teams) {
          // New multi-team format
          const teamCount = Object.keys(data.teams).length;
          if (!confirm(`Import backup from ${dateStr}?\n${teamCount} team(s).\n\nThis will REPLACE all current data.`)) return;
          _stateCore.teams = data.teams;
          _stateCore.activeTeamId = data.activeTeamId || Object.keys(data.teams)[0];
          Object.values(_stateCore.teams).forEach(t => { _ensureTeamInit(t); _migrateAccessories(t.programs); });
          state.activeProgId = data.activeProgId || Object.keys(state.programs)[0] || null;
        } else {
          // Old flat format — migrate to Team 1
          const progCount = Object.keys(data.programs||{}).length;
          if (!confirm(`Import backup from ${dateStr}?\n${progCount} program(s), ${(data.roster?.athletes||[]).length} athletes.\n\nThis will REPLACE all current data.`)) return;
          const teamId = 'team_1';
          _stateCore.teams = { [teamId]: { id: teamId, name: 'Team 1', programs: data.programs||{}, roster: data.roster||{athletes:[],customFields:[]}, meets: data.meets||[] } };
          _stateCore.activeTeamId = teamId;
          _ensureTeamInit(_stateCore.teams[teamId]);
          _migrateAccessories(_stateCore.teams[teamId].programs);
          state.activeProgId = Object.keys(state.programs)[0] || null;
        }
        if (!data._teamExport) {
          state.templates     = data.templates     || [];
          state.exerciseLibrary = data.exerciseLibrary || [];
          if (data.weightUnit) state.weightUnit = data.weightUnit;
        }
        state.currentWeek = 1;
        state.activeTab = 'program';
        saveState();
        render();
      } catch(err) { console.warn('importDataJSON:', err); alert('Could not read backup file. Make sure it is a valid LiftBuilder export.'); }
    };
    reader.readAsText(file);
  };
  input.click();
}

}

function saveDuplicateWeek() {
  const srcWd = getWeek(state.currentWeek);
  if (!srcWd) return;
  const destW = parseInt(document.getElementById('dup-wk').value);
  if (!destW) return;
  if (prog().weeks[destW]) {
    if (!confirm(`Week ${destW} already exists. Overwrite it?`)) return;
  }
  const phase = document.getElementById('dup-phase').value;
  const noteInput = document.getElementById('dup-note').value.trim();
  const note = noteInput || srcWd.note || '';
  const intAdj = parseFloat(document.getElementById('dup-int-adj').value) || 0;
  const setsAdj = parseInt(document.getElementById('dup-sets-adj').value) || 0;
  // Deep copy the source week's days
  const daysCopy = JSON.parse(JSON.stringify(srcWd.days));
  // Apply progression rules
  if (intAdj !== 0 || setsAdj !== 0) {
    Object.values(daysCopy).forEach(d => {
      (d.exercises||[]).forEach(ex => {
        if (ex.setGroups && !ex.isComplex && !ex.isSuperset && !ex.useRPE) {
          ex.setGroups = ex.setGroups.map(sg => {
            const newSets = setsAdj !== 0 ? Math.max(1, (sg.sets||1) + setsAdj) : sg.sets;
            const newInt = (intAdj !== 0 && (sg.intensity||0) > 0)
              ? Math.round(Math.min(115, Math.max(0, (sg.intensity||0) + intAdj)) * 10) / 10 : sg.intensity;
            const newHi = (intAdj !== 0 && (sg.intensityHigh||0) > 0)
              ? Math.round(Math.min(115, (sg.intensityHigh + intAdj)) * 10) / 10 : sg.intensityHigh;
            return {...sg, sets:newSets, intensity:newInt, intensityHigh:newHi||0};
          });
          const totalSets = ex.setGroups.reduce((s,sg)=>s+sg.sets,0);
          const wInt = ex.setGroups.reduce((s,sg)=>{const lo=sg.intensity||0;const hi=sg.intensityHigh||lo;return s+((lo+hi)/2)*sg.sets;},0);
          ex.intensity = totalSets>0 ? Math.round(wInt/totalSets) : 0;
          ex.sets = totalSets;
          ex.volume = ex.useTime ? 0 : ex.setGroups.reduce((s,sg)=>s+sg.sets*(sg.reps||0),0);
        }
      });
    });
  }
  prog().weeks[destW] = { note, phase, days: daysCopy };
  state.currentWeek = destW;
  closeModal();
  saveState();
  render();
}

    <div style="font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:600;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase;margin-bottom:8px;">Tools</div>
    <div style="border:1px solid var(--dark3);border-radius:8px;overflow:hidden;margin-bottom:1.5rem;">${toolRows}</div>
    <div style="font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:600;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase;margin-bottom:8px;">Data &amp; Backup</div>
    <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:1rem;">
      <div style="display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border:1px solid var(--dark3);border-radius:8px;">
        <div><div style="font-size:14px;font-weight:600;color:var(--white);">Full Backup</div><div style="font-size:12px;color:var(--muted);margin-top:2px;">Export all teams and programs as a JSON file</div></div>
        <button onclick="exportDataJSON()" class="btn btn-outline" style="font-size:12px;padding:5px 12px;flex-shrink:0;">⬇ Download</button>
      </div>
      <div style="display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border:1px solid var(--dark3);border-radius:8px;">
        <div><div style="font-size:14px;font-weight:600;color:var(--white);">Team Download</div><div style="font-size:12px;color:var(--muted);margin-top:2px;">Export <strong>${activeTeamName}</strong> only as a JSON file</div></div>
        <button onclick="exportTeamJSON()" class="btn btn-outline" style="font-size:12px;padding:5px 12px;flex-shrink:0;">⬇ Download</button>
      </div>
      <div style="display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border:1px solid var(--dark3);border-radius:8px;">
        <div><div style="font-size:14px;font-weight:600;color:var(--white);">Restore</div><div style="font-size:12px;color:var(--muted);margin-top:2px;">Import a previously exported JSON backup</div></div>
        <button onclick="importDataJSON()" class="btn btn-outline" style="font-size:12px;padding:5px 12px;flex-shrink:0;">⬆ Restore</button>
      </div>
    </div>
    <div style="height:1px;background:var(--dark3);margin-bottom:1rem;"></div>
    <div style="display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border:1px solid rgba(192,57,43,0.3);border-radius:8px;background:rgba(192,57,43,0.05);">
      <div><div style="font-size:14px;font-weight:600;color:#E07070;">Clear All Data</div><div style="font-size:12px;color:var(--muted);margin-top:2px;">Delete everything and start fresh — cannot be undone</div></div>
      <button onclick="clearAllData()" class="btn btn-danger" style="font-size:12px;padding:5px 12px;flex-shrink:0;">🗑 Clear</button>
    </div>`;
  document.getElementById('overlay').style.display = 'flex';
}

// ── FERPA Notice ──
const FERPA_KEY = 'liftbuilder_ferpa_ack';
function checkFerpaNotice() {
  if (localStorage.getItem(FERPA_KEY)) return;
  document.getElementById('modal-body').innerHTML = `
    <h3 style="margin-bottom:.75rem;">Student Privacy Notice</h3>
    <p style="font-size:13px;color:var(--muted);margin-bottom:.75rem;">This app stores student education records subject to <strong style="color:var(--white);">FERPA</strong> (Family Educational Rights and Privacy Act).</p>
    <div style="background:var(--dark2);border:1px solid var(--dark3);border-radius:5px;padding:12px 14px;font-size:12px;color:var(--muted);line-height:1.7;margin-bottom:1rem;">
      <div style="margin-bottom:6px;">• Your school must designate athlete names, weight class, and participation as <strong style="color:var(--white);">directory information</strong> and provide parents an annual opt-out notice before displaying names on public scoreboards.</div>
      <div style="margin-bottom:6px;">• <strong style="color:var(--white);">Coach Notes</strong> are private education records — never share them with other schools or include them in public reports.</div>
      <div>• To honor a parent opt-out request, edit the athlete's profile and check <strong style="color:var(--white);">"Exclude from public scoreboards."</strong></div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-gold" onclick="acknowledgeFerpa()">I understand</button>
    </div>`;
  document.getElementById('overlay').style.display = 'flex';
}
function acknowledgeFerpa() {
  localStorage.setItem(FERPA_KEY, '1');
  closeModal();
}

// ── Init ──
function initApp() {
  loadState();
  loadToolsVisible();
  // Ensure we always have at least one team
  if (!_stateCore.activeTeamId || !_stateCore.teams[_stateCore.activeTeamId]) {
    _createDefaultTeam();
  }
  render();
  document.addEventListener('keydown', e => { if((e.ctrlKey||e.metaKey) && e.key==='z' && !e.shiftKey){ e.preventDefault(); undo(); } });
  document.addEventListener('click', () => { document.querySelectorAll('[id^="day-add-menu-"],[id^="lib-ex-menu-"],#roster-dl-menu').forEach(el => el.style.display='none'); });
  checkFerpaNotice();
  // Auto-save on any state change — patch key mutating functions
  const _origSaveNewWeek = saveNewWeek;
  saveNewWeek = function() { _origSaveNewWeek(); saveState(); };
  const _origSaveExercise = saveExercise;
  saveExercise = function() { _origSaveExercise(); saveState(); };
  const _origSaveEditExercise = saveEditExercise;
  saveEditExercise = function(...a) { _origSaveEditExercise(...a); saveState(); };
  const _origDeleteExercise = deleteExercise;
  deleteExercise = function(...a) { _origDeleteExercise(...a); saveState(); };
  const _origSaveEditDay = saveEditDay;
  saveEditDay = function(...a) { _origSaveEditDay(...a); saveState(); };
  const _origSaveManageDays = saveManageDays;
  saveManageDays = function() { _origSaveManageDays(); saveState(); };
  const _origSaveNewProgram = saveNewProgram;
  saveNewProgram = function() { _origSaveNewProgram(); saveState(); };
  const _origSaveEditProgram = saveEditProgram;
  saveEditProgram = function(...a) { _origSaveEditProgram(...a); saveState(); };
  const _origDeleteProgram = deleteProgram;
  deleteProgram = function(...a) { _origDeleteProgram(...a); saveState(); };
}

function showToast(msg, actionLabel) {
  document.getElementById('update-toast-msg').textContent = msg;
  const actionBtn = document.getElementById('update-toast-action');
  if (actionLabel) { actionBtn.textContent = actionLabel; actionBtn.style.display = ''; }
  else { actionBtn.style.display = 'none'; }
  document.getElementById('update-toast').style.display = '';
  if (!actionLabel) setTimeout(() => { document.getElementById('update-toast').style.display = 'none'; }, 3000);
}

initApp();

// ═══════════════════════════════════════════════════
//  AUTO-UPDATE  (desktop only — window.liftbuilderApp
//  is injected by preload.js when running in Electron)
// ═══════════════════════════════════════════════════
(function setupUpdater() {
  const api = window.liftbuilderApp;
  if (!api) return; // running in a browser, skip

  // Show version in header
  api.getVersion().then(v => {
    const el = document.getElementById('app-version');
    if (el) el.textContent = `v${v}`;
  });

  const btn = document.getElementById('update-btn');
  if (btn) { btn.style.display = ''; btn.textContent = 'Check for Updates'; }

  // showToast is defined globally below; reference it here so the updater can call it too

  window.updateAction = function() {
    api.openReleasesPage();
    document.getElementById('update-toast').style.display = 'none';
  };

  window.checkForUpdates = function() {
    if (btn) btn.textContent = 'Checking…';
    api.checkForUpdates().catch(() => {
      if (btn) btn.textContent = 'Check for Updates';
    });
  };

  api.onUpdateAvailable((version) => {
    if (btn) { btn.textContent = 'Update Available'; btn.style.background = 'var(--gold-a20)'; }
    showToast(`LiftBuilder v${version} is available. Download and reinstall to update.`, 'Download Now');
  });

  api.onUpdateNotAvail(() => {
    if (btn) btn.textContent = 'Up to Date';
    setTimeout(() => { if (btn) btn.textContent = 'Check for Updates'; }, 3000);
  });
})();
</script>
